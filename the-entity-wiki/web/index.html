            >
              Survivor
            </button>
            <button
              onClick={() => setRole('Killer')}
              className={`flex-1 py-2.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${role === 'Killer' ? 'bg-gradient-to-r from-red-700 to-red-500 text-white shadow-lg shadow-red-500/20' : 'text-zinc-500 hover:text-zinc-300'}`}
            >
              Killer
            </button>
          </div>
          {/* Randomization Options - Compact */}
          <div className="p-3 rounded-xl bg-zinc-900/40 border border-white/5 backdrop-blur-md shrink-0">
            <p className="text-[10px] font-bold uppercase tracking-wider text-zinc-500 mb-2">Randomize</p>
            <div className="flex flex-wrap gap-1.5">
              <button
                onClick={() => setRandomizeCharacter(!randomizeCharacter)}
                className={`px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all border flex items-center gap-1.5 ${randomizeCharacter ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/10 text-zinc-500'}`}
              >
                <span className={`w-2 h-2 rounded-sm border ${randomizeCharacter ? 'bg-white border-white' : 'border-zinc-600'}`} />
                Character
              </button>
              <button
                onClick={() => setRandomizePerks(!randomizePerks)}
                className={`px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all border flex items-center gap-1.5 ${randomizePerks ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/10 text-zinc-500'}`}
              >
                <span className={`w-2 h-2 rounded-sm border ${randomizePerks ? 'bg-white border-white' : 'border-zinc-600'}`} />
                Perks
              </button>
              <button
                onClick={() => setRandomizeAddons(!randomizeAddons)}
                className={`px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all border flex items-center gap-1.5 ${randomizeAddons ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/10 text-zinc-500'}`}
              >
                <span className={`w-2 h-2 rounded-sm border ${randomizeAddons ? 'bg-white border-white' : 'border-zinc-600'}`} />
                Addons
              </button>
              {role === 'Survivor' && (
                <button
                  onClick={() => {
                    const newValue = !randomizeItem;
                    setRandomizeItem(newValue);
                    if (!newValue) setRandomizeAddons(false);
                  }}
                  className={`px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all border flex items-center gap-1.5 ${randomizeItem ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/10 text-zinc-500'}`}
                >
                  <span className={`w-2 h-2 rounded-sm border ${randomizeItem ? 'bg-white border-white' : 'border-zinc-600'}`} />
                  Item
                </button>
              )}
              <button
                onClick={() => setRandomizeOffering(!randomizeOffering)}
                className={`px-2 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wide transition-all border flex items-center gap-1.5 ${randomizeOffering ? 'bg-white/10 border-white/20 text-white' : 'bg-white/5 border-white/10 text-zinc-500'}`}
              >
                <span className={`w-2 h-2 rounded-sm border ${randomizeOffering ? 'bg-white border-white' : 'border-zinc-600'}`} />
                Offering
              </button>
            </div>
          </div>
          {/* Playing As - Locked Character Pick */}
          {(() => {
            const lockedChar = lockedCharacterId ? characters.find(c => c.id === lockedCharacterId) : null;
            return (
              <div className="rounded-xl bg-zinc-900/40 border border-white/5 backdrop-blur-md overflow-hidden shrink-0">
                <div className="p-3">
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <Icons.Lock width={12} height={12} className={lockedChar ? (role === 'Killer' ? 'text-red-400' : 'text-blue-400') : 'text-zinc-500'} />
                      <p className="text-[10px] font-bold uppercase tracking-wider text-zinc-400">Playing As</p>
                      {lockedChar && (
                        <span className="text-[10px] text-white/80 bg-white/10 px-1.5 py-0.5 rounded-md font-semibold">{lockedChar.name}</span>
                      )}
                    </div>
                    {lockedChar && (
                      <button onClick={() => setLockedCharacterId(null)} className="text-[9px] px-1.5 py-0.5 rounded bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/30 font-bold uppercase">
                        Clear
                      </button>
                    )}
                  </div>
                  {!lockedChar ? (
                    <p className="text-zinc-600 text-[10px] mb-2">Lock a specific {role.toLowerCase()} to always play. Perks still come from your owned pool below.</p>
                  ) : (
                    <div className="flex items-center gap-3 p-2 rounded-xl bg-white/5 border border-white/10">
                      <div className={`w-12 h-12 rounded-lg overflow-hidden border ${role === 'Killer' ? 'border-red-500/50' : 'border-blue-500/50'}`}>
                        <AssetFrame type={role} imageUrl={lockedChar.image} size="fill" fallbackIcon={<Icons.User width={16} height={16} className="text-zinc-600" />} />
                      </div>
                      <div className="flex-1">
                        <p className="text-white text-sm font-bold">{lockedChar.name}</p>
                        {lockedChar.realName && lockedChar.realName !== lockedChar.name && (
                          <p className="text-zinc-500 text-xs">{lockedChar.realName}</p>
                        )}
                      </div>
                      <Icons.Lock width={14} height={14} className={role === 'Killer' ? 'text-red-400' : 'text-blue-400'} />
                    </div>
                  )}
                  {!lockedChar && (
                    <div className="grid grid-cols-6 sm:grid-cols-8 gap-1.5 mt-2 max-h-32 overflow-y-auto custom-scrollbar">
                      {characters.map(char => (
                        <button
                          key={char.id}
                          onClick={() => { setLockedCharacterId(char.id); triggerHaptic('Light'); }}
                          className="relative aspect-square rounded-lg border border-white/10 transition-all overflow-hidden bg-zinc-900 hover:border-white/30 hover:scale-105"
                          title={`Lock ${char.name}`}
                        >
                          <AssetFrame type={role} imageUrl={char.image} size="fill" fallbackIcon={<Icons.User width={14} height={14} className="text-zinc-600" />} />
                        </button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })()}
          {/* Character Selection - Collapsible */}
          <div className="rounded-xl bg-zinc-900/40 border border-white/5 backdrop-blur-md overflow-hidden shrink-0">
            <button
              onClick={() => setShowOwnedSection(!showOwnedSection)}
              className="w-full p-3 flex items-center justify-between hover:bg-white/5 transition-colors"
            >
              <div className="flex items-center gap-2">
                <p className="text-[10px] font-bold uppercase tracking-wider text-zinc-400">Owned {role}s</p>
                <span className="text-[10px] text-white/60 bg-white/10 px-1.5 py-0.5 rounded-md">{ownedCharacters.size}/{characters.length}</span>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={(e) => { e.stopPropagation(); selectAllCharacters(); }} className="text-[9px] px-1.5 py-0.5 rounded bg-white/5 text-zinc-400 hover:text-white border border-white/10 font-bold uppercase">All</button>
                <button onClick={(e) => { e.stopPropagation(); selectNoneCharacters(); }} className="text-[9px] px-1.5 py-0.5 rounded bg-white/5 text-zinc-400 hover:text-white border border-white/10 font-bold uppercase">None</button>
                <Icons.ChevronLeft width={14} height={14} className={`text-zinc-400 transition-transform ${showOwnedSection ? '-rotate-90' : 'rotate-90'}`} />
              </div>
            </button>
            {showOwnedSection && (
              <div className="px-3 pb-3 space-y-2">
                <div className="relative">
                  <div className="absolute left-2.5 top-1/2 -translate-y-1/2 text-zinc-500"><Icons.Search width={12} height={12} /></div>
                  <input
                    value={characterSearch}
                    onChange={e => setCharacterSearch(e.target.value)}
                    placeholder="Search..."
                    className="w-full bg-zinc-800/60 border border-white/10 rounded-lg pl-7 pr-2 py-1.5 text-xs text-white placeholder-zinc-600 focus:outline-none focus:border-white/20"
                  />
                </div>
                <div className="grid grid-cols-6 sm:grid-cols-8 md:grid-cols-10 gap-1.5 max-h-48 overflow-y-auto custom-scrollbar p-1">
                  {filteredCharacters.map(char => {

                    return (
                      <button
                        key={char.id}
                        onClick={() => toggleCharacter(char.id)}
                        className={`relative aspect-square rounded-lg border transition-all overflow-hidden bg-zinc-900 ${isOwned ? (role === 'Killer' ? 'border-red-500/70 ring-1 ring-red-500/30' : 'border-blue-500/70 ring-1 ring-blue-500/30') : 'border-white/10 opacity-35 grayscale hover:opacity-60 hover:grayscale-0'}`}
                        title={char.name}
                      >
                        <AssetFrame
                          type={role}
                          imageUrl={char.image}
                          size="fill"
                          fallbackIcon={<Icons.User width={16} height={16} className="text-zinc-600" />}
                        />
                        {isOwned && (
                          <div className={`absolute top-0.5 right-0.5 w-2 h-2 rounded-full z-10 ${role === 'Killer' ? 'bg-red-500' : 'bg-blue-500'}`} />
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          {/* Results Section */}
          <div className="flex-1">
            <StandardView />
          </div>
          {/* Action Buttons - At bottom of page flow, not sticky */}
          <div className="space-y-2 pt-2">
            <button
              onClick={rollDice}
              disabled={isSpinning || (ownedCharacters.size === 0 && !lockedCharacterId)}
              className={`w-full py-3 bg-gradient-to-r ${role === 'Survivor' ? 'from-blue-800 to-blue-500' : 'from-red-800 to-red-500'} rounded-xl font-bold uppercase tracking-widest text-sm text-white hover:scale-[1.01] active:scale-[0.99] transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2`}
            >
              <Icons.Dices width={18} height={18} className={isSpinning ? 'animate-spin' : ''} />
              {isSpinning ? 'Consulting Entity...' : lockedCharacterId ? `Randomize as ${characters.find(c => c.id === lockedCharacterId)?.name || role}` : 'Randomize'}
            </button>
            {(result.character || result.perks.some(p => p)) && !isSpinning && (
              <button
                onClick={() => {
                  const chaosLoadout = {
                    name: `Chaos ${result.character?.name || role} Build`,
                    role: role,
                    characterId: result.character?.id || '',
                    characterName: result.character?.name || '',
                    perks: result.perks.filter(p => p !== null).map(p => ({ id: p.id, name: p.name })),
                    item: result.item?.name || '',
                    addons: result.addons.filter(a => a).map(a => a.name),
                    offering: result.offering?.name || '',
                    tags: ['chaos-shuffle'],
                    notes: 'Generated by Chaos Shuffle'
                  };
                  const code = encodeBuild(chaosLoadout);
                  if (code) {
                    navigator.clipboard.writeText(code).then(() => alert('Build code copied! Share it with friends.')).catch(() => alert('Could not copy to clipboard — try a different browser or HTTPS context'));
                  } else {
                    alert('Failed to generate share code');
                  }
                }}
                className="w-full py-2 rounded-xl bg-white/5 border border-white/10 text-zinc-300 text-xs font-bold uppercase tracking-wider hover:bg-white/10 transition-colors flex items-center justify-center gap-2"
              >
                <Icons.Share width={14} height={14} />
                Share Build
              </button>
            )}
          </div>
        </div>
      );
    };
    const HomeView = ({ setView, data, theme, builds = [], maps = [], challenges = [], setBuildSeed, perks = [], setBuilds, customHomeTiles = [], items = [], addons = [], offerings = [] }) => {
      const { killers = [], survivors = [] } = data || {};
      const [searchTerm, setSearchTerm] = useState('');
      const [results, setResults] = useState([]);
      const [randomResult, setRandomResult] = useState(null);
      const [showImportModal, setShowImportModal] = useState(false);
      const [importCode, setImportCode] = useState('');
      const [importError, setImportError] = useState('');
      const [importPreview, setImportPreview] = useState(null);
      const [importWarnings, setImportWarnings] = useState([]);
      const { containerRef: pullRef, pullDistance, isRefreshing, pullHandlers } = usePullToRefresh(() => {
        return new Promise(resolve => setTimeout(resolve, 300));
      });;

      // Random command helpers
      const shuffleArray = (arr) => {
        const shuffled = [...arr];
        for (let i = shuffled.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
      };

      const findKiller = (query) => {
        const q = query.toLowerCase().replace(/^the\s+/, '').trim();
        if (!q) return null;
        return killers.find(k =>
          k.name.toLowerCase().replace(/^the\s+/, '') === q ||
          k.name.toLowerCase().includes(q) ||
          k.name.toLowerCase().replace(/^the\s+/, '').includes(q)
        );
      };

      const findItemType = (query) => {
        const q = query.toLowerCase().trim();
        const typeMap = {
          'medkit': 'medkit', 'med-kit': 'medkit', 'med kit': 'medkit',
          'flashlight': 'flashlight', 'torch': 'flashlight',
          'toolbox': 'toolbox', 'tool box': 'toolbox', 'tool': 'toolbox',
          'key': 'key', 'keys': 'key',
          'map': 'map', 'maps': 'map',
          'firecracker': 'firecracker', 'firecrackers': 'firecracker'
        };
        return typeMap[q] || null;
      };


      const getRandomKillerAddons = (killerName, count = 2) => {
        const killerAddons = addons.filter(a =>
          a.role === 'killer' && a.killerName === killerName
        );
        return shuffleArray(killerAddons).slice(0, count);
      };

      const getRandomItemAddons = (itemType, count = 2) => {
        const itemAddons = addons.filter(a =>
          a.role === 'survivor' && a.itemType === itemType
        );
        return shuffleArray(itemAddons).slice(0, count);
      };

      const getRandomItem = (itemType) => {
        const typeItems = items.filter(i => i.itemType === itemType && i.bloodweb === true);
        return shuffleArray(typeItems)[0] || null;
      };

      const getRandomOffering = () => {
        const available = offerings.filter(o => !o.retired);
        return shuffleArray(available)[0] || null;
      };

      const processRandomCommand = (query) => {
        const q = query.toLowerCase().trim();

        // random:offering
        if (q === 'offering' || q === 'offerings') {
          const offering = getRandomOffering();
          if (offering) {
            return { type: 'offering', offering };
          }
        }

        // random:[killer name]
        const killer = findKiller(q);
        if (killer) {
          const randomAddons = getRandomKillerAddons(killer.name);
          return { type: 'killer', killer, addons: randomAddons };
        }

        // random:[item type]
        const itemType = findItemType(q);
        if (itemType) {
          const item = getRandomItem(itemType);
          const randomAddons = getRandomItemAddons(itemType);
          return { type: 'item', item, itemType, addons: randomAddons };
        }

        return null;
      };

      const getRarityColor = (rarity) => {
        switch ((rarity || '').toLowerCase()) {
          case 'common': return '#513F31';
          case 'uncommon': return '#1B8C22';
          case 'rare': return '#3B82F6';
          case 'veryrare': return '#713A84';
          case 'ultrarare': return '#CF0C46';
          case 'visceral': return '#CF0C46';
          case 'event': return '#FFD700';
          default: return '#71717a';
        }
      };

      const getRarityGlow = (rarity) => {
        const color = getRarityColor(rarity);
        return `0 0 12px ${color}40, 0 0 4px ${color}60`;
      };

      // Handle random: prefix in search
      useEffect(() => {
        if (searchTerm.toLowerCase().startsWith('random:')) {
          const query = searchTerm.slice(7).trim();
          if (query) {
            const result = processRandomCommand(query);
            setRandomResult(result);
          } else {
            setRandomResult({ type: 'help' });
          }
          setResults([]);
        } else {
          setRandomResult(null);
        }
      }, [searchTerm]);

      const rerollRandom = () => {
        if (randomResult) {
          const query = searchTerm.slice(7).trim();
          const newResult = processRandomCommand(query);
          setRandomResult(newResult);
        }
      };

      const clearRandom = () => {
        setSearchTerm('');
        setRandomResult(null);
      };

      const handleImportBuild = () => {
        if (!importCode.trim()) {
          setImportError('Please paste a build code');
          return;
        }

        const result = decodeBuild(importCode.trim(), {
          perks,
          killers,
          survivors,
          items,
          addons,
          offerings
        });

        if (!result.success) {
          setImportError(result.error || 'Invalid build code. Please check and try again.');
          setImportPreview(null);
          return;
        }

        setImportPreview(result.build);
        setImportWarnings(result.warnings || []);
        setImportError('');
      };

      const confirmImport = () => {
        if (!importPreview) return;
        setBuildSeed && setBuildSeed({
          ...importPreview,
          name: importPreview.name + (importPreview.name.includes('(Imported)') ? '' : ' (Imported)'),
        });
        setShowImportModal(false);
        setImportCode('');
        setImportError('');
        setImportPreview(null);
        setImportWarnings([]);
        setView('buildLab');
      };

      const cancelImport = () => {
        setShowImportModal(false);
        setImportCode('');
        setImportError('');
        setImportPreview(null);
        setImportWarnings([]);
      };
      // ── Smart Search Engine ──
      // Rarity aliases: maps common DBD slang to internal rarity values
      const RARITY_ALIASES = {
        'iri': 'iridescent', 'iridescent': 'iridescent', 'pink': 'iridescent', 'ultra': 'iridescent', 'ultra rare': 'iridescent',
        'purple': 'veryrare', 'very rare': 'veryrare', 'veryrare': 'veryrare',
        'green': 'rare', 'rare': 'rare',
        'yellow': 'uncommon', 'uncommon': 'uncommon',
        'brown': 'common', 'common': 'common',
        'event': 'event'
      };
      const IRIDESCENT_RARITIES = ['ultrarare', 'visceral'];

      // Category trigger words
      const CATEGORY_TRIGGERS = {
        'addon': 'Addon', 'add-on': 'Addon', 'addons': 'Addon', 'add-ons': 'Addon',
        'perk': 'Perk', 'perks': 'Perk',
        'offering': 'Offering', 'offerings': 'Offering',
        'item': 'Item', 'items': 'Item',
        'killer': 'Killer', 'killers': 'Killer',
        'survivor': 'Survivor', 'survivors': 'Survivor',
        'map': 'Map', 'maps': 'Map',
        'build': 'Build', 'builds': 'Build',
        'glossary': 'Glossary',
        'icon': 'GameIcon', 'icons': 'GameIcon', 'status': 'GameIcon',
        'challenge': 'Challenge', 'challenges': 'Challenge',
        'chapter': 'Chapter'
      };

      // Item type aliases
      const ITEM_TYPE_ALIASES = {
        'medkit': 'medkit', 'med-kit': 'medkit', 'med kit': 'medkit', 'medkits': 'medkit',
        'flashlight': 'flashlight', 'torch': 'flashlight', 'flashlights': 'flashlight',
        'toolbox': 'toolbox', 'tool box': 'toolbox', 'toolboxes': 'toolbox',
        'key': 'key', 'keys': 'key',
        'firecracker': 'firecracker', 'firecrackers': 'firecracker'
      };

      // Stop words to ignore during token matching
      const STOP_WORDS = new Set(['the', 'a', 'an', 'that', 'this', 'with', 'for', 'and', 'but', 'or', 'of', 'to', 'in', 'on', 'is', 'it', 'has', 'his', 'her', 'its']);

      // Build killer lookup from data (handles "nurse" → "The Nurse", "sally" → "The Nurse", etc.)
      const buildKillerLookup = () => {
        const lookup = {};
        (data.killers || []).forEach(k => {
          const name = k.name.toLowerCase();
          const shortName = name.replace(/^the\s+/, '');
          lookup[name] = k.name;
          lookup[shortName] = k.name;
          if (k.realName) {
            const realLower = k.realName.toLowerCase();
            lookup[realLower] = k.name;
            // Also first name only (e.g., "sally" for "Sally Smithson")
            const firstName = realLower.split(' ')[0];
            if (firstName.length > 2) lookup[firstName] = k.name;
          }
        });
        return lookup;
      };

      // Build survivor lookup
      const buildSurvivorLookup = () => {
        const lookup = {};
        (data.survivors || []).forEach(s => {
          const name = s.name.toLowerCase();
          lookup[name] = s.name;
          const firstName = name.split(' ')[0];
          if (firstName.length > 2) lookup[firstName] = s.name;
        });
        return lookup;
      };

      const killerLookup = useMemo(() => buildKillerLookup(), [data.killers]);
      const survivorLookup = useMemo(() => buildSurvivorLookup(), [data.survivors]);

      // Score a single item against parsed search context
      const scoreItem = (item, tokens, context) => {
        let score = 0;
        const nameLower = (item.name || item.term || '').toLowerCase();
        const descLower = (item.description || item.def || item.power || '').toLowerCase();

        // ── Exact full-query substring match in name (classic search behavior) ──
        const fullQuery = tokens.join(' ');
        if (nameLower === fullQuery) score += 100;
        else if (nameLower.includes(fullQuery)) score += 50;

        // ── Per-token name matching ──
        let nameTokenHits = 0;
        for (const t of tokens) {
          if (nameLower.includes(t)) nameTokenHits++;
        }
        if (nameTokenHits > 0) score += nameTokenHits * 8;
        if (nameTokenHits === tokens.length) score += 15; // all tokens in name

        // ── Killer name match ──
        if (context.killerName) {
          if (item.killerName === context.killerName) score += 20;
          if (item.owner === context.killerName) score += 20;
          if ((item.name || '') === context.killerName) score += 25;
        }

        // ── Survivor name match ──
        if (context.survivorName) {
          if (item.owner === context.survivorName) score += 20;
          if ((item.name || '') === context.survivorName) score += 25;
        }

        // ── Rarity match ──
        if (context.rarity) {
          const itemRarity = (item.rarity || '').toLowerCase();
          if (context.rarity === 'iridescent') {
            if (IRIDESCENT_RARITIES.includes(itemRarity)) score += 15;
          } else if (itemRarity === context.rarity) {
            score += 15;
          }
        }

        // ── Category match ──
        if (context.category && item._category === context.category) score += 10;

        // ── Item type match ──
        if (context.itemType) {
          if (item.itemType === context.itemType) score += 15;
        }

        // ── Role match ──
        if (context.role) {
          if (item.role === context.role) score += 5;
        }

        // ── Alias match (perks) ──
        if (item.aliases) {
          for (const alias of item.aliases) {
            const aliasLower = alias.toLowerCase();
            if (aliasLower.includes(fullQuery)) score += 40;
            for (const t of context.descTokens) {
              if (aliasLower.includes(t)) score += 5;
            }
          }
        }

        // ── Description token matching (for leftover "meaning" words) ──
        let descHits = 0;
        for (const t of context.descTokens) {
          if (descLower.includes(t)) descHits++;
        }
        if (context.descTokens.length > 0 && descHits > 0) {
          score += descHits * 4;
          // Bonus for matching most description tokens
          if (descHits >= context.descTokens.length * 0.7) score += 8;
        }

        // ── Power field match (killers) ──
        if (item.power) {
          const powerLower = item.power.toLowerCase();
          for (const t of context.descTokens) {
            if (powerLower.includes(t)) score += 3;
          }
        }

        // ── Tags match (builds, challenges) ──
        if (item.tags) {
          for (const tag of item.tags) {
            const tagLower = tag.toLowerCase();
            for (const t of tokens) {
              if (tagLower.includes(t)) score += 6;
            }
          }
        }

        // ── Build perks match ──
        if (item.perks && Array.isArray(item.perks)) {
          for (const p of item.perks) {
            const perkNameLower = (p.name || '').toLowerCase();
            for (const t of tokens) {
              if (perkNameLower.includes(t)) score += 5;
            }
          }
        }

        // ── Realm match (maps) ──
        if (item.realm) {
          const realmLower = item.realm.toLowerCase();
          for (const t of tokens) {
            if (realmLower.includes(t)) score += 6;
          }
        }

        return score;
      };

      // Parse the search query into structured context
      const parseSmartQuery = (rawQuery) => {
        const tokens = rawQuery.toLowerCase().split(/\s+/).filter(t => t.length > 0);
        const meaningfulTokens = tokens.filter(t => !STOP_WORDS.has(t) && t.length > 1);

        const context = {
          killerName: null,
          survivorName: null,
          rarity: null,
          category: null,
          role: null,
          itemType: null,
          descTokens: []
        };

        const usedTokens = new Set();

        // Multi-word detection for two-word killer names (e.g., "pig" resolves fine, but check combos)
        for (let i = 0; i < meaningfulTokens.length; i++) {
          const t = meaningfulTokens[i];
          const twoWord = i + 1 < meaningfulTokens.length ? t + ' ' + meaningfulTokens[i + 1] : null;

          // Check two-word combos first
          if (twoWord && killerLookup[twoWord]) {
            context.killerName = killerLookup[twoWord];
            usedTokens.add(t);
            usedTokens.add(meaningfulTokens[i + 1]);
            break;
          }
          if (twoWord && survivorLookup[twoWord]) {
            context.survivorName = survivorLookup[twoWord];
            usedTokens.add(t);
            usedTokens.add(meaningfulTokens[i + 1]);
            break;
          }
          // Check rarity combos like "very rare", "ultra rare"
          if (twoWord && RARITY_ALIASES[twoWord]) {
            context.rarity = RARITY_ALIASES[twoWord];
            usedTokens.add(t);
            usedTokens.add(meaningfulTokens[i + 1]);
          }
        }

        // Single-word detection
        for (const t of meaningfulTokens) {
          if (usedTokens.has(t)) continue;

          // Killer name
          if (!context.killerName && killerLookup[t]) {
            context.killerName = killerLookup[t];
            usedTokens.add(t);
            continue;
          }

          // Survivor name
          if (!context.survivorName && survivorLookup[t]) {
            context.survivorName = survivorLookup[t];
            usedTokens.add(t);
            continue;
          }

          // Rarity
          if (!context.rarity && RARITY_ALIASES[t]) {
            context.rarity = RARITY_ALIASES[t];
            usedTokens.add(t);
            continue;
          }

          // Category
          if (!context.category && CATEGORY_TRIGGERS[t]) {
            context.category = CATEGORY_TRIGGERS[t];
            usedTokens.add(t);
            continue;
          }

          // Item type
          if (!context.itemType && ITEM_TYPE_ALIASES[t]) {
            context.itemType = ITEM_TYPE_ALIASES[t];
            usedTokens.add(t);
            continue;
          }

          // Role
          if (!context.role && (t === 'killer' || t === 'survivor')) {
            context.role = t;
            // Don't mark as used — might be both a role and category
          }
        }

        // Remaining meaningful tokens become description search words
        context.descTokens = meaningfulTokens.filter(t => !usedTokens.has(t) && !STOP_WORDS.has(t));

        return { tokens: meaningfulTokens, context };
      };

      useEffect(() => {
        if (!searchTerm.trim()) {
          setResults([]);
          return;
        }

        const parseSearch = (input) => {
          const prefixes = ['killers:', 'survivors:', 'perks:', 'builds:', 'maps:', 'items:', 'addons:', 'offerings:', 'glossary:', 'icons:', 'challenges:', 'chapter:'];
          const lowerInput = input.toLowerCase();
          for (const prefix of prefixes) {
            if (lowerInput.startsWith(prefix)) {
              return { filter: prefix.slice(0, -1), term: input.slice(prefix.length).trim().toLowerCase() };
            }
          }
          return { filter: null, term: input.toLowerCase() };
        };

        const { filter, term } = parseSearch(searchTerm);
        const shouldSearch = (category) => !filter || filter === category.toLowerCase();

        // ── Build flat list of all searchable items ──
        const allItems = [];
        // Filter out unresolved localization entries (@# prefixed) and disabled content
        const isValidEntry = (entry) => {
          if ((entry.name || '').startsWith('@#')) return false;
          if ((entry.description || '').startsWith('@#') && !(entry.name || '').trim()) return false;
          if (Array.isArray(entry.parents) && entry.parents.includes('DISABLED')) return false;
          return true;
        };

        if (shouldSearch('killers') && data.killers) {
          data.killers.forEach(k => allItems.push({ ...k, _category: 'Killer' }));
        }
        if (shouldSearch('survivors') && data.survivors) {
          data.survivors.forEach(s => allItems.push({ ...s, _category: 'Survivor' }));
        }
        if (shouldSearch('perks') && data.perks) {
          data.perks.forEach(p => allItems.push({ ...p, _category: 'Perk' }));
        }
        if (shouldSearch('builds')) {
          builds.forEach(b => allItems.push({ ...b, _category: 'Build' }));
        }
        if (shouldSearch('maps')) {
          maps.forEach(m => allItems.push({ ...m, _category: 'Map' }));
        }
        if (shouldSearch('challenges')) {
          (challenges || []).forEach(ch => allItems.push({ ...ch, _category: 'Challenge' }));
        }
        if (shouldSearch('items')) {
          items.filter(isValidEntry).forEach(i => allItems.push({ ...i, _category: 'Item' }));
        }
        if (shouldSearch('addons')) {
          addons.filter(isValidEntry).forEach(a => allItems.push({ ...a, _category: 'Addon' }));
        }
        if (shouldSearch('offerings')) {
          offerings.filter(o => !o.retired).forEach(o => allItems.push({ ...o, _category: 'Offering' }));
        }
        if (shouldSearch('icons')) {
          GAME_ICONS.forEach(icon => allItems.push({ ...icon, _category: 'GameIcon', name: icon.name }));
        }
        if (shouldSearch('glossary')) {
          GLOSSARY.forEach(section => {
            section.items.forEach(item => allItems.push({ ...item, _category: 'Glossary', name: item.term, section: section.section }));
          });
        }
        if (shouldSearch('chapter') && typeof TIMELINE_DATA !== 'undefined' && TIMELINE_DATA.releases) {
          const allReleases = TIMELINE_DATA.getChronological();
          allReleases.forEach(release => allItems.push({
            ...release,
            _category: 'Chapter',
            name: release.name,
            chapterNumber: release.chapterNumber,
            displayDate: release.displayDate
          }));
        }

        // ── Smart score every item ──
        const { tokens, context } = parseSmartQuery(filter ? term : searchTerm);
        const scored = allItems
          .map(item => {
            const s = scoreItem(item, tokens, context);
            return s > 0 ? { ...item, category: item._category, _score: s } : null;
          })
          .filter(Boolean);

        // Sort by score descending, then alphabetically as tiebreaker
        scored.sort((a, b) => b._score - a._score || (a.name || '').localeCompare(b.name || ''));

        <div className="p-5 rounded-3xl bg-gradient-to-br from-zinc-900/90 to-zinc-900/60 border border-white/10 backdrop-blur-md space-y-5">
          {/* Header: Name + Role */}
          <div className="flex flex-col sm:flex-row gap-3">
            <div className="flex-1">
              <input
                value={form.name}
                onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                placeholder="Build name..."
                className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-4 py-3 text-lg text-white font-bold placeholder-zinc-500 focus:outline-none focus:border-white/20"
              />
            </div>
            <div className="flex gap-2">
              <button
                onClick={() => changeRole('Survivor')}
                className="flex-1 sm:flex-none px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider transition-all"
                style={form.role === 'Survivor' ? { background: '#0a0a0a', border: '2px solid #38bdf8', color: '#38bdf8', boxShadow: '0 4px 15px rgba(56,189,248,0.2)' } : { background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.1)', color: '#a1a1aa' }}
              >
                Survivor
              </button>
              <button
                onClick={() => changeRole('Killer')}
                className="flex-1 sm:flex-none px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider transition-all"
                style={form.role === 'Killer' ? { background: '#0a0a0a', border: '2px solid #ef4444', color: '#ef4444', boxShadow: '0 4px 15px rgba(239,68,68,0.2)' } : { background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.1)', color: '#a1a1aa' }}
              >
                Killer
              </button>
              <button
                onClick={() => setForm(f => ({ ...f, favorite: !f.favorite }))}
                className="px-3 py-2 rounded-xl text-xs font-bold uppercase transition-all"
                style={form.favorite ? { background: '#0a0a0a', border: '2px solid #facc15', color: '#facc15' } : { background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.1)', color: '#a1a1aa' }}
              >
                <Icons.Star width={16} height={16} className={form.favorite ? 'fill-yellow-300' : ''} />
              </button>
            </div>
          </div>
          {/* Character Selection */}
          <div className="p-4 rounded-2xl bg-zinc-800/40 border border-white/5">
            <div className="flex items-center justify-between mb-3">
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold">{form.role}</p>
              <button
                onClick={() => setShowCharacterGrid(!showCharacterGrid)}
                className="text-[10px] px-2 py-1 rounded-lg bg-white/5 text-zinc-400 hover:text-white border border-white/10 font-bold uppercase tracking-wider"

                <AssetFrame type={form.role} imageUrl={characters.find(c => c.id === form.characterId)?.image} fallbackIcon={<Icons.User width={20} height={20} className="text-zinc-600" />} />
                <div className="flex-1">

                  <p className="text-zinc-500 text-xs">Selected {form.role.toLowerCase()}</p>
                </div>
                <button onClick={() => pickCharacter(null)} className="p-2 rounded-lg bg-white/5 text-zinc-400 hover:text-white">
                  <Icons.X width={14} height={14} />
                </button>
              </div>
            ) : (
              <p className="text-zinc-600 text-sm">No character selected (generic build)</p>

            {showCharacterGrid && (
              <div className="mt-3 grid grid-cols-5 sm:grid-cols-8 gap-2 max-h-40 overflow-y-auto custom-scrollbar p-2 rounded-xl bg-zinc-900/50">
                {characters.map(char => (
                  <button
                    key={char.id}
                    onClick={() => pickCharacter(char)}
                    className={`aspect-square rounded-xl border-2 transition-all overflow-hidden ${form.characterId === char.id ? (form.role === 'Killer' ? 'border-red-500 shadow-[0_0_10px_rgba(239,68,68,0.3)]' : 'border-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.3)]') : 'border-white/10 hover:border-white/30'}`}
                    title={char.name}
                  >
                    <div className="w-full h-full bg-zinc-900">
                      <AssetFrame type={form.role} imageUrl={char.image} size="fill" fallbackIcon={<Icons.User width={12} height={12} className="text-zinc-600" />} />
                    </div>
                  </button>
                ))}
              </div>

          {/* Perks Grid */}
          <div className="p-4 rounded-2xl bg-zinc-800/40 border border-white/5">
            <div className="flex items-center justify-between mb-3">
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold">Perks</p>
              <div className="flex items-center gap-2">
                <input
                  value={perkSearch}
                  onChange={e => setPerkSearch(e.target.value)}
                  placeholder="Search..."
                  className="w-32 bg-zinc-900/60 border border-white/10 rounded-lg px-2 py-1 text-xs text-white placeholder-zinc-600 focus:outline-none"
                />
                <span className="text-[10px] text-zinc-600">{perkPool.length} available</span>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              {form.perks.map((perk, idx) => (
                <div key={idx} className="p-3 rounded-xl bg-zinc-900/50 border border-white/5">

                  <select
                    value={perk?.id || ''}
                    onChange={e => updatePerk(idx, e.target.value)}

                  >
                    <option value="">Empty slot</option>
                    {perkPool.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  {perk?.name && (
                    <p className="text-[11px] text-zinc-400 mt-2 truncate">{perk.name}</p>
                  )}
                </div>
              ))}
            </div>
          </div>
          {/* Item Selection (Survivor Only) */}
          {form.role === 'Survivor' && (
            <div className="p-4 rounded-2xl bg-zinc-800/40 border border-white/5">
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold mb-3">Item</p>
              <select
                value={form.selectedItem?.id || ''}
                onChange={e => pickItem(e.target.value)}
                className="themed-select w-full text-sm"
              >
                <option value="">No item</option>
                {survivorItems.map(item => (
                  <option key={item.id} value={item.id}>{item.name} ({formatRarity(item.rarity)})</option>
                ))}
              </select>
              {form.selectedItem && (
                <div className="mt-3 p-3 rounded-xl bg-white/5 border border-white/5 flex items-center gap-3">
                  <Icons.Package width={20} height={20} className="text-white/60" />
                  <div>
                    <p className="text-white font-semibold text-sm">{form.selectedItem.name}</p>
                    <p className="text-xs" style={{ color: getRarityColor(form.selectedItem.rarity) }}>{formatRarity(form.selectedItem.rarity)} {form.selectedItem.itemType}</p>
                  </div>
                </div>
              )}
            </div>
          )}
          {/* Addons Selection */}
          <div className="p-4 rounded-2xl bg-zinc-800/40 border border-white/5">
            <div className="flex items-center justify-between mb-3">
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold">
                {form.role === 'Killer' ? 'Power Addons' : 'Item Addons'}

              <input
                value={addonSearch}
                onChange={e => setAddonSearch(e.target.value)}

                className="w-32 bg-zinc-900/60 border border-white/10 rounded-lg px-2 py-1 text-xs text-white placeholder-zinc-600 focus:outline-none"
              />
            </div>
            {(form.role === 'Killer' && !form.characterName) || (form.role === 'Survivor' && !form.selectedItem) ? (
              <p className="text-zinc-600 text-xs">
                {form.role === 'Killer' ? 'Select a killer to choose power addons' : 'Select an item to choose addons'}
              </p>
            ) : (
              <div className="grid grid-cols-2 gap-3">
                {[0, 1].map(slot => (
                  <div key={slot} className="p-3 rounded-xl bg-zinc-900/50 border border-white/5">
                    <p className="text-[10px] uppercase tracking-wider text-zinc-600 font-bold mb-2">Addon {slot + 1}</p>
                    <select
                      value={form.selectedAddons[slot]?.id || ''}
                      onChange={e => updateAddon(slot, e.target.value)}
                      className="themed-select w-full text-sm"
                    >
                      <option value="">No addon</option>
                      {availableAddons.map(a => (
                        <option key={a.id} value={a.id} style={{ color: getRarityColor(a.rarity) }}>
                          {a.name}
                        </option>
                      ))}
                    </select>
                    {form.selectedAddons[slot] && (
                      <p className="text-[11px] mt-2 truncate" style={{ color: getRarityColor(form.selectedAddons[slot].rarity) }}>
                        {form.selectedAddons[slot].name}
                      </p>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
          {/* Offering Selection */}
          <div className="p-4 rounded-2xl bg-zinc-800/40 border border-white/5">
            <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold mb-3">Offering</p>
            <select
              value={form.selectedOffering?.id || ''}
              onChange={e => pickOffering(e.target.value)}
              className="themed-select w-full text-sm"
            >
              <option value="">No offering</option>
              {availableOfferings.map(o => (
                <option key={o.id} value={o.id}>{o.name}</option>
              ))}
            </select>
            {form.selectedOffering && (
              <div className="mt-3 p-3 rounded-xl bg-white/5 border border-white/5">
                <p className="text-white font-semibold text-sm">{form.selectedOffering.name}</p>
                <p className="text-zinc-500 text-xs mt-1 line-clamp-2">{form.selectedOffering.description}</p>
              </div>
            )}
          </div>
          {/* Tags and Notes */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold mb-2">Tags</p>
              <input
                value={tagInput}
                onChange={e => setTagInput(e.target.value)}
                placeholder="SoloQ, Tryhard, Meme..."
                className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-500"
              />
            </div>
            <div>
              <p className="text-[11px] uppercase tracking-widest text-zinc-500 font-bold mb-2">Notes</p>
              <textarea
                value={form.notes}
                onChange={e => setForm(f => ({ ...f, notes: e.target.value }))}
                rows={2}
                placeholder="How to run this build..."
                className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-500"
              />
            </div>
          </div>
          {/* Action Buttons */}
          <div className="flex gap-3 justify-end pt-2">
            <button
              onClick={onCancel}
              className="px-5 py-2.5 rounded-xl text-sm font-bold bg-white/5 text-zinc-300 border border-white/10 hover:text-white hover:bg-white/10 transition-colors"
            >
              Cancel
            </button>
            <button
              onClick={handleSave}
              className={`px-5 py-2.5 rounded-xl text-sm font-bold text-white shadow-lg transition-all hover:scale-105 ${form.role === 'Killer' ? 'bg-gradient-to-r from-red-700 to-red-500' : 'bg-gradient-to-r from-blue-700 to-blue-500'}`}
            >
              Save Build
            </button>
          </div>
        </div>
      );
    };
    const BuildPlannerView = ({ builds = [], setBuilds, perks = [], killers = [], survivors = [], items = [], addons = [], offerings = [], templates = [], onBack, seed, clearSeed, setRoleContext }) => {
      const [filters, setFilters] = useState({ role: 'All', character: 'All', tag: 'All', search: '', include: '', exclude: '' });
      const [editing, setEditing] = useState(null);
      const [showForm, setShowForm] = useState(false);
      useEffect(() => {
        if (seed) {
          const seedPerks = seed.perks || [];
          const perksArray = [
            seedPerks[0] || null,
            seedPerks[1] || null,
            seedPerks[2] || null,
            seedPerks[3] || null
          ];
          setEditing({
            id: null,
            name: seed.name || `${seed.characterName || seed.role} Build`,
            role: seed.role || 'Survivor',
            characterId: seed.characterId || '',
            characterName: seed.characterName || '',
            perks: perksArray,
            addons: seed.addons || [],
            item: seed.item || '',
            offering: seed.offering || '',
            tags: seed.tags || [],
            notes: seed.notes || '',
            favorite: false
          });
          setShowForm(true);
          clearSeed && clearSeed();
        }
      }, [seed, clearSeed]);
      const allTags = useMemo(() => {
        const set = new Set();
        builds.forEach(b => (b.tags || []).forEach(t => set.add(t)));
        return ['All', ...Array.from(set)];
      }, [builds]);
      const filteredBuilds = useMemo(() => {
        const includeTerm = filters.include.toLowerCase();
        const excludeTerm = filters.exclude.toLowerCase();
        const searchTerm = filters.search.toLowerCase();
        return builds.filter(b => {
          const roleMatch = filters.role === 'All' || b.role === filters.role;
          const charMatch = filters.character === 'All' || b.characterId === filters.character || (b.characterName || '').toLowerCase() === filters.character.toLowerCase();
          const tagMatch = filters.tag === 'All' || (b.tags || []).includes(filters.tag);
          const searchMatch = !searchTerm || b.name.toLowerCase().includes(searchTerm) || (b.notes || '').toLowerCase().includes(searchTerm);
          const includeMatch = !includeTerm || (b.perks || []).some(p => (p?.name || '').toLowerCase().includes(includeTerm));
          const excludeMatch = !excludeTerm || !(b.perks || []).some(p => (p?.name || '').toLowerCase().includes(excludeTerm));
          return roleMatch && charMatch && tagMatch && searchMatch && includeMatch && excludeMatch;
        });
      }, [builds, filters]);
      const upsertBuild = (payload) => {
        setBuilds(prev => {
          const exists = prev.some(b => b.id === payload.id);
          const next = exists ? prev.map(b => b.id === payload.id ? payload : b) : [payload, ...prev];
          return next;
        });
        setRoleContext && setRoleContext(payload.role);
        setShowForm(false);
        setEditing(null);
      };
      const duplicateBuild = (build) => {
        const now = new Date().toISOString();
        const clone = { ...build, id: uuid(), name: `${build.name} (Copy)`, favorite: false, createdAt: now, updatedAt: now };
        setBuilds(prev => [clone, ...prev]);
      };
      const deleteBuild = (id) => {
        if (!confirm('Delete this build?')) return;
        setBuilds(prev => prev.filter(b => b.id !== id));
      };
      const toggleFavorite = (id) => {
        const now = new Date().toISOString();
        setBuilds(prev => prev.map(b => b.id === id ? { ...b, favorite: !b.favorite, updatedAt: now } : b));
      };
      const cloneTemplate = (tpl) => {
        const now = new Date().toISOString();
        const normalizedPerks = (tpl.perks || []).map(name => {
          const found = perks.find(p => p.name === name);
          return found ? { id: found.id, name: found.name } : { id: uuid(), name };
        });
        setEditing({
          id: null,
          name: tpl.title || tpl.name,
          role: roleFromString(tpl.role || 'Survivor'),
          characterId: tpl.characterId || '',
          characterName: tpl.character || '',
          perks: normalizedPerks.concat([null, null, null, null]).slice(0, 4),
          addons: tpl.addons || [],
          item: tpl.item || '',
          offering: tpl.offering || '',
          tags: tpl.tags || ['Template'],
          notes: tpl.note || tpl.notes || '',
          favorite: false
        });
        setShowForm(true);
      };
      return (
        <div className="flex flex-col h-full pt-12 pb-32 px-6 overflow-y-auto custom-scrollbar">
          <Header title="Build & Loadout Lab" subtitle="Create, filter, favorite and clone builds" onBack={onBack} infoTips={VIEW_TIPS.buildlab} />
          <InfoCallout lines={[
            'Use New Build to craft a loadout; role, character, perks, and notes live in the form.',
            'Filters trim the list by role, character, tags, and include/exclude perk text. Reset clears everything.',
            'Edit or duplicate builds to iterate quickly; marking favorites stars them for Lobby and Match Log linking.'
          ]} />
          <div className="mb-4 flex flex-wrap gap-2 items-center">
            <button onClick={() => { setEditing(null); setShowForm(true); }} className="px-4 py-2 rounded-xl bg-gradient-to-r from-red-700 to-red-500 text-white font-bold text-sm shadow-lg">New Build</button>
            <GlassButton active={filters.role === 'Killer'} onClick={() => setFilters(f => ({ ...f, role: filters.role === 'Killer' ? 'All' : 'Killer' }))} className="text-xs py-2 px-3">Killer</GlassButton>
            <GlassButton active={filters.role === 'Survivor'} onClick={() => setFilters(f => ({ ...f, role: filters.role === 'Survivor' ? 'All' : 'Survivor' }))} className="text-xs py-2 px-3">Survivor</GlassButton>
            <GlassButton onClick={() => setFilters({ role: 'All', character: 'All', tag: 'All', search: '', include: '', exclude: '' })} className="text-xs py-2 px-3">Reset</GlassButton>
            <span className="text-[11px] text-zinc-500 ml-auto uppercase tracking-wider">{filteredBuilds.length} builds</span>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-6 gap-3 mb-6">
            <div className="lg:col-span-2 flex flex-col gap-3">
              <div className="p-3 rounded-2xl bg-zinc-900/50 border border-white/10">
                <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-2">Search</p>
                <input value={filters.search} onChange={e => setFilters(f => ({ ...f, search: e.target.value }))} placeholder="Search name or notes" className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-500" />
              </div>
              <div className="p-3 rounded-2xl bg-zinc-900/50 border border-white/10 grid grid-cols-2 gap-2">
                <div>
                  <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-2">Role</p>
                  <select value={filters.role} onChange={e => setFilters(f => ({ ...f, role: e.target.value }))} className="themed-select w-full text-sm">
                    <option value="All">All</option>
                    <option value="Killer">Killer</option>
                    <option value="Survivor">Survivor</option>
                  </select>
                </div>
                <div>
                  <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-2">Character</p>
                  <select value={filters.character} onChange={e => setFilters(f => ({ ...f, character: e.target.value }))} className="themed-select w-full text-sm">
                    <option value="All">All</option>
                    {killers.map(k => <option key={k.id} value={k.id}>{k.name}</option>)}
                    {survivors.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                </div>
                <div>
                  <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-2">Tag</p>
                  <select value={filters.tag} onChange={e => setFilters(f => ({ ...f, tag: e.target.value }))} className="themed-select w-full text-sm">
                    {allTags.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                </div>
                <div className="grid grid-cols-1 gap-2">
                  <div>
                    <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-1">Include perk</p>
                    <input value={filters.include} onChange={e => setFilters(f => ({ ...f, include: e.target.value }))} placeholder="Dead Hard" className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-500" />
                  </div>
                  <div>
                    <p className="text-[11px] uppercase tracking-wider text-zinc-500 font-bold mb-1">Exclude perk</p>
                    <input value={filters.exclude} onChange={e => setFilters(f => ({ ...f, exclude: e.target.value }))} placeholder="No Mither" className="w-full bg-zinc-800/60 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-zinc-500" />
                  </div>
                </div>
              </div>
              {showForm && (
                <BuildForm
                  draft={editing || undefined}
                  onSave={upsertBuild}
                  onCancel={() => { setShowForm(false); setEditing(null); }}
                  perks={perks}
                  killers={killers}
                  survivors={survivors}
                  items={items}
                  addons={addons}
                  offerings={offerings}
                />
              )}
            </div>
            <div className="lg:col-span-4 space-y-3">
              {filteredBuilds.map(build => (
                <div key={build.id} className="p-4 rounded-3xl bg-zinc-900/50 border border-white/10 hover:border-red-500/40 transition-colors">
                  <div className="flex flex-wrap items-center gap-2 justify-between">
                    <div className="flex items-center gap-2">
                      <span className={`px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-widest ${build.role === 'Killer' ? 'bg-red-600/30 text-red-200' : 'bg-blue-600/30 text-blue-200'}`}>{build.role}</span>
                      {build.characterName && <span className="text-xs text-zinc-400 font-semibold">{build.characterName}</span>}
                      {build.favorite && <span className="text-yellow-300 text-sm">*</span>}
                    </div>
                    <div className="flex gap-2 text-[11px] text-zinc-500">
                      {build.updatedAt && <span>Updated {formatDate(build.updatedAt)}</span>}
                      {build.createdAt && <span>Created {formatDate(build.createdAt)}</span>}
                    </div>
                  </div>
                  <div className="flex flex-wrap justify-between gap-2 mt-1">
                    <h3 className="text-lg font-bold text-white">{build.name}</h3>
                    <div className="flex gap-2">
                      <button onClick={() => { setEditing(build); setShowForm(true); }} className="text-xs px-3 py-1 rounded-xl bg-white/5 text-white border border-white/10">Edit</button>
                      <button onClick={() => duplicateBuild(build)} className="text-xs px-3 py-1 rounded-xl bg-white/5 text-zinc-200 border border-white/10">Duplicate</button>
                      <button onClick={() => { const code = encodeBuild(build); if (code) { navigator.clipboard.writeText(code).then(() => alert('Build code copied! Share it with friends.')).catch(() => alert('Could not copy to clipboard — try a different browser or HTTPS context')); } else { alert('Failed to generate share code'); } }} className="text-xs px-3 py-1 rounded-xl bg-white/5 text-blue-200 border border-blue-500/30">Share</button>
                      <button onClick={() => toggleFavorite(build.id)} className="text-xs px-3 py-1 rounded-xl bg-white/5 text-yellow-200 border border-yellow-500/30">{build.favorite ? 'Unfavorite' : 'Favorite'}</button>
                      <button onClick={() => deleteBuild(build.id)} className="text-xs px-3 py-1 rounded-xl bg-red-900/50 text-red-200 border border-red-600/40">Delete</button>
                    </div>
                  </div>
                  <div className="mt-3 flex flex-wrap gap-2">
                    {(build.perks || []).map(p => (
                      <span key={`${build.id}-${p.id}-${p.name}`} className="px-2 py-1 rounded-xl bg-white/5 border border-white/10 text-[11px] text-white">{p.name}</span>
                    ))}
                    {build.perks?.length === 0 && <span className="text-[11px] text-zinc-500">No perks selected</span>}

    const STORAGE_KEY_ACHIEVEMENTS = 'dbd_achievements_progress';
    const ProgressionTrackerView = ({ onGoTo }) => {
      const [search, setSearch] = useState('');
      const [sortBy, setSortBy] = useState('name_asc');
      const [hideCompleted, setHideCompleted] = useState(false);
      const [completed, setCompleted] = useState(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY_ACHIEVEMENTS);
          return stored ? JSON.parse(stored) : {};
        } catch { return {}; }
      });
      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY_ACHIEVEMENTS, JSON.stringify(completed));
        } catch { }
      }, [completed]);
      const toggleComplete = (id) => {
        setCompleted(prev => ({ ...prev, [id]: !prev[id] }));
      };
      const filtered = useMemo(() => {
        let list = DBD_ACHIEVEMENTS;
        if (search.trim()) {
          const q = search.toLowerCase();
          list = list.filter(a => a.name.toLowerCase().includes(q) || a.description.toLowerCase().includes(q));
        }
        if (hideCompleted) {
          list = list.filter(a => !completed[a.id]);
        }
        list = [...list].sort((a, b) => {
          const aComplete = !!completed[a.id];
          const bComplete = !!completed[b.id];
          if (sortBy === 'completed_first') {
            if (aComplete !== bComplete) return aComplete ? -1 : 1;
            return a.name.localeCompare(b.name);
          }
          if (sortBy === 'not_completed_first') {
            if (aComplete !== bComplete) return aComplete ? 1 : -1;
            return a.name.localeCompare(b.name);
          }
          if (sortBy === 'name_desc') return b.name.localeCompare(a.name);
          return a.name.localeCompare(b.name);
        });
        return list;
      }, [search, sortBy, hideCompleted, completed]);
      const completedCount = Object.values(completed).filter(Boolean).length;
      const totalCount = DBD_ACHIEVEMENTS.length;
      return (
        <div className="flex flex-col h-full pt-10 pb-28 px-6 overflow-y-auto custom-scrollbar">

    // ═══════════════════════════════════════════════════════════════════════════════
    // TIMELINE VIEW - Vertical scrolling lore timeline with proper portrait loading
    // ═══════════════════════════════════════════════════════════════════════════════
    const TimelineView = ({ onBack, setView, killers = [], survivors = [], theme = {} }) => {
      const scrollRef = useRef(null);
      const [expandedRelease, setExpandedRelease] = useState(null);
      const [expandedCharacter, setExpandedCharacter] = useState(null);
      const [selectedCharacter, setSelectedCharacter] = useState(null);
      const [search, setSearch] = useState('');
      const [yearFilter, setYearFilter] = useState('all');

      // Theme colors
      const accent = theme.accent || '#38bdf8';
      const accentSoft = theme.accentSoft || '#0f172a';


      // Get timeline data sorted chronologically
      const allReleases = useMemo(() => {
        if (typeof TIMELINE_DATA !== 'undefined' && TIMELINE_DATA.releases) {
          return TIMELINE_DATA.getChronological();
        }
        return [];
      }, []);

      // Get unique years for filters
      const years = useMemo(() => {
        const yearSet = new Set();
        allReleases.forEach(r => {
          const year = new Date(r.date).getFullYear();
          yearSet.add(year);
        });
        return Array.from(yearSet).sort();
      }, [allReleases]);

      // Filter releases by search and year
      const releases = useMemo(() => {
        let filtered = allReleases;

        // Filter by year
        if (yearFilter !== 'all') {
          filtered = filtered.filter(r => new Date(r.date).getFullYear() === parseInt(yearFilter));
        }

        // Filter by search
        if (search.trim()) {
          const term = search.toLowerCase();
          filtered = filtered.filter(r => {
            // Match release name
            if (r.name.toLowerCase().includes(term)) return true;
            // Match killer names
            if (r.killers?.some(k => k.name.toLowerCase().includes(term) || k.realName?.toLowerCase().includes(term))) return true;
            // Match survivor names
            if (r.survivors?.some(s => s.name.toLowerCase().includes(term))) return true;
            // Match map names
            if (r.maps?.some(m => m.name.toLowerCase().includes(term))) return true;
            return false;
          });
        }

        return filtered;
      }, [allReleases, yearFilter, search]);

      // Look up character from data.js to get correct image path
      const findCharacterData = React.useCallback((loreChar, type) => {
        const source = type === 'killers' ? killers : survivors;
        // Try to match by ID patterns
        const loreId = loreChar.id.toLowerCase();
        return source.find(c => {
          const dataId = c.id?.toLowerCase() || '';
          const dataName = c.name?.toLowerCase() || '';
          // Match patterns like "trapper" to "K01_TheTrapper" or name "The Trapper"
          return dataId.includes(loreId) ||
            dataName.includes(loreId) ||
            dataName.includes(loreChar.name.toLowerCase().replace('the ', ''));
        });
      }, [killers, survivors]);

      // Toggle release expansion
      const toggleRelease = (releaseId) => {
        triggerHaptic('Light');
        if (expandedRelease === releaseId) {
          setExpandedRelease(null);
          setExpandedCharacter(null);
        } else {
          setExpandedRelease(releaseId);
          setExpandedCharacter(null);
        }
      };

      // Toggle character lore inline
      const toggleCharacter = (charKey) => {
        triggerHaptic('Light');
        setExpandedCharacter(expandedCharacter === charKey ? null : charKey);
      };

      // Open full character modal
      const openCharacterModal = (loreChar, type) => {
        const fullData = findCharacterData(loreChar, type);
        if (fullData) {
          setSelectedCharacter({ ...fullData, fogEntry: loreChar.fogEntry, type: type === 'killers' ? 'Killer' : 'Survivor' });
        }
      };

      // Get type badge label
      const getTypeBadge = (type, chapterNumber) => {
        switch (type) {
          case 'base': return { label: 'BASE GAME' };
          case 'chapter': return { label: chapterNumber ? `CH ${chapterNumber}` : 'CHAPTER' };
          case 'paragraph': return { label: 'PARAGRAPH' };
          default: return { label: 'RELEASE' };
        }
      };

      // Character row component
      const CharacterRow = ({ loreChar, type, charKey }) => {
        const isExpanded = expandedCharacter === charKey;
        const fullData = findCharacterData(loreChar, type);
        const imageUrl = fullData?.image;
        const isKiller = type === 'killers';

        return (
          <div className="mb-2">
            <button
              onClick={() => toggleCharacter(charKey)}
              className="w-full flex items-center gap-3 p-3 rounded-xl transition-all bg-white/5 border border-white/5 hover:bg-white/8 hover:border-white/10"
              style={isExpanded ? { backgroundColor: `${accent}15`, borderColor: `${accent}30` } : {}}
            >
              {/* Portrait */}
              <div
                className="w-12 h-12 rounded-xl overflow-hidden border flex-shrink-0"
                style={{ borderColor: isExpanded ? accent : 'rgba(255,255,255,0.1)' }}
              >
                <AssetFrame
                  type={isKiller ? 'Killer' : 'Survivor'}
                  size="fill"
                  imageUrl={imageUrl}
                  fallbackIcon={<Icons.User width={18} height={18} className="text-zinc-500" />}
                />
              </div>

              {/* Info */}
              <div className="flex-1 text-left min-w-0">
                <div className="flex items-center gap-2 flex-wrap">
                  <span className="text-white font-semibold text-sm">{loreChar.name}</span>
                  {loreChar.licensed && (
                    <span
                      className="px-1.5 py-0.5 rounded text-[9px] uppercase font-bold"
                      style={{ backgroundColor: `${accent}20`, color: accent }}
                    >
                      Licensed
                    </span>
                  )}
                </div>
                {loreChar.realName && loreChar.realName !== loreChar.name && (
                  <p className="text-xs text-zinc-500 truncate">{loreChar.realName}</p>
                )}
              </div>

              {/* Expand indicator */}
              <Icons.ChevronDown
                width={16}

    const GlossaryView = ({ onBack }) => {
      const scrollRef = useRef(null);
      const [search, setSearch] = useState('');

      const allTerms = useMemo(() => {
        const terms = [];
        GLOSSARY.forEach(section => {
          section.items.forEach(item => {
            terms.push({ ...item, category: section.section });
          });
        });
        return terms.sort((a, b) => a.term.localeCompare(b.term));
      }, []);

      const filteredTerms = useMemo(() => {
        if (!search.trim()) return allTerms;
        const term = search.toLowerCase();
        return allTerms.filter(t =>
          t.term.toLowerCase().includes(term) ||
          t.def.toLowerCase().includes(term)
        );
      }, [allTerms, search]);

      const groupedTerms = useMemo(() => {
        const groups = {};
        filteredTerms.forEach(t => {
          const letter = t.term.charAt(0).toUpperCase();
          if (!groups[letter]) groups[letter] = [];
          groups[letter].push(t);
        });
        return groups;
      }, [filteredTerms]);

      const availableLetters = Object.keys(groupedTerms).sort();
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');

      const scrollToLetter = (letter) => {
        const element = document.getElementById(`glossary-${letter}`);
        if (element && scrollRef.current) {
          element.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      };

      return (

    const ItemsView = ({ onBack, items = [], addons = [], killers = [], settings = {}, initialSearch = '', initialMode = 'survivor', favoriteItems = [], favoriteAddons = [], onToggleFavoriteItem, onToggleFavoriteAddon }) => {

      const RARITY_ORDER = { common: 1, uncommon: 2, rare: 3, veryrare: 4, ultrarare: 5, visceral: 6 };
      const getRarityOrder = (r) => RARITY_ORDER[(r || '').toLowerCase()] || 0;
      const getRarityColor = (rarity) => {
        switch ((rarity || '').toLowerCase()) {
          case 'common': return '#513F31';
          case 'uncommon': return '#1B8C22';
          case 'rare': return '#3B82F6';
          case 'veryrare': return '#713A84';
          case 'ultrarare': return '#CF0C46';
          case 'visceral': return '#CF0C46';
          case 'event': return '#FFD700';
          default: return '#71717a';
        }
      };
      const formatRarity = (rarity) => {
        const r = (rarity || '').toLowerCase();
        switch (r) {
          case 'veryrare': return 'Very Rare';
          case 'ultrarare': return 'Ultra Rare';
          default: return r.charAt(0).toUpperCase() + r.slice(1);
        }
      };

      const survivorAddons = useMemo(() => {
        return (addons || []).filter(a => a.role === 'survivor');

        return (addons || []).filter(a => a.role === 'killer');
      }, [addons]);
      const filteredItems = useMemo(() => {
        const term = search.toLowerCase();
        let result = bloodwebItems.filter(item => {
          const matchType = filterType === 'All' || item.itemType === filterType;
          if (!matchType) return false;
          if (!term) return true;
          if (item.name.toLowerCase().includes(term)) return true;
          const iAddons = survivorAddons.filter(a => a.itemType === item.itemType);
          return iAddons.some(a => a.name.toLowerCase().includes(term));
        });
        if (sortBy === 'rarity') result = result.slice().sort((a, b) => getRarityOrder(b.rarity) - getRarityOrder(a.rarity));
        else if (sortBy === 'name') result = result.slice().sort((a, b) => a.name.localeCompare(b.name));

          const kAddons = killerAddons.filter(a => a.killerName === k.name);
          return kAddons.some(a => a.name.toLowerCase().includes(term));
        });
      }, [killers, killerAddons, search]);
      const getAddonsForItemType = (itemType) => {
        if (!itemType) return [];
        let result = survivorAddons.filter(a => a.itemType === itemType);
        return result.slice().sort((a, b) => getRarityOrder(b.rarity) - getRarityOrder(a.rarity));

      const getAddonsForKiller = (killer) => {

      const [visible, setVisible] = useState(false);
      useEffect(() => {
        setVisible(false);
        const findScrollable = () => {
          if (!mainRef.current) return null;
          const el = mainRef.current.querySelector('.overflow-y-auto, [class*="overflow-y-auto"]');
          return el;
        };
        let scrollEl = null;
        let rafId = null;
        const onScroll = () => {
          if (rafId) return;
          rafId = requestAnimationFrame(() => {
            rafId = null;
            setVisible(scrollEl ? scrollEl.scrollTop > 400 : false);
          });
        };
        const tryAttach = () => {
          const el = findScrollable();
          if (el === scrollEl) return;
          if (scrollEl) scrollEl.removeEventListener('scroll', onScroll);
          scrollEl = el;
          if (scrollEl) {
            scrollEl.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
          }
        };
        const timer = setTimeout(tryAttach, 100);
        const observer = new MutationObserver(() => setTimeout(tryAttach, 50));
        if (mainRef.current) observer.observe(mainRef.current, { childList: true, subtree: true });
        return () => {
          clearTimeout(timer);
          if (rafId) cancelAnimationFrame(rafId);
          if (scrollEl) scrollEl.removeEventListener('scroll', onScroll);
          observer.disconnect();
        };
      }, [currentView]);
      const handleClick = () => {
        if (!mainRef.current) return;
        const el = mainRef.current.querySelector('.overflow-y-auto, [class*="overflow-y-auto"]');
        if (el) el.scrollTo({ top: 0, behavior: 'smooth' });
        triggerHaptic('Light');
      };
      return (
        <button
          onClick={handleClick}
          aria-label="Scroll to top"
          className="fixed z-50 right-4 transition-all duration-300 ease-out"
          style={{
            bottom: 'calc(5rem + env(safe-area-inset-bottom, 0px) + 12px)',
            opacity: visible ? 1 : 0,
            transform: visible ? 'scale(1) translateY(0)' : 'scale(0.8) translateY(10px)',
            pointerEvents: visible ? 'auto' : 'none',
          }}

          <div className="w-10 h-10 rounded-full bg-zinc-800/90 backdrop-blur border border-white/10 shadow-lg flex items-center justify-center hover:bg-zinc-700/90 active:scale-90 transition-all">
