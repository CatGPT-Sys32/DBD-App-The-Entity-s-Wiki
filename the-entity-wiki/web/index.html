              {item.rarity && <span className="text-[10px] font-bold" style={{ color: getRarityColor(item.rarity) }}>{(item.rarity || '').replace('veryrare', 'Very Rare').replace('ultrarare', 'Ultra Rare')}</span>}
            </div>
          </div>
          <button onClick={() => toggleFavorite(category, item.id)} className="p-1.5 rounded-full bg-yellow-500/20 transition-colors hover:bg-yellow-500/30">
            <Icons.Star width={14} height={14} className="text-yellow-400 fill-yellow-400" />
          </button>
        </div>
      );
      const showSection = (tab) => activeTab === 'All' || activeTab === tab;
      return (
        <div className="flex flex-col h-full pt-12 pb-32 px-6 overflow-y-auto custom-scrollbar">
          <Header title="My Favorites" subtitle={totalCount + ' bookmarked'} onBack={onBack} infoTips={VIEW_TIPS.favorites} />
          <div className="max-w-3xl mx-auto flex flex-wrap justify-center gap-2 mb-6">
            {tabs.map(tab => {
              const count = tab === 'All' ? totalCount : tab === 'Killers' ? favKillers.length : tab === 'Survivors' ? favSurvivors.length : tab === 'Perks' ? favPerks.length : tab === 'Items' ? favItems.length : tab === 'Addons' ? favAddons.length : favOfferings.length;
              return (
                <GlassButton key={tab} active={activeTab === tab} onClick={() => setActiveTab(tab)} className="text-xs py-2 px-3">
                  {tab}{count > 0 ? ` (${count})` : ''}
                </GlassButton>
              );
            })}
          </div>
          <div className="pb-32 -mx-6 px-6">
            {totalCount === 0 ? (
              <div className="flex flex-col items-center justify-center text-center mt-16 animate-in fade-in duration-500">
                <div className="w-20 h-20 rounded-2xl bg-yellow-500/10 border border-yellow-500/20 flex items-center justify-center mb-4">
                  <Icons.Star width={36} height={36} className="text-yellow-500/40" />
                </div>
                <h3 className="text-lg font-bold text-white mb-2">No Favorites Yet</h3>
                <p className="text-zinc-500 text-sm max-w-xs">Star any killer, survivor, perk, item, addon, or offering to see them here for quick access.</p>
                <button onClick={() => setView('home')} className="mt-6 px-6 py-3 rounded-xl bg-white/5 border border-white/10 text-zinc-300 text-sm font-semibold hover:bg-white/10 transition-colors">Browse Content</button>
              </div>
            ) : (
              <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                {showSection('Killers') && <FavSection title="Killers" items={favKillers} category="Killer" accentColor="#ef4444" renderItem={(item) => <CharCard key={item.id} item={item} category="Killer" />} />}
                {showSection('Survivors') && <FavSection title="Survivors" items={favSurvivors} category="Survivor" accentColor="#38bdf8" renderItem={(item) => <CharCard key={item.id} item={item} category="Survivor" />} />}
                {showSection('Perks') && <FavSection title="Perks" items={favPerks} category="Perk" accentColor="#a78bfa" renderItem={(item) => <PerkCard key={item.id} item={item} />} />}
                {showSection('Items') && <FavSection title="Items" items={favItems} category="Item" accentColor="#22c55e" renderItem={(item) => <SmallCard key={item.id} item={item} category="Item" subtitle={item.itemType || 'Item'} />} />}
                {showSection('Addons') && <FavSection title="Addons" items={favAddons} category="Addon" accentColor="#f59e0b" renderItem={(item) => <SmallCard key={item.id} item={item} category="Addon" subtitle={item.killerName || item.itemType || 'Addon'} />} />}
                {showSection('Offerings') && <FavSection title="Offerings" items={favOfferings} category="Offering" accentColor="#f97316" renderItem={(item) => <SmallCard key={item.id} item={item} category="Offering" subtitle={item.role || 'Universal'} />} />}
              </div>
            )}
          </div>
        </div>
      );
    };
    const SettingsToggleRow = ({ checked, onChange, label, description }) => (
      <button
        type="button"
        role="switch"
        aria-checked={checked}
        onClick={() => onChange(!checked)}
        className={`w-full flex items-start gap-3 rounded-2xl border px-3 py-3 transition-all text-left select-none touch-manipulation ${checked ? 'bg-white/10 border-white/20' : 'bg-white/5 border-white/10 hover:border-white/20'}`}
        style={{ WebkitTapHighlightColor: 'transparent' }}
      >
        <span
          aria-hidden="true"
          className="mt-0.5 flex h-5 w-5 shrink-0 items-center justify-center rounded-md border transition-all"
          style={{
            background: checked ? 'var(--accent)' : 'rgba(255,255,255,0.03)',
            borderColor: checked ? 'var(--accent)' : 'var(--stroke)',
            boxShadow: checked ? '0 8px 18px rgba(0,0,0,0.28)' : 'none',
            color: checked ? '#ffffff' : 'transparent'
          }}
        >
          <Icons.Check width={12} height={12} />
        </span>
        <span className="min-w-0 flex-1 pointer-events-none">
          <span className="block text-sm font-medium text-white leading-tight">{label}</span>
          {description && <span className="mt-1 block text-xs leading-relaxed text-zinc-400">{description}</span>}
        </span>
      </button>
    );
    const SettingsView = ({ onBack, settings, setSettings, backupSummary, onCopyBackup, onDownloadBackup, onRestoreBackup }) => {
      const updateSetting = (field, value) => setSettings((prev) => {
        if (field === 'navItems') {
          return { ...prev, navItems: value, navItemsCustomized: true };
        }
        return { ...prev, [field]: value };
      });
      const [showChangelog, setShowChangelog] = useState(false);
      const [backupDraft, setBackupDraft] = useState('');
      const [backupPreview, setBackupPreview] = useState(null);
      const [backupError, setBackupError] = useState('');
      const backupFileInputRef = useRef(null);
      const refreshBackupPreview = useCallback((value) => {
        const nextValue = typeof value === 'string' ? value : '';
        setBackupDraft(nextValue);
        if (!nextValue.trim()) {
          setBackupPreview(null);
          setBackupError('');
          return;
        }
        try {
          const parsed = parseAppBackupPayload(nextValue);
          setBackupPreview(parsed);
          setBackupError('');
        } catch (error) {
          setBackupPreview(null);
          setBackupError(error?.message || 'Backup content is invalid.');
        }
      }, []);
      const handleBackupFileChange = useCallback((event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => refreshBackupPreview(String(reader.result || ''));
        reader.onerror = () => {
          setBackupPreview(null);
          setBackupError('Could not read that backup file.');
        };
        reader.readAsText(file);
        event.target.value = '';
      }, [refreshBackupPreview]);
      const restorePreview = backupPreview?.payload || null;
      return (
        <div className="flex flex-col h-full pt-12 pb-32 px-6 overflow-y-auto custom-scrollbar">
          <Header title="Settings" subtitle="App preferences" onBack={onBack} infoTips={VIEW_TIPS.settings} />
          <div className="pb-32 -mx-6 px-6 space-y-4">
            <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5">
              <h3 className="text-lg font-bold text-white mb-2">App Info</h3>
              <p className="text-sm text-zinc-400">App Version: <span className="text-white font-semibold">{META.appVersion}</span></p>
              <p className="text-sm text-zinc-400">Game Update / Data Updated: <span className="text-white font-semibold">{META.gameVersion} / {META.lastSynced}</span></p>
              <button
                onClick={() => setShowChangelog(!showChangelog)}
                className="mt-3 flex items-center gap-2 px-4 py-2 rounded-xl bg-white/5 border border-white/10 text-zinc-300 hover:text-white hover:bg-white/10 transition-all"
              >
                <Icons.List width={16} height={16} />
                <span className="text-sm font-semibold">{showChangelog ? 'Hide Changelog' : 'View Changelog'}</span>
                <Icons.ChevronLeft width={14} height={14} className={`transition-transform ${showChangelog ? '-rotate-90' : 'rotate-90'}`} />
              </button>
            </div>
            {/* Changelog Section */}
            {showChangelog && (
              <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5 space-y-4">
                <h3 className="text-lg font-bold text-white flex items-center gap-2">
                  <Icons.Clock width={20} height={20} className="text-zinc-500" />
                  Update History
                </h3>
                <div className="space-y-4 max-h-96 overflow-y-auto custom-scrollbar pr-2">
                  {CHANGELOG.map((entry, idx) => (
                    <div key={entry.version} className={`p-3 rounded-2xl border ${idx === 0 ? 'bg-white/5 border-white/20' : 'bg-white/[0.02] border-white/5'}`}>
                      <div className="flex items-center justify-between mb-2">
                        <div className="flex items-center gap-2">
                          <span className={`text-sm font-bold ${idx === 0 ? 'text-white' : 'text-zinc-300'}`}>v{entry.version}</span>
                          {idx === 0 && <span className="text-[9px] uppercase tracking-wider bg-green-500/20 text-green-400 px-1.5 py-0.5 rounded font-bold">Latest</span>}
                        </div>
                        <span className="text-xs text-zinc-500">{entry.date}</span>
                      </div>
                      <ul className="space-y-1">
                        {entry.changes.map((change, i) => (
                          <li key={i} className="text-sm text-zinc-400 flex items-start gap-2">
                            <span className="text-zinc-600 mt-1">•</span>
                            <span>{change}</span>
                          </li>
                        ))}
                      </ul>
                    </div>
                  ))}
                </div>
              </div>
            )}
            <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5 space-y-3">
              <h3 className="text-lg font-bold text-white">Theme</h3>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                <div>
                  <p className="text-[11px] uppercase text-zinc-500 font-bold mb-1">Appearance</p>
                  <select value={settings.colorMode || 'dark'} onChange={e => updateSetting('colorMode', e.target.value)} className="themed-select w-full text-sm">
                    <option value="dark">Dark</option>
                    <option value="oled">OLED Black</option>
                    <option value="light">Light</option>
                  </select>
                </div>
                <div>
                  <p className="text-[11px] uppercase text-zinc-500 font-bold mb-1">Font Size</p>
                  <select value={settings.fontSize} onChange={e => updateSetting('fontSize', e.target.value)} className="themed-select w-full text-sm">
                    <option value="small">Small</option>
                    <option value="default">Default</option>
                    <option value="large">Large</option>
                  </select>
                </div>
              </div>
              {settings.themePreference === 'manual' && (
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                  {Object.entries(THEMES).map(([key, val]) => (
                    <button
                      key={key}
                      onClick={() => updateSetting('manualTheme', key)}
                      className={`p-3 rounded-2xl border text-left transition-all ${settings.manualTheme === key ? 'bg-white/10 text-white' : 'bg-white/5 text-zinc-300 hover:border-white/20'}`}
                      style={{ background: val.tileGradient, boxShadow: val.tileShadow, borderColor: settings.manualTheme === key ? val.accent : val.tileBorder }}
                    >
                      <p className="text-sm font-bold">{val.name}</p>
                      <p className="text-[11px] text-zinc-400 mt-1 flex items-center gap-2">
                        {val.palette ? 'Full Palette' : 'Accent'}
                        <span className="inline-flex w-3 h-3 rounded-full border border-white/20" style={{ backgroundColor: val.accent }}></span>
                      </p>
                    </button>
                  ))}
                </div>
              )}
              <div className="space-y-2">
                <SettingsToggleRow
                  checked={settings.showTemplates}
                  onChange={(value) => updateSetting('showTemplates', value)}
                  label="Show template builds in Build Lab"
                  description="Keep the premade starter builds visible alongside your own saved builds."
                />
                <SettingsToggleRow
                  checked={settings.rarityGlows !== false}
                  onChange={(value) => updateSetting('rarityGlows', value)}
                  label="Rarity glow effects on cards"
                  description="Adds rarity-colored glow styling to perks, addons, items, and offerings."
                />
                <SettingsToggleRow
                  checked={settings.hapticEnabled !== false}
                  onChange={(value) => updateSetting('hapticEnabled', value)}
                  label="Haptic feedback"
                  description="Use short vibration feedback on supported mobile devices."
                />
                <SettingsToggleRow
                  checked={settings.ownedOnlyGlobal === true}
                  onChange={(value) => updateSetting('ownedOnlyGlobal', value)}
                  label="Owned Only global filter"
                  description="Filters supported views and randomizers to the characters and perks you own."
                />
              </div>
            </div>
            <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5 space-y-3">
              <h3 className="text-lg font-bold text-white">Perk Descriptions</h3>
              <p className="text-sm text-zinc-400">Choose which perk wording the app should show when both legacy and post-9.5.0 text are available.</p>
              <div className="grid grid-cols-2 gap-2">
                {[
                  { id: 'legacy', label: 'Legacy', description: 'Keep the original one-block descriptions already stored in the app.' },
                  { id: 'post95', label: 'Post-9.5.0', description: 'Use the newer multiline wording and highlight percentage values when available.' }
                ].map(option => (
                  <button
                    key={option.id}
                    onClick={() => updateSetting('perkDescriptionMode', option.id)}
                    className={`p-3 rounded-2xl border text-left transition-all ${settings.perkDescriptionMode === option.id ? 'bg-white/10 text-white' : 'bg-white/5 text-zinc-300 hover:border-white/20'}`}
                    style={settings.perkDescriptionMode === option.id ? { borderColor: 'var(--accent)', color: 'var(--accent)' } : {}}
                  >
                    <p className="text-sm font-bold">{option.label}</p>
                    <p className="text-[11px] text-zinc-500 mt-1 leading-relaxed">{option.description}</p>
                  </button>
                ))}
              </div>
            </div>
            { }
            <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5 space-y-4">
              <h3 className="text-lg font-bold text-white">Customization</h3>
              { }
              <div>
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2">
                    <p className="text-[11px] uppercase text-zinc-500 font-bold">Navigation Bar Items</p>
                    <span className="text-[10px] text-zinc-500">({(settings.navItems || []).length}/6)</span>
                  </div>
                  <button
                    onClick={() => updateSetting('navItems', DEFAULT_SETTINGS.navItems)}
                    className="text-[10px] uppercase tracking-wider text-zinc-500 hover:text-white transition-colors"
                  >
                    Reset
                  </button>
                </div>
                <p className="text-xs text-zinc-500 mb-2">Click to toggle (max 6). With 5+ items, labels appear only when selected.</p>
                <div className="flex flex-wrap gap-2">
                  {ALL_NAV_OPTIONS.map(opt => {
                    const currentItems = settings.navItems || [];
                    const isActive = currentItems.includes(opt.id);
                    const isAtLimit = currentItems.length >= 6;
                    const isDisabled = !isActive && isAtLimit;
                    return (
                      <button
                        key={opt.id}
                        disabled={isDisabled}
                        onClick={() => {
                          if (isDisabled) return;
                          if (isActive) {
                            updateSetting('navItems', currentItems.filter(id => id !== opt.id));
                          } else if (currentItems.length < 6) {
                            updateSetting('navItems', [...currentItems, opt.id]);
                          }
                        }}
                        className="px-3 py-2 rounded-xl text-xs font-bold uppercase tracking-wider transition-all"
                        style={isActive ? { background: '#0a0a0a', border: '2px solid var(--accent)', color: 'var(--accent)' } : isDisabled ? { background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.05)', color: '#52525b', opacity: 0.5, cursor: 'not-allowed' } : { background: '#0a0a0a', border: '1px solid rgba(255,255,255,0.1)', color: '#a1a1aa' }}
                      >
                        {opt.label}
                      </button>
                    );
                  })}
                </div>
              </div>
              { }
              <div>
                <div className="flex items-center justify-between mb-2">
                  <p className="text-[11px] uppercase text-zinc-500 font-bold">Home Screen Tiles</p>
                  <button
                    onClick={() => updateSetting('homeTiles', DEFAULT_SETTINGS.homeTiles)}
                    className="text-[10px] uppercase tracking-wider text-zinc-500 hover:text-white transition-colors"
                  >
                    Reset
                  </button>
                </div>
                <p className="text-xs text-zinc-500 mb-2">Toggle visibility. Use arrows to reorder.</p>
                <div className="space-y-1">
                  {(() => {
                    const currentTiles = settings.homeTiles || DEFAULT_SETTINGS.homeTiles;
                    const allTileIds = ALL_HOME_TILES.map(t => t.id);
                    const orderedList = [...currentTiles, ...allTileIds.filter(id => !currentTiles.includes(id))];
                    return orderedList.map((tileId, idx) => {
                      const tile = ALL_HOME_TILES.find(t => t.id === tileId);
                      if (!tile) return null;
                      const isVisible = currentTiles.includes(tileId);
                      const posInVisible = currentTiles.indexOf(tileId);
                      const moveUp = () => {
                        if (posInVisible <= 0) return;
                        const newOrder = [...currentTiles];
                        [newOrder[posInVisible - 1], newOrder[posInVisible]] = [newOrder[posInVisible], newOrder[posInVisible - 1]];
                        updateSetting('homeTiles', newOrder);
                      };
                      const moveDown = () => {
                        if (posInVisible < 0 || posInVisible >= currentTiles.length - 1) return;
                        const newOrder = [...currentTiles];
                        [newOrder[posInVisible], newOrder[posInVisible + 1]] = [newOrder[posInVisible + 1], newOrder[posInVisible]];
                        updateSetting('homeTiles', newOrder);
                      };
                      const toggleVisibility = () => {
                        if (isVisible) {
                          updateSetting('homeTiles', currentTiles.filter(id => id !== tileId));
                        } else {
                          updateSetting('homeTiles', [...currentTiles, tileId]);
                        }
                      };
                      return (
                        <div key={tileId} className={`flex items-center gap-2 p-2 rounded-xl ${isVisible ? 'bg-white/5 border border-white/10' : 'bg-transparent border border-transparent opacity-50'}`}>
                          <button
                            onClick={toggleVisibility}
                            className={`w-6 h-6 rounded-lg flex items-center justify-center text-xs font-bold ${isVisible ? 'bg-green-600/30 text-green-300' : 'bg-zinc-700/50 text-zinc-500'}`}
                          >
                            {isVisible ? '✓' : '–'}
                          </button>
                          <span className="flex-1 text-sm text-white">{tile.label}</span>
                          {isVisible && (
                            <div className="flex gap-1">
                              <button
                                onClick={moveUp}
                                disabled={posInVisible <= 0}
                                className="w-6 h-6 rounded-lg bg-white/5 text-zinc-400 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-xs"
                              >
                                ↑
                              </button>
                              <button
                                onClick={moveDown}
                                disabled={posInVisible >= currentTiles.length - 1}
                                className="w-6 h-6 rounded-lg bg-white/5 text-zinc-400 hover:text-white disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-xs"
                              >
                                ↓
                              </button>
                            </div>
                          )}
                        </div>
                      );
                    });
                  })()}
                </div>
              </div>
            </div>
            <div className="p-4 rounded-3xl bg-zinc-900/40 border border-white/5 space-y-4">
              <div className="flex items-start justify-between gap-3">
                <div>
                  <h3 className="text-lg font-bold text-white">Data Backup</h3>
                  <p className="text-sm text-zinc-400 mt-1">Export the full local app state or restore it later. Restores replace your current local data.</p>
                </div>
                <span className="px-2 py-1 rounded-lg bg-white/5 border border-white/10 text-[10px] uppercase tracking-wider text-zinc-400">
                  Backup
                </span>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                {[
                  { label: 'Builds', value: backupSummary?.builds || 0 },
                  { label: 'Matches', value: backupSummary?.matches || 0 },
                  { label: 'Notes', value: backupSummary?.notes || 0 },
                  { label: 'Owned', value: backupSummary?.ownedCharacters || 0 },
                  { label: 'Challenges', value: backupSummary?.challenges || 0 },
                  { label: 'Wordle Games', value: backupSummary?.worldleGamesPlayed || 0 }
                ].map((item) => (
                  <div key={item.label} className="rounded-2xl border border-white/8 bg-black/20 px-3 py-3">
                    <p className="text-[10px] uppercase tracking-[0.16em] text-zinc-500 font-bold">{item.label}</p>
                    <p className="text-lg font-bold text-white mt-2">{item.value}</p>
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                <button
                  onClick={onCopyBackup}
                  className="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-zinc-300 hover:text-white hover:bg-white/10 transition-all"
                >
                  <Icons.Copy width={16} height={16} />
                  <span className="text-sm font-semibold">Copy Backup Text</span>
                </button>
                <button
                  onClick={onDownloadBackup}
                  className="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-zinc-300 hover:text-white hover:bg-white/10 transition-all"
                >
                  <Icons.Import width={16} height={16} className="rotate-180" />
                  <span className="text-sm font-semibold">Download Backup File</span>
                </button>
                <button
                  onClick={() => backupFileInputRef.current?.click()}
                  className="flex items-center justify-center gap-2 px-4 py-3 rounded-2xl bg-white/5 border border-white/10 text-zinc-300 hover:text-white hover:bg-white/10 transition-all"
                >
                  <Icons.Import width={16} height={16} />
                  <span className="text-sm font-semibold">Load Backup File</span>
                </button>
              </div>
              <input
                ref={backupFileInputRef}
                type="file"
                accept=".json,application/json,text/json"
                className="hidden"
                onChange={handleBackupFileChange}
              />
              <div className="space-y-2">
                <div className="flex items-center justify-between gap-3">
                  <p className="text-[11px] uppercase tracking-[0.16em] text-zinc-500 font-bold">Restore from Backup</p>
                  {restorePreview?.meta?.appVersion && (
                    <span className="text-[10px] uppercase tracking-wider text-zinc-500">
                      backup from v{restorePreview.meta.appVersion}
                    </span>
                  )}
                </div>
                <textarea
                  value={backupDraft}
                  onChange={(event) => refreshBackupPreview(event.target.value)}
                  rows={7}
                  placeholder="Paste a full backup here..."
                  className="w-full bg-zinc-800/60 border border-white/10 rounded-2xl px-4 py-3 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-white/20 font-mono"
                />
                {backupError && (
                  <div className="rounded-2xl border border-red-500/20 bg-red-500/10 px-4 py-3 text-sm text-red-200">
                    {backupError}
                  </div>
                )}
                {backupPreview?.summary && !backupError && (
                  <div className="rounded-2xl border border-white/8 bg-black/20 px-4 py-4 space-y-3">
                    <div className="flex flex-wrap items-center gap-2">
                      <span className="px-2 py-1 rounded-lg bg-white/5 border border-white/10 text-[10px] uppercase tracking-wider text-zinc-300">
                        Backup format {backupPreview.summary.schemaVersion || 0}
                      </span>
                      {backupPreview.summary.exportedAt && (
                        <span className="px-2 py-1 rounded-lg bg-white/5 border border-white/10 text-[10px] uppercase tracking-wider text-zinc-500">
                          {new Date(backupPreview.summary.exportedAt).toLocaleString()}
                        </span>
                      )}
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                      {[
                        { label: 'Builds', value: backupPreview.summary.builds },
                        { label: 'Matches', value: backupPreview.summary.matches },
                        { label: 'Notes', value: backupPreview.summary.notes },

      const [visible, setVisible] = useState(false);
      useEffect(() => {
        setVisible(false);
        const findScrollable = () => {
          if (!mainRef.current) return null;
          const el = mainRef.current.querySelector('.overflow-y-auto, [class*="overflow-y-auto"]');
          return el;
        };
        let scrollEl = null;
        let rafId = null;
        const onScroll = () => {
          if (rafId) return;
          rafId = requestAnimationFrame(() => {
            rafId = null;
            setVisible(scrollEl ? scrollEl.scrollTop > 400 : false);
          });
        };
        const tryAttach = () => {
          const el = findScrollable();
          if (el === scrollEl) return;
          if (scrollEl) scrollEl.removeEventListener('scroll', onScroll);
          scrollEl = el;
          if (scrollEl) {
            scrollEl.addEventListener('scroll', onScroll, { passive: true });
            onScroll();
          }
        };
        const timer = setTimeout(tryAttach, 100);
        const observer = new MutationObserver(() => setTimeout(tryAttach, 50));

        setViewContext(context);
        setViewRaw(view);
        const history = viewHistoryRef.current;
        if (history.length === 0 || history[history.length - 1].view !== view) {
          history.push({ view, context });
          if (history.length > 50) history.splice(0, history.length - 50);
        }
      };
      const goBack = () => {
        const history = viewHistoryRef.current;
        if (history.length > 1) {
          history.pop();
          const prev = history[history.length - 1];
          setViewContext(prev.context || {});
          setViewRaw(prev.view);
        } else if (window.Capacitor?.Plugins?.App) {
          window.Capacitor.Plugins.App.exitApp();
        }
      };
      const [perkFilter, setPerkFilter] = useState('All');
      const [perkSearch, setPerkSearch] = useState('');
      const [buildSeed, setBuildSeed] = useState(null);
      const [comparePerks, setComparePerks] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [selectedPerk, setSelectedPerk] = useState(null);
      const [loreCharacter, setLoreCharacter] = useState(null);
      const [powerKiller, setPowerKiller] = useState(null);
      const [profileCharacter, setProfileCharacter] = useState(null);
      const [layoutMap, setLayoutMap] = useState(null);
      const [cosmeticsFullSetPackState, setCosmeticsFullSetPackState] = useState(() => defaultCosmeticsFullSetPackState());
      const [cosmeticsAssetRevision, setCosmeticsAssetRevision] = useState(() => getCosmeticsFullSetResolutionRevision());
      const refreshCosmeticsFullSetPack = useCallback(async (options = {}) => {
        const forceAssetReload = Boolean(options?.forceAssetReload);
        const applyPackState = (next) => {
          setCosmeticsFullSetPackState(next);
          if (isAndroidNative && (forceAssetReload || next.isReady || next.status === 'completed')) {
            const revision = bumpCosmeticsFullSetResolutionRevision();
            setCosmeticsAssetRevision(revision);
          }
          return next;
        };
        if (!isAndroidNative) {
          const next = defaultCosmeticsFullSetPackState();
          return applyPackState(next);
        }

          case 'quotes':
            return <CommunityContentView onBack={() => setView('home')} communityContent={communityContent} />;
          case 'timeline': return <TimelineView onBack={() => setView('home')} setView={setView} killers={killers} survivors={survivors} theme={theme} />;
          case 'settings': return <SettingsView onBack={() => setView('home')} settings={settings} setSettings={setSettings} backupSummary={appBackupSummary} onCopyBackup={copyAppBackup} onDownloadBackup={downloadAppBackup} onRestoreBackup={restoreAppBackup} />;
          case 'favorites': return <FavoritesView onBack={() => setView('home')} settings={settings} killers={killers} survivors={survivors} perks={perks} items={items} addons={addons} offerings={offerings} toggleFavorite={toggleFavorite} setView={setView} onPerkTap={setSelectedPerk} />;
          default: return <HomeView setView={setView} data={{ killers: visibleKillers, survivors: visibleSurvivors, perks: visiblePerks }} theme={theme} builds={builds} maps={maps} challenges={progression?.challenges || []} setBuildSeed={setBuildSeed} perks={visiblePerks} customHomeTiles={settings.homeTiles || DEFAULT_SETTINGS.homeTiles} items={items} addons={visibleAddons} offerings={offerings} cosmeticsCatalog={cosmeticsCatalogForDisplay} allCharacters={[...killers, ...survivors]} onOpenCharacterProfile={setProfileCharacter} />;
        }
      };
      return (
        <div
          data-smoke-ready="true"
          data-smoke-view={currentView}
          className="app-shell flex flex-col h-screen w-full text-slate-100 overflow-hidden relative"
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
        >
          <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(140% 140% at 50% -20%, rgba(255,255,255,0.05), transparent 60%)' }}></div>
          <main ref={mainRef} className="relative z-10 flex-1 overflow-hidden"><div key={currentView} className="view-transition h-full">{renderContent()}</div></main>
          <ScrollToTopFAB mainRef={mainRef} currentView={currentView} />
          <Navigation currentView={currentView} setView={setView} theme={theme} isMobile={device.isMobile} onPerksReset={() => setPerkSearch('')} customNavItems={settings.navItems || DEFAULT_SETTINGS.navItems} />
          {/* Perk Comparison UI */}
          <FloatingCompareBadge count={comparePerks.length} onClick={() => setShowCompareModal(true)} onClear={clearCompare} theme={theme} />
          {showCompareModal && (
            <PerkCompareModal
              perks={comparePerks}
              onClose={() => setShowCompareModal(false)}
              onRemove={togglePerkCompare}
              theme={theme}
              settings={settings}
            />
          )}
          {/* Lore Modal */}
          {loreCharacter && (
            <LoreModal
              character={loreCharacter}
              onClose={() => setLoreCharacter(null)}
            />
          )}
          {/* Power Modal */}
          {powerKiller && (
            <PowerModal
              killer={powerKiller}
              onClose={() => setPowerKiller(null)}
            />
          )}
          {/* Map Layout Modal */}
          {layoutMap && (
            <MapLayoutModal
              map={layoutMap}
              onClose={() => setLayoutMap(null)}
              noteValue={getEntityNote('map', layoutMap?.id)}
              onNoteChange={(value) => setEntityNote('map', layoutMap?.id, value)}
            />
          )}
          {/* Character Profile Modal */}
          {profileCharacter && (
            <CharacterProfileModal
              character={profileCharacter}
              onClose={() => setProfileCharacter(null)}
              allPerks={perks}
              onPerkTap={(perk) => { setProfileCharacter(null); setSelectedPerk(perk); }}
              theme={theme}
              settings={settings}
              noteValue={profileCharacter && (profileCharacter.type === 'Killer' || profileCharacter.power) ? getEntityNote('killer', profileCharacter.id) : ''}
              onNoteChange={(value) => setEntityNote('killer', profileCharacter?.id, value)}
              cosmeticsByBaseId={cosmeticsByBaseId}
            />
          )}
          {/* Bottom Sheet for perk details */}
          <BottomSheet
            isOpen={selectedPerk !== null}
            onClose={() => setSelectedPerk(null)}
            perk={selectedPerk}
            settings={settings}
            noteValue={getEntityNote('perk', selectedPerk?.id)}
            onNoteChange={(value) => setEntityNote('perk', selectedPerk?.id, value)}
          />
        </div>
      );
    };
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('[ErrorBoundary]', error, info);
        window.__hideLaunchOverlay?.(true);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: 40, textAlign: 'center', color: '#e5e7eb', background: '#090b11', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
              <h2 style={{ fontSize: 22, fontWeight: 700 }}>Something went wrong</h2>
              <p style={{ color: '#71717a', fontSize: 14 }}>{this.state.error?.message || 'An unexpected error occurred.'}</p>
              <button
                onClick={() => this.setState({ hasError: false, error: null })}
                style={{ marginTop: 8, padding: '10px 24px', borderRadius: 12, background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)', color: '#e5e7eb', cursor: 'pointer', fontSize: 14 }}
              >
                Try Again
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>

</html>
