                        <div className="p-4 rounded-2xl bg-red-500/10 border border-red-500/20">
                          <div className="flex items-center gap-2 mb-2">
                            <Icons.Sword width={14} height={14} className="text-red-400" />
                            <p className="text-[10px] uppercase tracking-widest text-red-400 font-bold">How to Play</p>
                          </div>
                          <p className="text-zinc-300 text-sm leading-relaxed">{guide.killerTips}</p>
                        </div>
                      </div>
                    )}
                  </div>
                )}

                {/* Perks Tab */}
                {activeTab === 'perks' && (
                  <div className="space-y-3 animate-in fade-in duration-300">
                    {teachables.length > 0 ? teachables.map(perk => (
                      <button
                        key={perk.id}
                        onClick={() => onPerkTap && onPerkTap(perk)}
                        className="w-full text-left p-4 rounded-2xl bg-white/5 border border-white/5 hover:border-white/15 transition-colors flex items-start gap-4"
                      >
                        <AssetFrame type="Perk" imageUrl={perk.image} fallbackIcon={<Icons.BookOpen width={20} height={20} className="text-white/60" />} />
                        <div className="flex-1">
                          <p className="text-white text-sm font-bold">{perk.name}</p>
                          <p className="text-zinc-500 text-xs mt-1.5 leading-relaxed">{stripHtml(perk.description)}</p>
                        </div>
                      </button>
                    )) : (
                      <div className="text-center py-12">
                        <Icons.BookOpen width={40} height={40} className="mx-auto text-zinc-700 mb-3" />
                        <p className="text-zinc-500">No teachable perks found</p>
                      </div>
                    )}
                  </div>
                )}

                {/* Lore Tab */}
                {activeTab === 'lore' && (
                  <div className="animate-in fade-in duration-300">
                    {character.lore ? (
                      <div className="p-4 rounded-2xl bg-white/5 border border-white/10">
                        <div className="flex items-center gap-2 mb-4">
                          <Icons.BookOpen width={14} height={14} style={{ color: accentColor }} />
                          <p className="text-[10px] uppercase tracking-widest font-bold" style={{ color: accentColor }}>Backstory</p>
                        </div>
                        <div className="space-y-4 text-zinc-300 text-sm leading-relaxed">
                          {character.lore.split('\n\n').map((paragraph, i) => (
                            <p key={i}>{paragraph}</p>
                          ))}
                        </div>
                      </div>
                    ) : (
                      <div className="text-center py-12">
                        <Icons.BookOpen width={40} height={40} className="mx-auto text-zinc-700 mb-3" />
                        <p className="text-zinc-500 italic">The Fog obscures this knowledge...</p>
                      </div>
                    )}
                  </div>
                )}
              </div>

              {/* Close Button */}
              <div className="sticky bottom-0 px-6 pb-6 pt-3 bg-gradient-to-t from-black via-black/95 to-transparent">
                <button
                  onClick={onClose}
                  className="w-full py-3 rounded-xl bg-white/5 hover:bg-white/10 text-zinc-300 font-semibold transition-colors border border-white/10"
                >
                  Close
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };
    const App = () => {
      const { killers = [], survivors = [], perks = [], maps = [], realms = [], items = [], offerings = [], addons = [] } = DATABASE;
      const [currentView, setViewRaw] = useState('home');
      const [viewContext, setViewContext] = useState({});
      const viewHistoryRef = useRef([{ view: 'home', context: {} }]);
      const mainRef = useRef(null);
      const setView = (view, context = {}) => {
        setViewContext(context);
        setViewRaw(view);
        const history = viewHistoryRef.current;
        if (history.length === 0 || history[history.length - 1].view !== view) {
          history.push({ view, context });
          if (history.length > 50) history.splice(0, history.length - 50);
        }
      };
      const goBack = () => {
        const history = viewHistoryRef.current;
        if (history.length > 1) {
          history.pop();
          const prev = history[history.length - 1];
          setViewContext(prev.context || {});
          setViewRaw(prev.view);
        } else if (window.Capacitor?.Plugins?.App) {
          window.Capacitor.Plugins.App.exitApp();
        }
      };
      const [perkFilter, setPerkFilter] = useState('All');
      const [perkSearch, setPerkSearch] = useState('');
      const [buildSeed, setBuildSeed] = useState(null);
      const [comparePerks, setComparePerks] = useState([]);
      const [showCompareModal, setShowCompareModal] = useState(false);
      const [selectedPerk, setSelectedPerk] = useState(null);
      const [loreCharacter, setLoreCharacter] = useState(null);
      const [powerKiller, setPowerKiller] = useState(null);
      const [profileCharacter, setProfileCharacter] = useState(null);
      const [layoutMap, setLayoutMap] = useState(null);
      const togglePerkCompare = (perk) => {
        setComparePerks(prev => {
          const exists = prev.find(p => p.id === perk.id);
          if (exists) {
            return prev.filter(p => p.id !== perk.id);
          }
          if (prev.length >= 4) return prev;
          return [...prev, perk];
        });
        triggerHaptic('Light');
      };
      const clearCompare = () => {
        setComparePerks([]);
        setShowCompareModal(false);
      };
      const FAVORITE_KEYS = {
        Perk: 'favoritePerks', Killer: 'favoriteKillers', Survivor: 'favoriteSurvivors',
        Item: 'favoriteItems', Addon: 'favoriteAddons', Offering: 'favoriteOfferings'
      };
      const toggleFavorite = (category, itemId) => {
        const key = FAVORITE_KEYS[category];
        if (!key) return;
        setSettings(prev => {
          const favs = prev[key] || [];
          const isFav = favs.includes(itemId);
          return { ...prev, [key]: isFav ? favs.filter(id => id !== itemId) : [...favs, itemId] };
        });
        triggerHaptic('Light');
      };
      const toggleFavoritePerk = (perkId) => toggleFavorite('Perk', perkId);
      const [settings, setSettings] = useState(() => ({ ...DEFAULT_SETTINGS, ...loadFromStorage(STORAGE_KEYS.settings, DEFAULT_SETTINGS) }));
      const [builds, setBuilds] = useState(() => loadFromStorage(STORAGE_KEYS.builds, []));
      const [matches, setMatches] = useState(() => loadFromStorage(STORAGE_KEYS.matches, []));
      const [progression, setProgression] = useState(() => loadFromStorage(STORAGE_KEYS.progression, DEFAULT_PROGRESSION));
      const [matchPrefs, setMatchPrefs] = useState(() => loadFromStorage(STORAGE_KEYS.lastContext, DEFAULT_MATCH_PREFS));
      const device = useDeviceProfile();
      useEffect(() => saveToStorage(STORAGE_KEYS.settings, settings), [settings]);
      useEffect(() => saveToStorage(STORAGE_KEYS.builds, builds), [builds]);
      useEffect(() => saveToStorage(STORAGE_KEYS.matches, matches), [matches]);
      useEffect(() => saveToStorage(STORAGE_KEYS.progression, progression), [progression]);
      useEffect(() => saveToStorage(STORAGE_KEYS.lastContext, matchPrefs), [matchPrefs]);
      useEffect(() => {
        let listenerHandle;
        const setup = async () => {
          if (window.Capacitor?.Plugins?.App) {
            listenerHandle = await window.Capacitor.Plugins.App.addListener('backButton', () => {
              goBack();
            });
          }
        };
        setup();
        return () => { if (listenerHandle?.remove) listenerHandle.remove(); };
      }, []);
      const themeKey = useMemo(() => {
        switch (settings.themePreference) {
          case 'killer': return 'blood';
          case 'survivor': return 'abyss';
          case 'neutral': return 'ember';
          case 'manual': return settings.manualTheme || 'blood';
          default: return matchPrefs?.lastRole === 'Killer' ? 'blood' : 'abyss';
        }
      }, [settings, matchPrefs?.lastRole]);
      const theme = THEMES[themeKey] || THEMES.blood;
      useEffect(() => {
        const rootEl = document.documentElement;
        const hasFullPalette = !!theme.palette;
        const palette = hasFullPalette ? theme.palette : (COLOR_MODES[settings.colorMode] || COLOR_MODES.dark);
        const boost = !hasFullPalette && settings.highContrast;
        const isLight = !hasFullPalette && settings.colorMode === 'light';
        const panel = boost ? (isLight ? 'rgba(255,255,255,0.96)' : 'rgba(255,255,255,0.08)') : palette.panel;
        const stroke = boost ? (isLight ? '#e2e8f0' : 'rgba(255,255,255,0.22)') : palette.stroke;
        const chip = boost ? (isLight ? 'rgba(148,163,184,0.24)' : 'rgba(255,255,255,0.12)') : palette.chip;
        const text = palette.text;
        const muted = palette.muted;
        const navBg = boost ? (isLight ? 'rgba(255,255,255,0.95)' : 'rgba(12, 16, 26, 0.95)') : palette.nav;
        const glassBg = boost ? (isLight ? '#eef2f7' : '#161d2e') : palette.glass;
        const ghost = boost ? (isLight ? 'rgba(15,23,42,0.12)' : 'rgba(255,255,255,0.12)') : palette.ghost;
        const ghostStrong = boost ? (isLight ? 'rgba(15,23,42,0.26)' : 'rgba(255,255,255,0.28)') : palette.ghostStrong;
        const shadowSoft = boost ? (isLight ? '0 12px 38px rgba(15,23,42,0.18)' : '0 12px 38px rgba(0,0,0,0.52)') : palette.shadowSoft;
        const shadowStrong = boost ? (isLight ? '0 22px 90px rgba(15,23,42,0.28)' : '0 22px 90px rgba(0,0,0,0.65)') : palette.shadowStrong;
        rootEl.style.setProperty('--bg-01', palette.bg01);
        rootEl.style.setProperty('--bg-02', palette.bg02);
        rootEl.style.setProperty('--panel', panel);
        rootEl.style.setProperty('--stroke', stroke);
        rootEl.style.setProperty('--chip', chip);
        rootEl.style.setProperty('--text', text);
        rootEl.style.setProperty('--muted', muted);
        rootEl.style.setProperty('--nav-bg', navBg);
        rootEl.style.setProperty('--glass-bg', glassBg);
        rootEl.style.setProperty('--ghost-surface', ghost);
        rootEl.style.setProperty('--ghost-strong', ghostStrong);
        rootEl.style.setProperty('--shadow-soft', shadowSoft);
        rootEl.style.setProperty('--shadow-strong', shadowStrong);
        const effectiveAccent = (isLight && theme.accent === '#ffffff') ? '#0f172a' : theme.accent;
        const effectiveAccentSoft = (isLight && theme.accent === '#ffffff') ? '#e2e8f0' : theme.accentSoft;
        rootEl.style.setProperty('--accent', effectiveAccent);
        rootEl.style.setProperty('--accent-soft', effectiveAccentSoft);
        rootEl.style.setProperty('--tile-border', theme.tileBorder);
        rootEl.style.setProperty('--tile-shadow', theme.tileShadow);
        rootEl.style.setProperty('--tile-gradient', theme.tileGradient);
        const fontSize = settings.fontSize === 'small' ? '14px' : settings.fontSize === 'large' ? '18px' : '16px';
        rootEl.style.fontSize = fontSize;
        document.body.classList.toggle('light-mode', !hasFullPalette && settings.colorMode === 'light');
        document.body.classList.toggle('oled-mode', !hasFullPalette && settings.colorMode === 'oled');
        document.body.classList.toggle('high-contrast', boost);
        document.body.classList.toggle('nord-mode', hasFullPalette && themeKey === 'nord');
      }, [theme, themeKey, settings.fontSize, settings.colorMode, settings.highContrast]);
      const buildsByOwner = useMemo(() => {
        const bucket = {};
        (builds || []).forEach(b => {
          if (!b.characterName) return;
          bucket[b.characterName] = bucket[b.characterName] || [];
          bucket[b.characterName].push(b);
        });
        return bucket;
      }, [builds]);
      const markBuildUsed = (id) => setBuilds(prev => prev.map(b => b.id === id ? { ...b, lastUsedAt: new Date().toISOString() } : b));
      const quickAddMatch = (entry) => {
        const now = new Date().toISOString();
        const record = { ...entry, createdAt: entry.createdAt || now, updatedAt: now };
        setMatches(prev => [record, ...prev]);
        if (record.buildId) markBuildUsed(record.buildId);
      };
      const [touchStart, setTouchStart] = useState(null);
      const navOrder = ['home', ...(settings.navItems || DEFAULT_SETTINGS.navItems), 'settings'];
      const handleTouchStart = (e) => {
        setTouchStart({
          x: e.touches[0].clientX,
          y: e.touches[0].clientY
        });
      };
      const handleTouchEnd = (e) => {
        if (touchStart === null) return;
        const touchEnd = {
          x: e.changedTouches[0].clientX,
          y: e.changedTouches[0].clientY
        };
        const diffX = touchStart.x - touchEnd.x;
        const diffY = touchStart.y - touchEnd.y;
        const minSwipe = 100;
        const isHorizontalSwipe = Math.abs(diffX) > minSwipe && Math.abs(diffX) > Math.abs(diffY) * 1.5;
        if (isHorizontalSwipe) {
          const currentIndex = navOrder.indexOf(currentView);
          if (currentIndex === -1) return;
          if (diffX > 0 && currentIndex < navOrder.length - 1) {
            setView(navOrder[currentIndex + 1]);
            triggerHaptic('Light');
          } else if (diffX < 0 && currentIndex > 0) {
            setView(navOrder[currentIndex - 1]);
            triggerHaptic('Light');
          }
        }
        setTouchStart(null);
      };
      const renderContent = () => {
        switch (currentView) {
          case 'home': return <HomeView setView={setView} data={{ killers, survivors, perks }} theme={theme} builds={builds} maps={maps} challenges={progression?.challenges || []} setBuildSeed={setBuildSeed} perks={perks} customHomeTiles={settings.homeTiles || DEFAULT_SETTINGS.homeTiles} items={items} addons={addons} offerings={offerings} />;
          case 'progression': return <ProgressionTrackerView onGoTo={setView} />;
          case 'buildLab':
          case 'builds':
            return (
              <BuildPlannerView
                builds={builds}
                setBuilds={setBuilds}
                perks={perks}
                killers={killers}
                survivors={survivors}
                items={items}
                addons={addons}
                offerings={offerings}
                templates={settings.showTemplates ? PREMADE_BUILDS : []}
                onBack={() => setView('home')}
                seed={buildSeed}
                clearSeed={() => setBuildSeed(null)}
                setRoleContext={(role) => setMatchPrefs(p => ({ ...p, lastRole: role }))}
              />
            );
          case 'matches':
            return <MatchLogView onBack={() => setView('home')} matches={matches} setMatches={setMatches} killers={killers} survivors={survivors} builds={builds} prefs={matchPrefs} setPrefs={setMatchPrefs} onBuildUsed={markBuildUsed} />;
          case 'killers': return <ListView data={killers} type="Killers" activeFilter="All" setActiveFilter={() => { }} allPerks={perks} setView={setView} onPerkSelect={setPerkSearch} initialSearch={viewContext.search || ''} buildsByOwner={buildsByOwner} onCreateBuildSeed={setBuildSeed} onBack={() => setView('home')} onShowLore={setLoreCharacter} onShowPower={setPowerKiller} favoritePerks={settings.favoriteKillers || []} onToggleFavorite={(id) => toggleFavorite('Killer', id)} onViewProfile={setProfileCharacter} />;
          case 'survivors': return <ListView data={survivors} type="Survivors" activeFilter="All" setActiveFilter={() => { }} allPerks={perks} setView={setView} onPerkSelect={setPerkSearch} initialSearch={viewContext.search || ''} buildsByOwner={buildsByOwner} onCreateBuildSeed={setBuildSeed} onBack={() => setView('home')} onShowLore={setLoreCharacter} favoritePerks={settings.favoriteSurvivors || []} onToggleFavorite={(id) => toggleFavorite('Survivor', id)} onViewProfile={setProfileCharacter} />;
          case 'perks': return <ListView data={perks} type="Perks" filterOptions={['All', 'Survivor', 'Killer', 'Favorites', 'Exhaustion', 'Hex', 'Boon', 'Scourge', 'Obsession', 'Aura', 'Stealth', 'Gen', 'Healing']} activeFilter={perkFilter} setActiveFilter={setPerkFilter} initialSearch={perkSearch} onSearchChange={setPerkSearch} onBack={() => setView('home')} comparePerks={comparePerks} onPerkLongPress={togglePerkCompare} favoritePerks={settings.favoritePerks || []} onToggleFavorite={toggleFavoritePerk} onPerkTap={setSelectedPerk} />;
          case 'roulette': return <ChaosShuffleView onBack={() => setView('home')} perks={perks} killers={killers} survivors={survivors} items={items} addons={addons} offerings={offerings} settings={settings} />;
          case 'realms': return <RealmsView onBack={() => setView('home')} maps={maps} realms={realms} onViewLayout={setLayoutMap} />;
          case 'glossary': return <GlossaryView onBack={() => setView('home')} />;
          case 'prestige': return <PrestigeCalculatorView onBack={() => setView('home')} />;
          case 'gameIcons': return <GameIconsView onBack={() => setView('home')} theme={theme} />;
          case 'items': return <ItemsView onBack={() => setView('home')} items={items} addons={addons} killers={killers} settings={settings} initialSearch={viewContext.search || ''} initialMode={viewContext.mode || 'survivor'} favoriteItems={settings.favoriteItems || []} favoriteAddons={settings.favoriteAddons || []} onToggleFavoriteItem={(id) => toggleFavorite('Item', id)} onToggleFavoriteAddon={(id) => toggleFavorite('Addon', id)} />;
          case 'offerings': return <OfferingsView onBack={() => setView('home')} offerings={offerings} initialSearch={viewContext.search || ''} favoriteOfferings={settings.favoriteOfferings || []} onToggleFavoriteOffering={(id) => toggleFavorite('Offering', id)} />;
          case 'quotes': return <QuotesView onBack={() => setView('home')} />;
          case 'timeline': return <TimelineView onBack={() => setView('home')} setView={setView} killers={killers} survivors={survivors} theme={theme} />;
          case 'settings': return <SettingsView onBack={() => setView('home')} settings={settings} setSettings={setSettings} />;
          case 'favorites': return <FavoritesView onBack={() => setView('home')} settings={settings} killers={killers} survivors={survivors} perks={perks} items={items} addons={addons} offerings={offerings} toggleFavorite={toggleFavorite} setView={setView} onPerkTap={setSelectedPerk} />;
          default: return <HomeView setView={setView} data={{ killers, survivors, perks }} theme={theme} builds={builds} maps={maps} challenges={progression?.challenges || []} setBuildSeed={setBuildSeed} customHomeTiles={settings.homeTiles || DEFAULT_SETTINGS.homeTiles} />;
        }
      };
      return (
        <div
          className={`app-shell flex flex-col h-screen w-full text-slate-100 overflow-hidden relative ${settings.highContrast ? 'ring-1 ring-white/10' : ''}`}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
        >
          <div className="absolute inset-0 pointer-events-none" style={{ background: 'radial-gradient(140% 140% at 50% -20%, rgba(255,255,255,0.05), transparent 60%)' }}></div>
          <main ref={mainRef} className="relative z-10 flex-1 overflow-hidden"><div key={currentView} className="view-transition h-full">{renderContent()}</div></main>
          <ScrollToTopFAB mainRef={mainRef} currentView={currentView} />
          <Navigation currentView={currentView} setView={setView} theme={theme} isMobile={device.isMobile} onPerksReset={() => setPerkSearch('')} customNavItems={settings.navItems || DEFAULT_SETTINGS.navItems} />
          {/* Perk Comparison UI */}
          <FloatingCompareBadge count={comparePerks.length} onClick={() => setShowCompareModal(true)} onClear={clearCompare} theme={theme} />
          {showCompareModal && (
            <PerkCompareModal
              perks={comparePerks}
              onClose={() => setShowCompareModal(false)}
              onRemove={togglePerkCompare}
              theme={theme}
            />
          )}
          {/* Lore Modal */}
          {loreCharacter && (
            <LoreModal
              character={loreCharacter}
              onClose={() => setLoreCharacter(null)}
            />
          )}
          {/* Power Modal */}
          {powerKiller && (
            <PowerModal
              killer={powerKiller}
              onClose={() => setPowerKiller(null)}
            />
          )}
          {/* Map Layout Modal */}
          {layoutMap && (
            <MapLayoutModal
              map={layoutMap}
              onClose={() => setLayoutMap(null)}
            />
          )}
          {/* Character Profile Modal */}
          {profileCharacter && (
            <CharacterProfileModal
              character={profileCharacter}
              onClose={() => setProfileCharacter(null)}
              allPerks={perks}
              onPerkTap={(perk) => { setProfileCharacter(null); setSelectedPerk(perk); }}
              theme={theme}
            />
          )}
          {/* Bottom Sheet for perk details */}
          <BottomSheet
            isOpen={selectedPerk !== null}
            onClose={() => setSelectedPerk(null)}
            perk={selectedPerk}
          />
        </div>
      );
    };
    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      componentDidCatch(error, info) {
        console.error('[ErrorBoundary]', error, info);
      }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: 40, textAlign: 'center', color: '#e5e7eb', background: '#090b11', minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
              <h2 style={{ fontSize: 22, fontWeight: 700 }}>Something went wrong</h2>
              <p style={{ color: '#71717a', fontSize: 14 }}>{this.state.error?.message || 'An unexpected error occurred.'}</p>
              <button
                onClick={() => this.setState({ hasError: false, error: null })}
                style={{ marginTop: 8, padding: '10px 24px', borderRadius: 12, background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.15)', color: '#e5e7eb', cursor: 'pointer', fontSize: 14 }}
              >
                Try Again
              </button>
            </div>
          );
        }
        return this.props.children;
      }
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>

</html>
