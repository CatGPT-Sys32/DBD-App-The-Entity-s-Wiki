ch marks and make no sound.Has 2 charges.Recharges over 65 seconds.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/T_UI_iconItems_artisansFogVial"}, {"id": "6feb33e8-2f25-468a-abfc-3e39c1884e96", "internalId": "Item_Survivor_VigosFogVial", "name": "Vigo's Fog Vial", "type": "item", "itemType": "fogvial", "description": "From the man’s own collection. Impeccable. Unparalleled.Releases concentrated Fog.Fog Cloud lasts for 12 secondsFog Cloud expands to a maximum of 8 meters.While inside a Fog Cloud, auras are suppressed, and Survivors leave no scratch marks and make no sound.Has 2 charges.Recharges over 60 seconds.", "role": "survivor", "rarity": "rare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/T_UI_iconItems_vigosFogVial"}], "offerings": [{"id": "eebd7a3c-c890-4f4a-aa35-df100c07b2df", "internalId": "Anniversary2019Offering", "name": "Gruesome Gateau", "type": "points", "tags": ["stack", "notavailableinpartymode"], "description": "A terrific stomach-churning cake to mark our three years together. Grants 103% bonus Bloodpoints in all categories for all players this trial.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconFavors_gruesomeGateau"}, {"id": "332307d7-cf07-4393-a83c-dd5442ab55b1", "internalId": "Anniversary2020Offering", "name": "Ghastly Gateau", "type": "points", "tags": ["stack", "notavailableinpartymode"], "description": "A spectacularly grim cake to mark our four years together. 1% tastier than a Gruesome Gateau. Grants 104% bonus Bloodpoints in all categories for all players this trial.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconFavors_4thAnniversary"}, {"id": "150ff303-9312-4f32-890d-32e9d9cb0957", "internalId": "Anniversary2021Offering", "name": "Sacrificial Cake", "type": "points", "tags": ["notavailableinpartymode", "stack"], "description": "A revolting cake that marks our five years together. The slightest taste fills you with an incomprehensible energy, reaching out to something beyond. Grants 105% bonus Bloodpoints in all categories for all players this trial.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconsFavors_5thAnniversary"}, {"id": "44fdf1eb-497e-40b1-b9cd-960e1c77e8e9", "internalId": "Anniversary2022Offering", "name": "Frightful Flan", "type": "points", "tags": ["notavailableinpartymode", "stack"], "description": "It may be a masquerade ball, but there is no masking the foul odor of this quivering yellow mass.\n\nConsuming it, however, fills you with vigor.\n\nGrants 106% bonus Bloodpoints in all categories for all players this trial.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconsFavors_6thAnniversary"}, {"id": "bb9fd731-e1c1-4afc-97a9-2d02dbacce93", "internalId": "Anniversary2023Offering", "name": "TERRORMISU", "type": "points", "tags": ["notavailableinpartymode", "stack"], "description": "A celebratory dessert to be eaten during the masquerade. Each layer is more horrifying than the last.\n\nGrants 107% bonus Bloodpoints in all categories for all players this trial.Reveals the aura of an Invitation within 32 meter(s).", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconsFavors_7thAnniversary"}, {"id": "64445b1d-1810-4850-a492-86169cbcdd47", "internalId": "Anniversary2024Offering", "name": "SCREECH COBBLER", "type": "points", "tags": ["notavailableinpartymode", "stack", "anniversaryincreasepillarauradistance"], "description": "If you listen really closely, you can almost hear it screaming for more ice cream.\n\nGrants 108% bonus Bloodpoints in all categories for all players this trial.Reveals the aura of Invitation within 16 meters.Create 1 more chest.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/iconsFavors_8thAnniversary"}, {"id": "bc4d3e70-fdb7-40c3-9626-e3accf03ff97", "internalId": "Anniversary2025Offering", "name": "Coconut Scream Pie", "type": "points", "tags": ["notavailableinpartymode", "stack"], "description": "A metallic taste overpowers the coconut.Grants 109% bonus Bloodpoints in all categories for all players this trial.Reveals the aura of Invitation Pillars within 16 meters.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Anniversary/T_UI_iconsFavors_9thAnniversary"}, {"id": "3d44d7ca-be68-4d1f-bd2b-9b2662b57bb5", "internalId": "AnnotatedBlueprint", "name": "Annotated Blueprint", "type": "proceduralgeneration", "tags": ["stack", "mystery"], "description": "Tremendously increases the chance of spawning the Hatch in the Killer Shack, if the map has a Killer Shack.Secret.", "role": null, "rarity": "common", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/Yemen/iconFavors_annotatedBlueprint"}, {"id": "54c281a6-da39-4b08-b613-d190cc8c8320", "internalId": "ArdentRavenWreath", "name": "Ardent Raven Wreath", "type": "points", "tags": ["stack", "black", "notavailableinpartymode"], "description": "Grants 100% bonus Bloodpoints in the Deviousness category.", "role": "killer", "rarity": "rare", "retired": false, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Favors/iconFavors_ardentRavenWreath"}, {"id": "963034e1-4093-42ef-bbd5-ed38bc7c92ea", "internalId": "ArdentShrikeWreath", "name": "Ardent Shrike Wreath", "type": "points", "tags": ["stack", "black", "notavailableinpartymode"], "description": "Grants 100% bonus Bloodpoints in the Sacrifice category.", "role": "killer", "rarity": "rare", "r g"}, {"id": "d534c337-767e-498e-82f8-0c14c7077a79", "internalId": "Addon_Ghost_CheapCologne", "name": "Cheap Cologne", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Dollar store cologne with a pungent scent of rubbing alcohol. Worn by Ghost Face to make his presence known. Reserved for impromptu visits.\n\nIncreases Marked duration by 10 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_cheapCologne"}, {"id": "07afebc4-580c-435d-8052-90b47a11e1be", "internalId": "Addon_Ghost_ChewedPen", "name": "Chewed Pen", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Blue pen with a chewed cap that holds traces of Danny’s DNA. Incriminating evidence that was never found.\n\nSurvivors that are in the dying state take 3 seconds to reveal The Ghost Face.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_chewedPen"}, {"id": "0d192365-6b1a-41b8-a294-8ce02958d8f6", "internalId": "Addon_Ghost_DriversLicense", "name": "Driver's License", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A driver’s license revealing Olsen’s true identity: Danny Johnson.\n\nWhen Marking a Survivor repairing a generator, the generator explodes and loses 20% progress.The affected generator becomes blocked for 15 seconds.When Marking multiple Survivors at the same time, the loss of progress only applies once.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_driversLicense"}, {"id": "6d9b3126-1405-468f-bb93-0e424ed007a7", "internalId": "Addon_Ghost_DropLegKnifeSheath", "name": "Drop-Leg Knife Sheath", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Sheath allowing a full motion range: ideal to inflict quick and powerful wounds while moving freely. Stolen from a patrol officer the night Danny left Philadelphia.\n\nThe Ghost Face gains 10% movement speed for 5 seconds after Marking a Survivor.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_dropLegKnifeSheath"}, {"id": "a033e96e-dc64-4b6f-ab2d-9f0f32a2f4f5", "internalId": "Addon_Ghost_HeadlinesCutouts", "name": "Headline Cutouts", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Cutouts of articles covering unsolved murder cases from Utah to Pennsylvania. While Ghost Face only authored some of the headlines, he committed all the murders.\n\nCompiling your success makes you proud and boosts your confidence.\n\nIncreases movement speed while stalking by 40%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_headlinesCutouts"}, {"id": "19b02ab5-7df6-47f7-9990-afd159baffab", "internalId": "Addon_Ghost_KnifeBeltClip", "name": "Knife Belt Clip", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Perfect belt clip to scout carry your blade discreetly. No one knows what you’re planning to do tonight.\n\nReduces the Terror Radius by 12 meters while crouching.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_knifeBeltClip"}, {"id": "0f642599-8aed-4783-8b20-861e6fde94ae", "internalId": "Addon_Ghost_LastingPerfume", "name": "Lasting Perfume", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "An overpowering musky fragrance worn by Ghost Face to announce his presence. Reserved for victims he planned to write about.\n\nSurvivors that are on a hook take 3 seconds to reveal The Ghost Face.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_lastingPerfume"}, {"id": "a0ef0ac2-a436-4b3a-bb4d-79175fc119b9", "internalId": "Addon_Ghost_LeatherKnifeSheath", "name": "Leather Knife Sheath", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Quiet and flexible sheath to carry your blade. Movement is easier when things are fastened into place.\n\nIncreases crouched movement speed by 10%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_leatherKnifeSheath"}, {"id": "88356bb8-cdc1-42d7-a580-c63d1b27911a", "internalId": "Addon_Ghost_MarkedMap", "name": "Marked Map", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "The annotated map of Northern Roseville, Florida. Each X represents a victim of The Ghost Face. Mapping out your targets allows you to roam the streets undetected.\n\nIncreases duration of Killer Instinct after being revealed by 2 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_markedMap"}, {"id": "9a032b57-eb00-4717-b182-4023e351dc42", "internalId": "Addon_Ghost_NightVisionMonocular", "name": "Night Vision Monocular", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Night vision lens enabling sharp photos even when shrouded in darkness. Ideal for discreet, impromptu visits late at night.\n\nA Survivor that reveals The Ghost Face is inflicted with Exhausted for 10 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_nightvisionMoncular"}, {"id": "68e4995b-8ad6-4daf-87a0-dbfe7d209d2b", "internalId": "Addon_Ghost_OlsensAddressBook", "name": "Olsen's Address Book", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Filled in blunt, blue crabbed writing. All the Roseville murder victims are listed there, along with their phone number and address.\n\nSurvivors that are Marked reveal their auras for 5 seconds when performing rushed actions.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_olsensAddressBook"}, {"id": "e58084ae-4a6b-42c0-b814-addf8013b6a6", "internalId": "Addon_Ghost_OlsensJournal", "name": "Olsen’s Journal", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A spiral notebook filled with stained, handwritten entries. The journal details different equipment used to stalk victims.\n\nA Survivor that is Marked is inflicted with Oblivious until the Mark expires.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_olsensJournal"}, {"id": "5d0a6b49-54d6-4c1b-b8ec-214db64f9cb5", "internalId": "Addon_Ghost_OlsensWallet", "name": "Olsen’s Wallet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Olsen’s wallet holds thirty dollars in cash, a video club membership card, and a folded picture of Olsen’s first Roseville victim. Carrying incriminating evidence boosts your excitement and resolve.\n\nBreaking a pallet or wall immediately recharges Night Shroud.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_olsensWallet"}, {"id": "9505f64d-7b88-4918-b044-c2c687466091", "internalId": "Addon_Ghost_OutdoorSecurityCamera", "name": "Outdoor Security Camera", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A small surveillance camera that filmed Ghost Face breaking into a house on Belleview Road in Northern Roseville. The camera was positioned at the perfect angle to catch a glimpse of Ghost Face without providing any real clues to the police.\n\nThe auras of all Survivors are revealed for 7 seconds when a Marked Survivor is put into the dying state.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_outdoorSecurityCamera"}, {"id": "5d05c48f-6705-4731-823b-c6781116c15d", "internalId": "Addon_Ghost_Philly", "name": "“Philly”", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Stolen camera from a victim of Olsen’s in Philadelphia, where he worked before. The film inside captured his last night in the city.\n\nDecreases time required to Mark a Survivor by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_philly"}, {"id": "5499ec9b-7502-4ff3-b61f-f5a7b81b82eb", "internalId": "Addon_Ghost_ReusableCinchStraps", "name": "Cinch Straps", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Black straps that keep everything in place while on the prowl.\n\nNight Shroud remains active after a failed basic attack.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_reusuableCinchStraps"}, {"id": "e8431081-a30a-47e3-88eb-80aebace97c1", "internalId": "Addon_Ghost_TelephotoLens", "name": "Telephoto Lens", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A manual focus lens to take pictures from afar without being noticed.\n\nA Survivor that reveals The Ghost Face is inflicted with Oblivious for 60 seconds.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_telephotoLens"}, {"id": "bd27a76a-3a78-440f-95ce-51fa93e2de39", "internalId": "Addon_Ghost_TheGhostFaceCaughtOnTape", "name": "“Ghost Face Caught on Tape”", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "Tape obtained by Olsen to write an article that terrorized Roseville.\n\nInstantly recharges Night Shroud after a successful basic attack that puts a Survivor into the dying state.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_caughtOnTape"}, {"id": "63864d8f-0d86-4370-addc-6c1f3936a463", "internalId": "Addon_Ghost_VictimsDetailedRoutine", "name": "Victim’s Detailed Routine", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A ripped page outlining the weekly routine of Olsen's first victim in Roseville. Compiling your victim's habits allows you to anticipate and counter their next move.\n\nAfter being Marked, Survivors are inflicted with Exhausted for 5 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_victimsDetailedRoutine"}, {"id": "a501d137-b0e0-4793-9f8c-df88ea8e3dd1", "internalId": "Addon_Ghost_WalleyesMatchbook", "name": "Walleye's Matchbook", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_GhostPower"], "description": "A sheet of matches from Walleye's, a small bar in Northern Roseville. A victim’s phone number is scribbled in blue. One of the incriminating pieces of evidence found.\n\nDecreases Night Shroud recovery time by 3 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Oman/iconAddon_walleyesMatchbook"}, {"id": "d530a274-90cc-4dbd-968f-b18f8ee9e1b4", "internalId": "Addon_Harpoon_BarbedWire", "name": "Barbed Wire", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "Pliable American made steel lined with sharp barbs. Despite its simplicity, Caleb found it could be wrapped around a spear to increase its viciousness.\n\nIncreases Survivor mend time by 3.5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_barbedWire"}, {"id": "e1b7ee4e-2c09-475f-b3e0-8bc4e794449a", "internalId": "Addon_Harpoon_BayshoresCigar", "name": "Bayshore’s Cigar", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A quality cigar, plucked from the jacket of Caleb’s boss while he wailed over the spear lodged in his abdomen.\n\nDecreases the stun duration when Survivors break free by 0.75 second.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_bayshoresCigar"}, {"id": "3a6b3279-0d90-4e7c-ac17-1bb904723d38", "internalId": "Addon_Harpoon_BayshoresGoldTooth", "name": "Bayshore’s Gold Tooth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A golden tooth torn from Henry Bayshore as he screamed for mercy, hours before he was finished off.\n\nIncreases The Redeemer's reeling speed by 5%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_bayshoresGoldTooth"}, {"id": "add5f07c-6459-4fd6-b902-388b01cb5178", "internalId": "Addon_Harpoon_ChewingTobacco", "name": "Chewing Tobacco", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A can of clipped and sweetened tobacco leaves lifted from a gutted body in Glenvale. Stimulates the nervous system.\n\nDecreases the stun duration when Survivors break free by 0.25 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_chewingTobacco"}, {"id": "a7a4629d-629a-4169-8ad7-38497f8741a3", "internalId": "Addon_Harpoon_ClearCreekWhiskey", "name": "Gold Creek Whiskey", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "Warm comfort in a bottle that quelled Caleb’s anger and slowed his step.\n\nDecreases Terror Radius by 8 meters while aiming down The Redeemer's sights.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_clearCreekWhiskey"}, {"id": "a7205168-ccc0-4b0a-8d7d-a30620f07610", "internalId": "Addon_Harpoon_HellshireIron", "name": "Hellshire Iron", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "The Hellshire Gang’s branding iron. Despite folklore, it never made its mark on new initiates, instead having been used to brand particularly quarrelsome bounties.\n\nWhen a Survivor is speared, gain Undetectable. The effect persists for 10 seconds after the Survivor is no longer speared.\n\nUndetectable hides the Killer's aura, Terror Radius and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_hellshireIron"}, {"id": "05b3ea39-79c7-42d2-9dbb-cb01bdcd6f22", "internalId": "Addon_Harpoon_HoneyLocustThorns", "name": "Honey Locust Thorns", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "Angered with a bounty who fled twice before, Caleb twisted thorn branches onto a spear and let it loose.\n\nBreaking free from the spear inflicts Mangled for 70 seconds.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_honeyLocustThorns"}, {"id": "0b3cdcaf-36fc-487c-b7cd-2c49985c6f82", "internalId": "Addon_Harpoon_IridescentCoin", "name": "Iridescent Coin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A glass-like coin molded from The Fog itself. Payment to the bounty hunter for services rendered.\n\nSurvivors speared from at least 12 meters away are inflicted with Exposed for as long as they remain speared.\n\nExposed survivors will be downed by basic attacks even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_iridescentCoin"}, {"id": "2569a3b4-adac-4075-8ea5-1e0d1224dda9", "internalId": "Addon_Harpoon_JawSmasher", "name": "Jaw Smasher", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "The bullet that ripped through Caleb’s jaw during a frenzied shootout. It brings back a burning desire for revenge.\n\nIncreases movement speed by 1.5% while aiming down The Redeemer's sights.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_jawSmasher"}, {"id": "0e0882e1-92c1-4bd0-bf46-beb92a650da4", "internalId": "Addon_Harpoon_MarshalsBadge", "name": "Marshal's Badge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A silver badge taken from the corpse of a lawman in Arizona Territory who interfered with the Hellshire Gang’s bounties.\n\nDecreases Terror Radius by 4 meters while aiming down The Redeemer's sights.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_marshalsBadge"}, {"id": "5d441098-dca0-4baa-808c-95cff9af5b1a", "internalId": "Addon_Harpoon_ModifiedAmmoBelt", "name": "Modified Ammo Belt", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "An old ammo belt Caleb altered for his specialized weaponry. Still holds the fine red dirt of the Arizona Territory desert.\n\nDecreases The Redeemer's reload time by 0.25 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_modifiedAmmoBelt"}, {"id": "867feb43-69ea-45ef-8665-35dfbbbda97f", "internalId": "Addon_Harpoon_PoisonOakLeaves", "name": "Poison Oak Leaves", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "An ordinary looking plant, Caleb found that spears coated in its oil caused unbearable blistering around wounds.\n\nIncreases Survivor mend time by 1.5 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_poisonOakLeaves"}, {"id": "061e3789-e6ec-47d7-ad0f-f0db8e7e7537", "internalId": "Addon_Harpoon_PrisonChain", "name": "Prison Chain", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A thick, heavy chain that once held a steel ball and latched to Caleb’s ankle. It’s been repurposed to hook onto a spear.\n\nIncreases time required for a Survivor to break free from a spear by 10%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_prisonChain"}, {"id": "10f1af0b-5931-4430-a126-4f69184845b3", "internalId": "Addon_Harpoon_RicketyChain", "name": "Rickety Chain", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "Weak steel links first used on Caleb's prototype Speargun. Despite the chain's failings, it holds sentimental value.\n\nGrants 50% bonus Bloodpoints for Speared score events.Survivors break free 33% faster.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_ricketyChain"}, {"id": "4c4fab11-a418-4030-9477-5f92f7692615", "internalId": "Addon_Harpoon_RustedSpike", "name": "Rusted Spike", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A railroad spike that Caleb fastened to the front of the Speargun during a moment of morbid curiosity. The dull tip prevents it from cleanly piercing its target.\n\nHitting a Survivor with The Redeemer while they are being reeled in inflicts Mangled for 60 seconds.\n\nMangled increases time required to heal by 25% for a set duration or until fully healed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_rustedSpike"}, {"id": "34f7c957-4e82-41dd-9755-92012497c06f", "internalId": "Addon_Harpoon_SnakeOil", "name": "Snake Oil", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A tincture of oils and extracts purchased from a travelling salesman. Purported to cure all that ails you.\n\nIncreases The Redeemer's reeling speed by 2.5%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_snakeOil"}, {"id": "191486b2-b3eb-4690-a9f5-153b0807a011", "internalId": "Addon_Harpoon_SpitPolishRag", "name": "Spit Polish Rag", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A grimy piece of burlap. Spit and elbow grease was enough to wipe down the speargun in the heat of a shootout.\n\nDecreases The Redeemer's miss cooldown by 0.25 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_spitPolishRag"}, {"id": "f2a55c07-6488-4c27-a55f-c8505f83b08a", "internalId": "Addon_Harpoon_TinOilCan", "name": "Tin Oil Can", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "A can holding a small amount of oil to reduce friction in machinery. Early models of the Speargun were notorious for jamming, and oil had to be readily available.\n\nDecreases The Redeemer's miss cooldown by 0.5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_tinOilCan"}, {"id": "07532c4f-664d-47d0-b0a1-f769631713e2", "internalId": "Addon_Harpoon_WantedPoster", "name": "Wanted Poster", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "The yellowed remains of a wanted poster for Mason Kelly. Kept Caleb focused on the hunt.\n\nIncreases movement speed by 3% while aiming down The Redeemer's sights.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_wantedPoster"}, {"id": "ef5f05c9-879f-478e-8536-bb20e85f57eb", "internalId": "Addon_Harpoon_WardensKeys", "name": "Warden’s Keys", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_HarpoonRifle"], "description": "The dull jangle of the keys evokes a furious memory within Caleb.\n\nDecreases The Redeemer's reload time by 0.35 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ukraine/iconAddon_wardensKeys"}, {"id": "e71c22a5-063a-40c2-8c38-8909024332e0", "internalId": "Addon_Hatchet_AmanitaToxin", "name": "Amanita Toxin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A toxin applied to the Hatchets' blade. The Amanita mushrooms' toxin numbs the mind.\n\nHatchets inflict Blindness for 60 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_amanitaToxin"}, {"id": "2b63993b-03e4-4654-93ad-e79652e4d8fa", "internalId": "Addon_Hatchet_BandagedHaft", "name": "Bandaged Haft", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "First-aid bandages securely rolled and attached to the Hatchets' haft.\n\nDecreases Hatchet throw cooldown by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_bandagedHaft"}, {"id": "abd8ae86-ccd3-48e2-b6e1-c1eb48e7b733", "internalId": "Addon_Hatchet_BegrimedHead", "name": "Begrimed Head", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "These Hatchets' heads are stained with a foul substance that afflict anyone it touches with debilities.\n\nHit target suffers from the Mangled and Hemorrhage status effects for 80 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_begrimedHead"}, {"id": "9f9cc6c0-9f3d-455f-b6ab-a7bd83e633e5", "internalId": "Addon_Hatchet_BerusToxin", "name": "Yellowed Cloth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A simple scrap of material to tend to blisters and wipe the name": "Flower Babushka", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A clean and colorful kerchief adorned with a flower pattern. This memory of a lost little one fills the Huntress with rage and focus.\n\nDecreases time required to wind up a Hatchet throw by 10%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_flowerBabushka"}, {"id": "df755174-ea1d-4893-a99b-fc336675384c", "internalId": "Addon_Hatchet_GlowingConcoction", "name": "Glowing Concoction", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "An otherworldly concoction that faintly glows a foreboding light.\n\nReveals the auras of Survivors hit by Hatchets for 5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_glowingConcoction"}, {"id": "5befb428-c1ba-4724-b05b-4904580e0e7f", "internalId": "Addon_Hatchet_InfantryBelt", "name": "Infantry Belt", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A sturdy utility belt pillaged from a soldier. He was quick in combat, but she was quicker.\n\nHatchet hits grant 3% Haste for 5 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_infantryBelt"}, {"id": "499d0423-3623-421e-8f2c-36a9e572be20", "internalId": "Addon_Hatchet_IridescentHead", "name": "Iridescent Head", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A glass-like Hatchet head molded from The Fog Itself. The blade is warm and reverberating with The Entity's power.\n\nSuccessful Hatchet hits immediately put healthy Survivors into the dying state.Sets maximum number of carried Hatchets to 1.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_iridescentHead"}, {"id": "c242859b-0766-4fe4-9f2c-163c02d701a1", "internalId": "Addon_Hatchet_LeatherLoop", "name": "Leather Loop", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "The right tool in the right hands is key to a successful hunt.\n\nHatchet hits grant 2% Haste for 5 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_leatherLoop"}, {"id": "9415b8df-077a-4596-8656-36a9c2ffb4e4", "internalId": "Addon_Hatchet_MannaGrassBraid", "name": "Manna Grass Braid", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A circular decorative braid made from manna grass. This memory of a lost little one fills the Huntress with rage and focus.\n\nDecreases time required to wind up a Hatchet throw by 5%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_mannaGrassBraid"}, {"id": "e0a8e877-df7c-4107-b54f-f40b9975e1f9", "internalId": "Addon_Hatchet_OakHaft", "name": "Oak Haft", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A polished haft which allows for a quick and sly manipulation of the deadly tool.\n\nDecreases Hatchet throw cooldown by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_oakHaft"}, {"id": "17f278c4-5b3d-4fe1-8069-9eb2ff052918", "internalId": "Addon_Hatchet_PungentFiale", "name": "Soldier's Puttee", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A wrap taken from a dead soldier, it provides protection and support to the ankle and lower leg.\n\nThe Huntress moves 4.6 m/s when she has no Hatchets.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_soldiersPuttee"}, {"id": "8f252b53-a7d8-4bfd-ba54-a4c7380bd15f", "internalId": "Addon_Hatchet_RustyHead", "name": "Rusty Head", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "These Hatchets' heads are covered with crusty and volatile rust spots that makes injuries particularly difficult to heal.\n\nHatchets inflict Mangled for 70 seconds.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_rustyHead"}, {"id": "5ff41bf7-8e61-4862-b7c1-7b8d6b371faa", "internalId": "Addon_Hatchet_ShinyPin", "name": "Shiny Pin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A copper pin defaced beyond recognition yet polished to a high sheen. Pillaged from a particularly difficult prey.\n\nIncreases The Huntress' movement speed by 5% while aiming or throwing a Hatchet.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_shinyPin"}, {"id": "46cccd4e-43d5-4a22-9bd2-61e569d9ed74", "internalId": "Addon_Hatchet_VenomousConcoction", "name": "Venomous Concoction", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "A toxic concoction applied to the Hatchets' blade. The murky concoction is mainly composed of Berus snake venom which gives it fatiguing capabilities.\n\nHatchets inflict Exhausted for 5 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_venomousConcoction"}, {"id": "d097e95f-12a6-43bd-b5f5-d0f149cf29d4", "internalId": "Addon_Hatchet_YewSeedBrew", "name": "Wooden Fox", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "Roughly carved, this fox statuette is no more than a few inches. A reminder that stealth and cunning is as effective as raw power.\n\nGrants Undetectable for 30 seconds after reloading.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_woodenFox"}, {"id": "818f111c-a5c5-46e3-a1ac-27d94c000515", "internalId": "Addon_Hatchet_YewSeedConcoction", "name": "Rose Root", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Hatchet"], "description": "Dried petals that relieve symptoms of fatigue and overexertion when brewed in a tea.\n\nIncreases thrown Hatchet speed by 20%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC5/iconAddon_roseRoot"}, {"id": "f825d7bf-76f4-4f81-a1c9-c32885c56c71", "internalId": "Addon_HillbillyChainsaw_IridescentBrick", "name": "Filthy Slippers", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Chainsaw"], "description": "Max sometimes struggled to hear his mother’s footfalls.\n\nAfter maintaining a Chainsaw Sprint for 2 seconds, grants Undetectable until the Chainsaw Sprint ends.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Zodiac/iconAddon_filthySlippers"}, {"id": "b9dc21b2-bb4d-4fc4-a0d9-3dc1a9562ce4", "internalId": "Addon_K22Power_1", "name": "Cat Figurine", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A wooden figure that had caught young Victor's eye. He shrieked until his mother stole it from the market, nearly blowing their cover.\n\nDisplays the target location of a Pounce.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_catFigurine"}, {"id": "18608601-8dff-45f2-9613-40541e7089bc", "internalId": "Addon_K22Power_10", "name": "Rusted Needle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A needle Madeleine used to sew up her children’s tattered clothes.\n\nCrushing Victor when attached inflicts Hemorrhage until healed.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors. This lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_rustedNeedle"}, {"id": "184be0f8-02a1-4c14-bbd0-755b86814330", "internalId": "Addon_K22Power_11", "name": "Sewer Sludge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A disgusting, sticky mixture that covered the Deshayes during an escape attempt through the city sewers.\n\nIncreases time to crush Victor when attached by 2 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_sewerSludge"}, {"id": "1983f10b-85ad-4bd3-88f8-5435510825bc", "internalId": "Addon_K22Power_12", "name": "Madeleine’s Scarf", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A cloth Madeleine wore shortly before her death. The Twins kept it as a memento.\n\nIncreases Victor's movement speed by 0.3 m/s.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_madeleinesScarf"}, {"id": "70fbac45-831b-44d4-99b7-0b9a369a39d6", "internalId": "Addon_K22Power_13", "name": "Stale Biscuit", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A hard, unleavened biscuit that Madeleine stole from a town’s market. It wasn’t much, but it was better than most meals.\n\nDecreases Pounce cooldown by 0.4 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_staleBiscuit"}, {"id": "d6114dc9-f59e-43bd-a0a7-ab9295eb9e95", "internalId": "Addon_K22Power_14", "name": "Weighty Rattle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A shoddily carved rattle that Victor cried over until his mother stole it for him. It’s entirely too heavy to be trusted to a child.\n\nCrushing Victor when attached inflicts Broken for 20 seconds.\n\nBroken prevents Survivors from being healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_weightyRattle"}, {"id": "afa9f2df-8047-47ff-8a8c-ed878147bafa", "internalId": "Addon_K22Power_15", "name": "Forest Stew", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A stew of foraged vegetables mixed with moss and bark to create a false sense of fullness.\n\nIncreases Victor's movement speed by 0.6 m/s.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_forestStew"}, {"id": "ef0c578d-394f-476c-82fa-d788f91c139d", "internalId": "Addon_K22Power_16", "name": "Spinning Top", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A wooden top shared between The Twins, though Victor wanted it for his own. He learned he could get what he wanted if he clung tightly and screamed.\n\nVictor's Pounce causes Survivors to drop their carried Survivor items.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_spinningTop"}, {"id": "e671c5e8-74f3-427f-91f9-7d35f1f3b414", "internalId": "Addon_K22Power_17", "name": "Drop of Perfume", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "One of the few luxuries Madeleine escaped her past life with. It has a pleasant, disarming scent.\n\nSurvivors in Victor's alert range while he is dormant are inflicted with Oblivious.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_dropOfPerfume"}, {"id": "8216df0c-83f5-42f0-a599-fc980764780a", "internalId": "Addon_K22Power_18", "name": "Victor’s Soldier", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A toy soldier Victor clung to when scared. Something about it evoked jealousy in Charlotte.\n\nCrushing Victor while he is dormant reveals the Survivor's aura for 6 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_victorsSoldier"}, {"id": "9b3d9e14-e58e-462a-8c3c-07eae4d46633", "internalId": "Addon_K22Power_19", "name": "Silencing Cloth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A coarse strip of cloth that a five-year-old Charlotte would put in her mouth. Stopped her from screaming when witch hunters were nearby.\n\nCharlotte gains Undetectable for 20 seconds after waking from her dormant state.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_silencingCloth"}, {"id": "6f7d895f-8e86-4754-ba1c-2ef73fd5cf2f", "internalId": "Addon_K22Power_2", "name": "Tiny Fingernail", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "Charlotte had many ways to mourn Victor’s death. As the fingernails loosened from his rotting hands, she took one in remembrance.\n\nDecreases Victor's Unbind time by 33%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_tinyFingernail"}, {"id": "a8824a9b-a5ec-486c-8f17-e222140e1c6d", "internalId": "Addon_K22Power_20", "name": "Iridescent Pendant", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A glass-like pendant molded from The Fog itself. There’s a portrait of Madeleine Deshayes upon it, though something about her depiction seems unsettling.\n\nCrushing Victor while he is dormant inflicts Exposed for 45 seconds.\n\nExposed Survivors will be downed by basic attacks even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_iridescentPendant"}, {"id": "dd2173d9-82b5-462a-b9dc-0612f8e6cc28", "internalId": "Addon_K22Power_3", "name": "Soured Milk", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A metal bottle filled with milk that has since soured. Loud as Victor could be, he quieted down when presented with his meal.\n\nIncreases Victor's alert range by 2 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_souredMilk"}, {"id": "4c14d9fe-29d3-4e7e-9a28-8aaf9d63051e", "internalId": "Addon_K22Power_4", "name": "Toy Sword", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A miniscule toy sword, only a few inches long. Holding it brought out a violent enthusiasm in Victor.\n\nDecreases Pounce charge time by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_toySword"}, {"id": "ea354604-0435-4c9c-b26a-35953e38c724", "internalId": "Addon_K22Power_5", "name": "Cat’s Eye", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "An eyeball that belonged to a cat eaten by the starving Deshayes’ family. Victor hid it from his mother, using it as a toy.\n\nVictor becomes silent while Pounce is fully charged.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_catsEye"}, {"id": "6ee4c7f5-1251-4f9d-8210-8b2d104acdc6", "internalId": "Addon_K22Power_6", "name": "Madeleine’s Glove", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A glove once owned by The Twins’ mother. During desperate times, it was held over Victor’s mouth to keep him from making a peep.\n\nIncreases Victor's alert range by 4 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_madeleinesGlove"}, {"id": "de299bf2-2aa6-4187-bc52-16647bb6a8da", "internalId": "Addon_K22Power_7", "name": "Bloody Black Hood", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "A hood from one of the men that hunted Charlotte. Soon, he became the prey.\n\nDecreases Charlotte's waking time by 0.5 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_bloodiedBlackHood"}, {"id": "6fc80948-4b6a-43df-a7b1-66e548ece0f7", "internalId": "Addon_K22Power_8", "name": "Ceremonial Candelabrum", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "The candelabrum that Victor tipped over, causing his captors to burn. A symbol of his tenacity.\n\nIncreases time to crush Victor when he is dormant by 0.2 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_ceremonialCandelabrum"}, {"id": "c91016fc-3548-48fa-ac9c-59f2e3867c36", "internalId": "Addon_K22Power_9", "name": "Baby Teeth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K22Power"], "description": "Two teeth that Victor lost long ago. They’re unusually sharp.\n\nCrushing Victor when attached inflicts Blindness for 30 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Aurora/iconAddon_babyTeeth"}, {"id": "01cab41a-c92a-47f5-9f83-43985863d699", "internalId": "Addon_K24Power_1", "name": "Damaged Syringe", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "Medical equipment that fared poorly during the chaos that overwhelmed Raccoon City.Increases time it takes Survivors to use a Vaccine by 5 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_damagedSyringe"}, {"id": "23ff7c22-242a-4cac-b6ab-08c79f514d71", "internalId": "Addon_K24Power_10", "name": "Tyrant Gore", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A damaged sample from a T-002 Tyrant that died in combat. There are signs of severe burns.Increases mutation rate when destroying zombies with Tentacle Strike by 75%.Decreases zombie respawn time by 7.5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_tyrantGore"}, {"id": "93e08bf3-a289-4b1c-a841-acde06b1dfad", "internalId": "Addon_K24Power_11", "name": "Serotonin Injector", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A hormone that slightly relaxes the user for when stealth is required.Grants Undetectable for 15 seconds when a zombie is destroyed.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_serotoninInjector"}, {"id": "e214c3ae-6a43-41f9-b6f2-139eee9c3bf8", "internalId": "Addon_K24Power_12", "name": "T-Virus Sample", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A sample of the T-Virus developed by Umbrella Corporation, it causes extreme mutations and brain damage in its subjects.Increases mutation rate when destroying zombies with Tentacle Strike by 100%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_TVirusSample"}, {"id": "0539aec7-7605-433a-a152-fdb28d432a8f", "internalId": "Addon_K24Power_13", "name": "Plant 43 Vines", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "The tangled remnants of a plant infected with the T-Virus, it killed one of the researchers who developed it.Increases time required for Survivors to open Supply Cases by 4 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_plant43Vines"}, {"id": "16a0de2f-68e4-4c6f-8d35-2edd275d5bdd", "internalId": "Addon_K24Power_14", "name": "Licker Tongue", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A sticky prehensile tongue that easily wraps around anything it touches.Survivors are Hindered for an extra 1 second after being Contaminated.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_lickerTongue"}, {"id": "70524d83-399b-4f1e-a559-1e62369db3cc", "internalId": "Addon_K24Power_15", "name": "NE-α Parasite", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A parasite used in the development of Nemesis T-Types, it’s capable of hijacking its host’s brain.Becoming Contaminated inflicts Oblivious for 60 seconds, or until the Survivor receives a Vaccine.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_neaParasite"}, {"id": "b1b47e0c-fdbf-4f7e-a81b-860fee30d539", "internalId": "Addon_K24Power_16", "name": "Jill’s Sandwich", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "It’s tragically squished and dripping with blood from a recent battle. Despite that, it has a delicious aroma that can’t be missed.Reveals a Survivor's aura for 12 seconds after they unlock a Supply Case.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_jillSandwich"}, {"id": "8dcbd287-35a1-42ed-b5cc-70054587f74b", "internalId": "Addon_K24Power_17", "name": "Broken Recovery Coin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A coin depicting a bird framed by a laurel wreath. It’s broken in half.Removes 1 Supply Case from the trial.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_brokenRecoveryCoin"}, {"id": "a8f611be-a14e-4f88-9bcb-e58be2be2852", "internalId": "Addon_K24Power_18", "name": "Depleted Ink Ribbon", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "Who will save them now? There’s something about this ink ribbon being dry that energizes zombies.Decreases zombie respawn time by 5 seconds.Increases zombie movement speed by 50%.Any zombies destroyed after all generators are repaired will respawn in an exit area.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_depletedInkRibbon"}, {"id": "c10fb34a-cae9-4fb8-888b-c20c7aa526d1", "internalId": "Addon_K24Power_19", "name": "Shattered S.T.A.R.S. Badge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A symbol of hope for Raccoon City, utterly destroyed.Increases Zombie movement speed by 150% for 60 seconds after a generator is repaired.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_shatteredStarsBadge"}, {"id": "d795466b-7584-4321-ad17-293075fe6a77", "internalId": "Addon_K24Power_2", "name": "Brian’s Intestine", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "The small intestine of Brian Irons, chief of the RPD. It's an appetizing sight for zombies.Increases zombie movement speed by 25%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_briansIntestines"}, {"id": "4787aa51-7c57-4a33-ae73-ec5f1cff79cf", "internalId": "Addon_K24Power_20", "name": "Iridescent Umbrella Badge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A glass-like badge molded from The Fog itself. It represents a corporation that pushed far beyond ethical and humane science.Survivors are inflicted with Exposed for 60 seconds when using a Vaccine.\n\nExposed Survivors will be downed by basic attacks even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_iridescentUmbrellaBadge"}, {"id": "92383db4-8e60-4301-b3dc-163ba4e22064", "internalId": "Addon_K24Power_3", "name": "Visitor Wristband", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "An electronic Umbrella wristband for visitors to the facility. It also doubles as a tracking device.Increases zombie detection range by 2 meters and field of view by 10 degrees.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_visitorWristband"}, {"id": "e20d86e6-e31d-4abe-84fb-1bbef27d1b96", "internalId": "Addon_K24Power_4", "name": "S.T.A.R.S. Field Combat Manual", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A manual of compiled S.T.A.R.S. close-range combat knowledge. Edited by Chris Redfield.Zombies’ auras turn yellow for 6 seconds after hitting a Survivor.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_starsFieldCombatManual"}, {"id": "292dd2c6-7946-4dc9-8830-6c2a68c0ea4d", "internalId": "Addon_K24Power_5", "name": "Marvin’s Blood", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "The contaminated blood of a Raccoon City police officer.Increases mutation rate when hitting Survivors with Tentacle Strike by 16% for uncontaminated Survivors and by 50% for contaminated Survivors.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_marvinsBlood"}, {"id": "c0615a34-0d3f-49d6-938d-088ab318ee42", "internalId": "Addon_K24Power_6", "name": "Adrenaline Injector", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "A hormone that heightens senses and prepares the body to fight.Increases length of Killer Instinct when Survivors use a Vaccine by 3 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_adrenalineInjector"}, {"id": "321d081f-a43b-430a-b04f-1476b253fb57", "internalId": "Addon_K24Power_7", "name": "Mikhail’s Eye", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "While little was left of Mikhail, his left eyeball survived the blast that killed him. It remains a tasty treat for zombies.Increases zombie movement speed by 35%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_mikhailsEye"}, {"id": "ed35553e-5c38-4963-b578-f4cbde3f3d79", "internalId": "Addon_K24Power_8", "name": "Zombie Heart", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "The heart of an eviscerated zombie. It’s considered hazardous waste as it’s certainly teeming with viruses.Increases mutation rate when destroying zombies with Tentacle Strike by 75%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_zombieHeart"}, {"id": "7e69334d-2a1e-4dd4-b349-78469995093a", "internalId": "Addon_K24Power_9", "name": "Admin Wristband", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K24Power"], "description": "An electronic Umbrella wristband for administrators of the facility. While allowing access to secure areas, it also doubles as a tracking device.Increases zombie detection range by 4 meters and field of view by 18 degrees.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclipse/iconAddon_adminWristband"}, {"id": "d19c0a4a-1044-4d90-a9ea-55ada16e0f1b", "internalId": "Addon_K25Power_01", "name": "Bent Nail", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A simple nail that cut deep into Larry Cotton’s hand. Though the damage was superficial, it set into motion a horrifying set of events.\n\nGain 100% bonus Bloodpoints when binding a Survivor with a possessed chain.When hitting a Survivor with a possessed chain, only 1 additional chain will spawn.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_bentNail"}, {"id": "2d367f3f-435c-4216-b66b-e0c482f9e233", "internalId": "Addon_K25Power_02", "name": "Lively Crickets", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "Insects which scarcely avoided being eaten by a mysterious drifter.\n\nIncreases turn rate of possessed chains by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_livelyCrickets"}, {"id": "e51be203-8d21-4993-b69b-5dbd91286da3", "internalId": "Addon_K25Power_03", "name": "Burning Candle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A candle lit by Frank Cotton during a fatal summoning ceremony.\n\nDecreases the time for Chain Hunts to activate by 3 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_burningCandle"}, {"id": "ea588f3b-03f0-4b25-96b1-1f4c5df01dad", "internalId": "Addon_K25Power_04", "name": "Leather Strip", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "Leather strips torn from a cenobite’s uniform, allowing for the mutilation of exposed flesh.\n\nDecreases Summons of Pain’s cooldown time after possessing a chain by 3%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_leatherStrip"}, {"id": "d3772ee6-b320-40aa-bd6b-f7f102d3c109", "internalId": "Addon_K25Power_05", "name": "Wriggling Maggots", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "Larvae that poured from the mouth of a corpse hidden in the Cotton household.\n\nIncreases turn rate of possessed chains by 15%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_wrigglingMaggots"}, {"id": "0eaaee65-30fc-4878-b9c1-5b9de2198b11", "internalId": "Addon_K25Power_06", "name": "Spoiled Meal", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A pile of mold, feasted on by a cockroach. Perhaps a sign of Frank Cotton’s mysterious disappearance...\n\nIncreases the possessed chain’s maximum travel distance by 2 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_spoiledMeal"}, {"id": "2902dd8b-d579-4d4c-b96d-ae8745bdf3db", "internalId": "Addon_K25Power_07", "name": "Skewered Rat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A crude solution for the Cotton home’s rat problem.\n\nDecreases Summons of Pain’s cooldown time after possessing a chain by 9%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_skeweredRat"}, {"id": "acd9ec73-3412-48da-ab34-7c02532861a0", "internalId": "Addon_K25Power_08", "name": "Flickering Television", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A television that acted strangely upon the arrival of the cenobites.\n\nIncreases the maximum casting range of the gateway by 4 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_flickeringTelevision"}, {"id": "cc447841-a7f6-4126-98d0-00e01d53c9bb", "internalId": "Addon_K25Power_09", "name": "Liquified Gore", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "The result of summoning the cenobites. There’s no telling what part of the human body this belonged to.\n\nIncreases the time it takes Survivors to solve the Lament Configuration by 1 second.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_liquifiedGore"}, {"id": "f1137eae-46f3-4819-aee1-c6748744f3e9", "internalId": "Addon_K25Power_10", "name": "Larry’s Blood", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "The blood of Larry Cotton, which partially resurrected his brother Frank.\n\nIncreases the possessed chain's maximum travel distance by 4 meters.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_larrysBlood"}, {"id": "4ac281fc-8ca1-4829-be3e-21f4845805e9", "internalId": "Addon_K25Power_11", "name": "Torture Pillar", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A dangling slab covered in the gore of past victims.\n\nDecreases the time for Chain Hunts to activate by 6 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_torturePillar"}, {"id": "79c1d25f-ba67-4128-a87b-6d8f98eb94a2", "internalId": "Addon_K25Power_12", "name": "Frank’s Heart", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "The beating heart of Frank, given life from his brother’s blood.\n\nIncreases the maximum casting range of the gateway by 8 meters.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_franksHeart"}, {"id": "5b530d74-076e-4a4c-b04e-0b844ed0e1c4", "internalId": "Addon_K25Power_13", "name": "Larry’s Remains", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "The skeletal remains of Larry Cotton, covered in a thick, sticky layer of blood.\n\nIncreases the time it takes Survivors to solve the Lament Configuration by 2 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_larrysRemains"}, {"id": "9ebd5e9b-28b4-4c6f-9705-60a23db0bdda", "internalId": "Addon_K25Power_14", "name": "Slice of Frank", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A slab of Frank’s face after his torture at the hand of the cenobites.\n\nSurvivors carrying the Lament Configuration are inflicted with Exhausted.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_sliceofFrank"}, {"id": "bf359412-0881-4ff8-b262-9e135c71703d", "internalId": "Addon_K25Power_15", "name": "Greasy Black Lens", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A lens from the sunglasses of an obese cenobite whose fleshy rolls droop down his face and neck.\n\nSurvivors hit by a possessed chain are revealed for 6 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_greasyBlackLens"}, {"id": "c74e5d3f-ab35-4244-952d-5cdfa1ee4fa4", "internalId": "Addon_K25Power_16", "name": "Original Pain", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "The first pin pushed into Pinhead’s skull. Such pleasure and pain.\n\nWhen a Survivor breaks free from a possessed chain, reveal their aura for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_originalPain"}, {"id": "c6029d71-d2c4-4f9a-b284-df5f6ac03c7f", "internalId": "Addon_K25Power_17", "name": "Impaling Wire", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A wire that pierces the cheeks of a cenobite, while revealing the gaping wound on her neck.\n\nWhen a Survivor uses the environment to break a chain, an additional chain will target them.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_impalingWire"}, {"id": "93d50b29-4a07-4ea3-bd07-5c0b0a6f6cee", "internalId": "Addon_K25Power_18", "name": "Chatterer’s Tooth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A fragment from a cenobite whose mouth chatters endlessly. This tooth, having broken from his jaw, is finally silent.\n\nReveal the Lament Configuration.Picking up the Lament Configuration deactivates Chain Hunts.Gain the Undetectable status effect for 25 seconds after picking up the Lament Configuration.\n\nUndetectable hides the Killer's aura, Terror Radius and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_chatterersTooth"}, {"id": "bb41f562-29ec-42d8-80ad-37086be8a76d", "internalId": "Addon_K25Power_19", "name": "Engineer’s Fang", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A sharp tooth from the maw of a fleshy, scorpion-like creature, known to accompany cenobites on their grim undertakings.\n\nPossessed chains injure healthy Survivors, but do not bind them or spawn additional chains.Increases the time to close the gateway after hitting a healthy Survivor with a possessed chain by 50%.When hitting an injured Survivor with a possessed chain, only 1 additional chain will spawn.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_engineersFang"}, {"id": "131b4183-826a-4150-a920-443a3977a61a", "internalId": "Addon_K25Power_20", "name": "Iridescent Lament Configuration", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K25Power"], "description": "A glass-like puzzle box molded from The Fog itself. This replica differs from the original, providing altogether new powers.\n\nWhen a Chain Hunt is inactive, Survivors beyond 24 meters of the Lament Configuration cannot see its aura.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gemini/iconAddon_iridescentLamentConfiguration"}, {"id": "7ac4352c-3873-41ca-8c0e-c2299a2f4f30", "internalId": "Addon_K26Power_01", "name": "Oil Paints", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "There's little left but a few globs of black and gray, yet Carmina could paint an expansive landscape with them.\n\nIncreases the Dire Crow's Killer Instinct detection range by 1.5 meters.\n\nKiller Instinct intermittently reveals the location of Survivors.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_OilPaints"}, {"id": "91178c02-cf46-407e-a7e7-46fc04594a92", "internalId": "Addon_K26Power_02", "name": "Vibrant Obituary", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "Scrap newspaper, speckled with bright, eye-catching paint. It seems tragedy is a daily thing.\n\nIncreases the length of time a Dire Crow's Killer Instinct reveals Survivors by 3 seconds.\n\nKiller Instinct intermittently reveals the location of Survivors.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_VibrantObituary"}, {"id": "97571cb0-e679-4364-b687-0da33c07509b", "internalId": "Addon_K26Power_03", "name": "Thick Tar", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "Sticky, viscous sludge that Carmina used for an experimental piece. Once it sticks to skin, it's nearly impossible to get off.\n\nIncreases the time for Survivors to repel a Dire Crow swarm by 0.5 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_ThickTar"}, {"id": "1cfbf4e0-da6f-4daa-a5c0-23f45d646ec8", "internalId": "Addon_K26Power_04", "name": "Choclo Corn", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A type of corn common in South America. A few kernels are reason enough for a crow to stop for a snack.\n\nIncreases the time Dire Crows stay idle for before disintegrating by 2 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_ChocloCorn"}, {"id": "a3f16389-44a6-4928-9699-7d1c1212e549", "internalId": "Addon_K26Power_05", "name": "Automatic Drawing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "An experimental drawing Carmina made without conscious planning. Do not think—act.\n\nDecreases Birds of Torment cooldown time by 1.5 seconds after a Dire Crow disintegrates from inactivity.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_AutomaticDrawing"}, {"id": "acc34353-91e3-4548-bc4d-44fcaa97694f", "internalId": "Addon_K26Power_06", "name": "Festering Carrion", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A stomach-churning pile of meat and guts, yet it attracts hungry crows craving a bite.\n\nDecreases Birds of Torment cooldown time by 0.5 seconds after a Dire Crow takes flight.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_FesteringCarrion"}, {"id": "e6a7194c-68ed-48bc-a7f6-7819ee876985", "internalId": "Addon_K26Power_07", "name": "Velvet Fabric", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A striking red fabric Carmina used on an art project. Its brightness contrasted against black feathers.\n\nWhen a Survivor attempts to repel a Dire Crow swarm, the swarm's aura remains visible for an additional 1.5 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_VelvetFabric"}, {"id": "5c74737f-6ac5-40e7-80c2-20530a92d94b", "internalId": "Addon_K26Power_08", "name": "Still Life Crow", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "An ink drawing of a dead crow. Carmina's sadness over its death can be felt with each dark line.\n\nIncreases the time Dire Crows stay idle before disintegrating by 4 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_StillLifeCrow"}, {"id": "d3813ddc-ffda-4737-93f0-b9cf02fbb36c", "internalId": "Addon_K26Power_09", "name": "Untitled Agony", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A canvas that was targeted with swipes and thrashes of black paint following Matias' death. It radiates with heavy, crippling sorrow.When Dire Crows swarm a Survivor, it afflicts them with a 15% Hindered status effect for 1.5 seconds.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_UntitledAgony"}, {"id": "69efbf02-ec68-4f64-ad3e-9d7d925ded6f", "internalId": "Addon_K26Power_10", "name": "Charcoal Stick", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A stick of charcoal that conceals anything it rubs over.\n\nThe Dire Crow's aura is no longer visible when in flight.The Dire Crow's aura is visible for 0.5 seconds when summoned.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_CharcoalStick"}, {"id": "fded8dfa-7714-4487-982e-6aacf05cbe5d", "internalId": "Addon_K26Power_11", "name": "Darkest Ink", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "An unnatural ink, so wretched and dark that it seems to pull in light around it.\n\nWhen Dire Crows swarm a Survivor, it afflicts them with the Blindness status effect. The effect persists for 15 seconds after Dire Crows are repelled from a Survivor.\n\nBlindness prevents survivors from seeing auras.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_DarkestInk"}, {"id": "db5fbe31-b64a-4569-b159-6612c6257211", "internalId": "Addon_K26Power_12", "name": "O Grief, O Lover", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "An abstract ink drawing that Carmina drew before walking to the Death Leap.\n\nWhen Dire Crows swarm a Survivor, it afflicts them with the Exhausted status effect.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "rare",
