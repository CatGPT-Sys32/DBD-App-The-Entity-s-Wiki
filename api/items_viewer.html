 "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_OGriefOLover"}, {"id": "3dfd26aa-d0f3-484e-9d1c-56ef64ee6e1a", "internalId": "Addon_K26Power_13", "name": "Thorny Nest", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A nest that remained empty near Carmina's home. There are sharp thorns embedded in it.\n\nSurvivors damaged by a Dire Crow are afflicted with the Hemorrhage and Mangled status effects for 70 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_ThornyNest"}, {"id": "ce38a28a-456f-4c4d-9fdd-fbf8537bffea", "internalId": "Addon_K26Power_14", "name": "Silver Bell", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A shiny trinket that a crow took a liking to. The clinking of the bell was a distraction to all but Carmina.\n\nWhen Dire Crows swarm a Survivor it afflicts them with the Oblivious status effect.\n\nOblivious prevents Survivors from hearing and being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_SilverBell"}, {"id": "e144bc64-abc1-4c04-bebb-c7bd2482b65f", "internalId": "Addon_K26Power_15", "name": "Matias' Baby Shoes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A grieving reminder to Carmina that Matias would be with her, always watching.\n\nSurvivors within 5 meters of an idle Dire Crow have their auras revealed for 3 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_JacobsBabyShoes"}, {"id": "b46370c7-1375-4858-93b9-e87d9e1b6b30", "internalId": "Addon_K26Power_16", "name": "Severed Tongue", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "Carmina's tongue, cut from her mouth shortly before her death. The sight instills rage not just in her, but in her crows.\n\nDecreases the length of time The Artist's movement slows when Dire Crows take flight by 0.5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_SeveredTongue"}, {"id": "150fa7f5-767f-4f38-9a86-debe20d5f60f", "internalId": "Addon_K26Power_17", "name": "Garden of Rot", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A nude self-portrait in which Carmina depicts a rotting darkness growing outwards from within.\n\nWhen a Survivor affected by Dire Crows completes the repel action, they are afflicted by the Exposed status effect for 4 seconds.\n\nExposed Survivors are downed by basic attacks, even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_GardenofRot"}, {"id": "b21ad4d4-851e-4356-804d-e4f6a4fb235b", "internalId": "Addon_K26Power_18", "name": "Ink Egg", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "An unusual egg that seems to be nothing but a ball of semi-solid ink.\n\nIncreases the maximum capacity of Dire Crows by 1.Decreases the time Dire Crows stay idle before disintegrating by 2 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_InkEgg"}, {"id": "70596dbb-9376-46ab-b924-d64eb3780962", "internalId": "Addon_K26Power_19", "name": "Severed Hands", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "Carmina's severed hands, cut from her arms shortly before her death. The sight brings sheer fury to her and her protectors.\n\nAny Survivors within 3 meters of a Survivor being swarmed by Dire Crows will also be swarmed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_SeveredHands"}, {"id": "5412eaa4-a3aa-4481-8e5e-1f9aa4de719b", "internalId": "Addon_K26Power_20", "name": "Iridescent Feather", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K26Power"], "description": "A glass-like feather molded from The Fog itself. Simple as it may be, it's a symbol of those who watch over Carmina.\n\nThe Artist gains the Undetectable status effect when Birds of Torment is in cooldown and she holds no Dire Crows.Decreases the maximum capacity of Dire Crows by 1.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ion/iconAddon_IridescentFeather"}, {"id": "44ddc942-0030-42b6-8036-97d690885c9e", "internalId": "Addon_K28_01", "name": "Wooden Plank", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "A wooden plank torn from the stage where Otto Stamper sacrificed a meddling journalist.\n\nIncreases the amount Nightfall charges when a Survivor is hooked by 25%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_WoodenPlank"}, {"id": "2f452922-c798-4391-8ce0-b2e7ce723379", "internalId": "Addon_K28_02", "name": "Caffeine Tablets", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Stamper’s followers were told not to sleep, or they would bring the wrath of Druanee upon them. Towards the end, he brought in drugs from the mainland.\n\nAuras of locked lockers are visible in yellow while charging The Gloaming and Teleporting.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_CaffeineTablets"}, {"id": "89635818-ec72-4f8e-96a8-268737228aaa", "internalId": "Addon_K28_03", "name": "Mortar and Pestle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Disconnected from the world and modern medicine, Stamper's followers originally had to make do with the flora local to the island.\n\nThe Dredge will emerge from its Remnant facing the same direction as when Teleport is activated instead of the direction facing when the Remnant was placed.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_MortarAndPestle"}, {"id": "d3baf127-aace-498e-bb2b-77c08cf483de", "internalId": "Addon_K28_04", "name": "Follower’s Cowl", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "They believed the cowls proved their enlightenment, but they merely kept them in darkness.\n\nTeleporting to the Remnant will activate Killer Instinct even when not in Nightfall.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_FollowersCowl"}, {"id": "38b7a811-14df-452c-af17-6944babcbc62", "internalId": "Addon_K28_05", "name": "Burnt Letters", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Some followers tried to write letters home. Stamper ensured that nobody would have contact with the outside world.\n\nIncreases the amount Nightfall charges when injuring a Survivor by 25%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_BurntLetters"}, {"id": "74645b47-b540-454f-b2e8-c5ffcade9464", "internalId": "Addon_K28_06", "name": "Air Freshener", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "After her parents were found, this was in the bag of belongings the police returned. Haddie doesn’t know why she keeps it.\n\nAdds 1 additional Power Token for Teleporting.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_AirFreshner"}, {"id": "5b24f769-ba8c-4bfd-bb6b-e6200ece813a", "internalId": "Addon_K28_07", "name": "Haddie’s Calendar", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "She planned to cross out each day until her parents took her to India, but when tragedy struck, she abandoned her calendar.\n\nDecreases the time to exit a locked locker by 0.4 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_HaddiesCalendar"}, {"id": "b30e4ca9-a936-4495-9b7b-e0a74c532ea6", "internalId": "Addon_K28_08", "name": "Fallen Shingle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "After the Ottomarians were subsumed by The Dredge, the mansion fell into disrepair.\n\nUsing Reign of Darkness increases Nightfall charge speed by an additional 15% per second.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_FallenShingle"}, {"id": "4baba2d8-9afd-4ba5-909d-7c30a66b9d09", "internalId": "Addon_K28_09", "name": "Malthinker’s Skull", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Those who brought negativity to the commune would mysteriously disappear from time to time. Their remains were never found… until The Dredge brought them up.\n\nIncreases Nightfall charge speed by 25% while any Survivor is injured.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_MalthinkersSkull"}, {"id": "a0fafb45-c6a0-4444-a5a4-2f2dbbd3f115", "internalId": "Addon_K28_10", "name": "Worry Stone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "While the Ottomarians were told to think only positive thoughts, some kept these stones in their pockets to rub when negative thoughts arose.\n\nReveals the aura of a Survivor for 6 seconds when they lock a locker.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_WorryStones"}, {"id": "b56909b7-de73-4ecf-94d3-c60c7cbfd355", "internalId": "Addon_K28_11", "name": "Ottomarian Writing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "The words of Otto Stamper were the only words available for his followers to read, decrying malthink and malspeak.\n\nDecreases Teleport cooldown by 2 seconds while not in Nightfall.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_OttomarianWriting"}, {"id": "682fe36d-b10f-481a-9532-4d4664d49b76", "internalId": "Addon_K28_12", "name": "Broken Doll", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Followers brought their families to live in a utopia. None of them were spared.\n\nIncreases the duration of Nightfall by 20 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_BrokenDoll"}, {"id": "de6fa287-eeae-4bb2-ad01-f85f1d9972a9", "internalId": "Addon_K28_13", "name": "War Helmet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "While investigating an Overlap in the Alps, she found an abandoned war bunker. She took a helmet from it after the Overlap nearly took her.\n\nIncreases Killer Instinct duration by 1.5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_WarHelmet"}, {"id": "c38bfbe7-309a-4386-a4be-546a0b566ebd", "internalId": "Addon_K28_14", "name": "Destroyed Pillow", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "While not allowed to sleep, leaders among the Ottomarians tore sleeping supplies to shreds to prevent malthinkers from sneaking off to nap.\n\nDecreases Teleport cooldown by 2.5 seconds during Nightfall.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_DestroyedPillow"}, {"id": "45b7c364-081a-4ae3-b629-d879959e9a83", "internalId": "Addon_K28_15", "name": "Tilling Blade", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "The island was self-sufficient, and followers tilled the tough soil to grow crops during the warm season.\n\nWhen a Survivor is injured from full health during Nightfall, they are afflicted with the Blindness, Hemorrhage, and Mangled status effects for 80 seconds.\n\nBlindness prevents Survivors from seeing auras.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_TilingBlade"}, {"id": "e967ae8b-98de-4ea2-ba1a-7fb309bf545e", "internalId": "Addon_K28_16", "name": "Boat Key", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Only one boat allowed people on and off the island, and the keys were hidden away to prevent deserters.\n\nIncreases Teleport speed by 16% while not in Nightfall.When the exit gates are powered, all active locks are instantly broken.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_BoatKey"}, {"id": "b9696ebb-8a80-4114-a81a-7d84d82f9079", "internalId": "Addon_K28_17", "name": "Field Recorder", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Haddie documented all of her forays near Overlaps, to prove not only to the world but herself what she saw and felt.\n\nNightfall is active at the start of the trial.Nightfall is automatically triggered when the last generator is repaired.Any Survivor that comes into contact with a Remnant is afflicted with the Exhausted status effect for 15 seconds.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_FieldRecorder"}, {"id": "86043014-e0f6-4f07-b92d-39f8fccf9e87", "internalId": "Addon_K28_18", "name": "Lavalier Microphone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "She kept a lav mic nearby, allowing her to record her innermost feelings when under great stress.\n\nSurvivor auras are revealed for 3 seconds when using the last Teleport token.When entering a locker using Teleport, other lockers within 6 meters of Survivors open and slam their doors.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_LavalierMicrophone"}, {"id": "8d3e1674-eea1-4315-8c81-254e8843d649", "internalId": "Addon_K28_19", "name": "Sacrificial Knife", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "When a journalist attempted to warn the Ottomarians of his true task, he slit her throat as a warning to any dissenters.\n\nExiting a locker during Nightfall blocks all vault locations within 16 meters for 5 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_SacrificialKnife"}, {"id": "e02ab711-c7d3-4b07-a3ba-eeb630cc82dd", "internalId": "Addon_K28_20", "name": "Iridescent Wooden Plank", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K28Power"], "description": "Once the journalist’s blood stained the wooden boards of the stage, everything was set into motion for The Dredge’s arrival.\n\nSurvivors are afflicted with the Exposed status effect for the last 12 seconds of Nightfall.\n\nExposed Survivors are downed by basic attacks, even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Meteor/iconAddon_IridescentWoodenPlank"}, {"id": "0231fffc-76a8-4898-bc45-85c96a44b40a", "internalId": "Addon_K29_01", "name": "Jewel Beetle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A beautiful and valuable insect. While difficult to capture, it’s worth a pretty penny.\n\nDecreases the Virulent Bound extension when grabbing a Survivor mid-Bound by 50%.Gain 100% bonus Bloodpoints for Virulent Bound score events.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_jewelBeetle"}, {"id": "7046f1ca-21f1-4caf-9ee7-b3997bc86291", "internalId": "Addon_K29_02", "name": "Green Herb", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A common plant, usually known for its restorative properties.\n\nIncreases the rate of Infection when grabbing a Survivor during a Virulent Bound by 30%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_greenHerb"}, {"id": "414f4257-057e-468f-9e1a-be27b907c263", "internalId": "Addon_K29_03", "name": "Unicorn Medallion", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "An old medallion depicting a majestic unicorn. It was placed in storage for years.\n\nIncreases the initial Virulent Bound distance by 20%.Decreases the subsequent Virulent Bound distance by 20%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_unicornMedallion"}, {"id": "ebba1284-efed-469e-ad91-852b7c61ee41", "internalId": "Addon_K29_04", "name": "R.P.D. Shoulder Walkie", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Without the ability to communicate, the cops of Raccoon City are isolated and don’t stand a chance.\n\nDecreases the initial Virulent Bound distance by 20%.Increases the subsequent Virulent Bound distance by 20%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_RPDShoulderWalkie"}, {"id": "b1c2caef-d660-4d67-b568-a43a913d7f85", "internalId": "Addon_K29_05", "name": "Loose Crank", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "To the person whose only tool is a crank, the whole world looks like a crank-shaped hole.Increases movement speed between the first and second Virulent Bounds by 8%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_looseCrank"}, {"id": "faed5f7d-faca-4a36-bc52-8aee8f3e57eb", "internalId": "Addon_K29_06", "name": "Leather Gloves", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Gloves of a cold, calculating schemer. They impart an air of icy professionalism.Decreases the time to recharge Virulent Bound by 8%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_leatherGloves"}, {"id": "80661c8c-9bfa-4b94-b5cb-2de2c79573a0", "internalId": "Addon_K29_07", "name": "Lion Medallion", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "An old medallion depicting a brave lion. It was made when the Raccoon Police Station was still an art museum.Increases the distance at which Survivors are thrown by 30%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_lionMedallion"}, {"id": "4104ef64-8d2c-444c-9e09-c44f9e1d7cda", "internalId": "Addon_K29_08", "name": "Chalice (Gold)", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A chalice of pure gold used to celebrate the summer solstice.Increases the Virulent Bound extension when grabbing a Survivor mid-Bound by 50%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_goldChalice"}, {"id": "1f4cd10e-e196-43e2-b3d9-02219a7bed97", "internalId": "Addon_K29_09", "name": "Bullhorn", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "The commands screamed into this device riled up some and disoriented others.Survivors that use the First Aid Spray suffer from the Oblivious status effect for 30 seconds.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_bullhorn"}, {"id": "79092fa3-1c14-42e0-84a2-4a4bea63496c", "internalId": "Addon_K29_10", "name": "Portable Safe", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A small container that requires a complicated combination to unlock.Survivors injured by Virulent Bound suffer from the Hemorrhage status effect until fully healed.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors. This lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_portableSafe"}, {"id": "3a500dc1-c212-45ee-9a4a-20f9fb49ca3c", "internalId": "Addon_K29_11", "name": "Red Herb", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Acts as a reagent that strengthens the effect of that with which it is combined.Increases the time it takes for Survivors to use a First Aid Spray by 2 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_redHerb"}, {"id": "5ca3bb94-d8d5-47bc-af12-c62081870383", "internalId": "Addon_K29_12", "name": "Maiden Medallion", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A medallion depicting a beautiful maiden. Its purpose was unknown for many years.When a Survivor becomes fully Infected, they suffer from the Blindness status effect for 60 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_maidenMedalliom"}, {"id": "ade9b87f-4431-483b-825a-09092333b7d0", "internalId": "Addon_K29_13", "name": "Video Conference Device", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Many intricate conspiracies were orchestrated on devices just like this one.Increases the Infection passive gain rate by 30%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_videoConferenceDevice"}, {"id": "4ae4e662-58f2-479c-bb3a-8efc8097f528", "internalId": "Addon_K29_14", "name": "Egg (Gold)", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "A highly coveted foodstuff. The cash worth is second only to its regenerative effects.Increases the duration of the additional Virulent Bound window by 50%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_goldenEgg"}, {"id": "c71cc6b1-3c5d-4d1d-9a5d-82a8e9b9ab7a", "internalId": "Addon_K29_15", "name": "Dark Sunglasses", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Glasses enhanced with AR that grant the wearer an invaluable advantage on the battlefield.When a Survivor is fully infected with the Uroboros Infection, gain the Undetectable status effect for 20 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_darkSunglasses"}, {"id": "4d862e38-3d35-4f24-8577-f8302282a93c", "internalId": "Addon_K29_16", "name": "Helicopter Stick", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Debris from a helicopter crash. Few jobs are more dangerous than a helicopter pilot’s when Wesker is involved.When a Survivor uses a First Aid Spray, reveal their aura for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_helicopterStick"}, {"id": "fc62c768-4c8f-43f4-827a-903fcece559d", "internalId": "Addon_K29_17", "name": "Uroboros Tendril", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "The result of decades of Bio Organic Weapon research. It will not rest until it has swallowed the entire world.Increases movement speed while charging Virulent Bound by 5%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_uroborosTendril"}, {"id": "a676219e-643a-4b23-ae6e-4eed8c7278be", "internalId": "Addon_K29_18", "name": "Uroboros Virus", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "For some, the strength and resistance was worth the trade-off.When a Survivor reaches full infection, reveal their aura for 4 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_lasPlagasVariant"}, {"id": "79fcc459-e12f-4cf6-b955-49d4b6e3ce57", "internalId": "Addon_K29_19", "name": "Lab Photo", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "Wesker was as much a researcher as he was a guinea pig for Umbrella's bio-weapons.Destroy pallets and breakable walls when colliding while using Virulent Bound.Removes the ability to vault pallets while using Virulent Bound.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_labPhoto"}, {"id": "6f8a2cfd-e422-4610-8cec-203134aefc4b", "internalId": "Addon_K29_20", "name": "Iridescent Uroboros Vial", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K29Power"], "description": "The perfect bio-weapon. Decades of research have led to this.Survivors start the trial Infected with Uroboros.Survivors suffer from the Exposed status effect for 30 seconds when reaching maximum Infection.\n\nExposed Survivors will be downed by basic attacks even if uninjured.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Orion/iconAddon_iridescentUroborosVial"}, {"id": "522950e3-f181-42c8-b7be-5152ae9fefa9", "internalId": "Addon_K30_01", "name": "Gritty Lump", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "A rock-hard, dense loaf filled their stomachs on most days, giving them the energy to commit truly heinous acts.\n\nIncreases Guards' movement Speed while on Patrol by 9%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_GrittyLump"}, {"id": "15d9385c-867c-4494-9854-0cdffa50644b", "internalId": "Addon_K30_02", "name": "Map of the Realm", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "These unique leather maps were not easy to come by, but when they could not be purchased, they could be taken by force.\n\nIncreases the detection Range for Guards on Patrol by 2 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_MapoftheRealms"}, {"id": "45a0f1f3-3ea4-4d28-be34-59191322f7b0", "internalId": "Addon_K30_03", "name": "Tattered Tabard", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Cloaked in heavy fabrics, neither human nor nature could stop them once they had their target.\n\nIncreases Patrol time for all Guards by 8 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_TatteredTabard"}, {"id": "f4856980-72af-4e89-b1c0-6281fadf02de", "internalId": "Addon_K30_04", "name": "Pillaged Mead", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Drinks taken from their victims tasted sweet, but such frivolities were often short-lived.\n\nDecreases the amount of time it takes for a Guard to complete their Order action by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_PillagedMead"}, {"id": "773f9dde-88a7-4db9-b292-2dbf0ceec739", "internalId": "Addon_K30_05", "name": "Dried Horsemeat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Long campaigns often required restocking, and the steeds of fallen enemies were as good as any farm-fresh ration.\n\nIncreases the amount of time a Guard will Hunt a Survivor by 4 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_DriedHorsemeat"}, {"id": "486a9c6b-7285-471e-a081-8d45973fc60e", "internalId": "Addon_K30_06", "name": "Battleaxe Head", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Sander Rault was a tower of a man, terrifying in form and demeanor.\n\nDecreases the cooldown after summoning The Carnifex by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_BattleaxeHead"}, {"id": "a92c2db1-b195-4606-9b54-636289a7d0ae", "internalId": "Addon_K30_07", "name": "Treated Blade", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Durkos Malecek stuck to the shadows, and was an efficient slaughterer.\n\nDecreases the cooldown after summoning The Assassin by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_TreatedBlade"}, {"id": "a97e7581-d206-4a63-9391-cfca3db2102f", "internalId": "Addon_K30_08", "name": "Cold Steel Manacles", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Alejandro Santiago apprenticed as an armorer, and showed no remorse.\n\nDecreases the cooldown after summoning The Jailer by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_ColdSteelManacles"}, {"id": "000f7074-cc9e-4617-a312-a4d75e62f6a5", "internalId": "Addon_K30_09", "name": "Call To Arms", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Posted across many towns, lords desperate to protect their riches posted for able-bodied mercenaries. None survived.\n\nIncreases the length of a Patrol Path by 4 meters, and, while creating the path, movement speed is increased by 7%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_CallToArms"}, {"id": "cc299124-e4c6-4ef6-a5ff-6a56cd1ea2ff", "internalId": "Addon_K30_10", "name": "Sharpened Mount", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "To stand before the Standard of the Guardia Compagnia was to stand at the threshold between life and death.\n\nIncreases the time it takes for the Standard to spawn by 15%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Donut/iconAddon_SharpenedMount"}, {"id": "0b575300-4560-484d-a4bf-15f0361da7d6", "internalId": "Addon_K30_11", "name": "Grim Iron Mask", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "No method of torture was too base for Guardia Compagnia. Pain and humiliation went hand-in-hand.\n\nWhen a Survivor is Detected by a Guard, the Survivor suffers from Blindness for 75 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_GrimIronMask"}, {"id": "0b76271f-56aa-48c3-ad25-251b3f30f9b2", "internalId": "Addon_K30_12", "name": "Broken Hilt", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "A fresh weapon is clean, even surgical; an attack with a broken one is malicious and desperate.\n\nGuards inflict the Hemorrhage and Mangled status effects for 70 seconds when damaging a Survivor.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors.This lasts for a set duration or until fully healed.\n\nMangled increases time required to heal by 25% for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_BrokenHilt"}, {"id": "9feb4086-3b74-4d96-98e3-6f2eed4be556", "internalId": "Addon_K30_13", "name": "Ironworker’s Tongs", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Vital for repairs between battles and a horrifying, gauging, tearing improvisational weapon.\n\nWhen a Survivor escapes a Guard Hunt successfully, they suffer from the Oblivious status effect for 60 seconds.\n\nOblivious prevents survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_IronworkerTongs"}, {"id": "3c62ad3c-1e99-4a20-927d-5f2855356cca", "internalId": "Addon_K30_14", "name": "Town Watch’s Torch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Upon breaching a village, the first thing they would extinguish was the torches, and with them, hope.\n\nWhile a Guard is actively Hunting a Survivor, gain the Undetectable status effect.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_TownWatctTorch"}, {"id": "b4256deb-b3b3-4a83-9e4f-50b3678ba5e2", "internalId": "Addon_K30_15", "name": "Blacksmith’s Hammer", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "In their hands, everything was a weapon.\n\nGuards inflict the Broken status effect for 60 seconds when damaging a Survivor.\n\nBroken prevents Survivors from being healed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_BlacksmithHammer"}, {"id": "10535d79-4d96-485f-83cd-d4dfc49e2ed2", "internalId": "Addon_K30_16", "name": "Flint and Steel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Attacks at night were not uncommon. Fear was often their greatest ally.\n\nAfter summoning The Carnifex, The Knight can see the auras of Survivors within 24 meters of downed pallets for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_FlintandSteel"}, {"id": "9745c4c5-d257-4f43-9ad6-01fec053762c", "internalId": "Addon_K30_17", "name": "Healing Poultice", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Their reputation was so large, so horrible, that the mere knowledge that they were coming was enough to bring people to their knees.\n\nAfter summoning The Assassin, all Survivors within 8 meters from the Guard's initial position have their aura revealed for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_HealingPoultice"}, {"id": "b19dba30-e93c-4940-864d-aaab9a832374", "internalId": "Addon_K30_18", "name": "Jailer's Chimes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Many captives met the same grisly end for attempting to escape his clutches.\n\nAfter summoning The Jailer, Survivors that cross his Patrol Path have their aura revealed for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Donut/iconAddon_JailersChimes"}, {"id": "acb498e9-aa4b-491e-a5e3-050d7766a969", "internalId": "Addon_K30_19", "name": "Knight’s Contract", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "The original document contracting Tarhos to Vittorio’s employ. The laws of man could not stand up, though, to natural law.\n\nAfter giving an Order, the Guard will remain for an extra 8 seconds, triggering a Hunt if they detect a Survivor.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_KnightContract"}, {"id": "21983eda-d19f-4466-a6fd-9e1975369b89", "internalId": "Addon_K30_20", "name": "Iridescent Company Banner", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K30Power"], "description": "Where this banner was raised, those who called themselves \"civilized\" ran and hid, because for all their codes and laws, they had nothing resembling actual strength.\n\nWhile a Survivor is Hunted by a Guard, spikes block the exit for the Hunted Survivor. When they vault, that vault location is blocked for all Survivors for the duration of the Hunt.While creating a Patrol Path, passing through vault locations will block these locations for 25 seconds after summoning a Guard.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Quantum/iconAddon_IridescentCompanyBanner"}, {"id": "1b3b9491-ba72-4d0b-991c-4360ada3bec2", "internalId": "Addon_K31_01", "name": "Adi Valente #1", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "An original copy of the first issue of Adi Valente, the comic her father made while Adriana was a child.\n\nSurvivors with a Claw Trap suffer from 20% smaller skill checks. This effect lasts until the Claw Trap is removed.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_AdiValente1"}, {"id": "d4dc29e5-c518-4ac3-b461-85b20f6de92c", "internalId": "Addon_K31_02", "name": "High-Power Floodlight", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "A sudden and overwhelming light that discombobulates anyone foolish enough to approach.\n\nSurvivors with a Claw Trap suffer from the Blindness status effect. This effect lasts until the Claw Trap is removed. Blindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_HighPowerFloodlight"}, {"id": "323f9a56-718c-4ee0-a476-97ecdff9f71a", "internalId": "Addon_K31_03", "name": "Geographical Readout", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "The drones generate and communicate a detailed three-dimensional map of the terrain, making traversal easier.\n\nGain a 20% action speed bonus to breaking pallets and breakable walls, damaging generators, and vaulting for 8 seconds after deploying a Drone.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_GeographicalReadout"}, {"id": "35bd9d47-6128-4b9a-819e-70070e6cf669", "internalId": "Addon_K31_04", "name": "High Current Upgrade", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "A wider cable with low resistance that allows faster recharging of batteries.\n\nIncreases the time Survivors appear on the radar when detected by 1 second.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_HighCurrentUpgrade"}, {"id": "d3f3898f-2b14-41fe-8f34-d1b5f4943e04", "internalId": "Addon_K31_05", "name": "Adaptive Lighting", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "The drone takes account of the surrounding area and casts lights in a bewildering manner that obscures movement.\n\nIncreases the duration of the Undetectable status effect by 20%. Undetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_AdaptiveLighting"}, {"id": "78efbe07-2d9c-4ad1-b0cb-b751e87a4a99", "internalId": "Addon_K31_06", "name": "Stereo Remote Mic", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "An upgrade that allows increased three-dimensional audio tracking.\n\nDecreases the Disabled state duration of Drones by 15%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_StereoRemoteMic"}, {"id": "9fa5bcd5-cfeb-4ed8-ad5b-178cb515608c", "internalId": "Addon_K31_07", "name": "Supercharge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "The batteries may run a little hot, but removing the safety protocols from the cells makes them last a little longer.\n\nIncreases the battery life of Claw Traps by 15%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_Overcharge"}, {"id": "ebaba937-a596-4858-9b99-1a292f059e86", "internalId": "Addon_K31_08", "name": "Shotgun Speakers", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Capable of directing high-frequency noises in a single direction over great distances, the drones can focus in on one individual and distract them from danger for some time.\n\nSurvivors with a Claw Trap have no skill check warning. This effect lasts until the Claw Trap is removed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_ShotgunSpeakers"}, {"id": "96276941-dacc-4b0f-b5b2-725cc233e8e0", "internalId": "Addon_K31_09", "name": "Low-Power Mode", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "By intermittently powering off and on non-vital components, the drone can stay on for longer.\n\nDecreases Drone Rotation speed by 100%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_LowPowerMode"}, {"id": "048bef99-88a8-422a-82f7-f128489a54b6", "internalId": "Addon_K31_10", "name": "Powdered Glass", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Once used on the strings used for battle kites, this powdered glass took on a much more nefarious purpose on her blade.\n\nClaw Trapped Survivors you hit suffer from the Hemorrhage and Mangled status effects for 70 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until fully healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_PowderedGlass"}, {"id": "7dc5b81a-9892-4df2-8e21-287ca4191c67", "internalId": "Addon_K31_11", "name": "Vital Targeting Processor", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "An additional process in the drone’s programming more accurately predicts the weaknesses of potential prey.\n\nIncreases the Hindered status effect gained by Claw Trapped Survivors when detected by a Drone by 2%. Hindered reduces Survivor movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_VitalTargetingProcessor"}, {"id": "1a2d5544-f5a4-40a6-b6df-fe21f2770f40", "internalId": "Addon_K31_12", "name": "Brown Noise Generator", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "An ominous hum disseminates from the drone, blanketing the soundscape and making it difficult to hear anything else.\n\nSurvivors with a Claw Trap suffer from the Oblivious status effect. This lasts until the Claw Trap is removed. Oblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_BrownNoiseGenerator"}, {"id": "e36b4bee-e2e5-4129-b52d-8b5b4a68f12a", "internalId": "Addon_K31_13", "name": "Loose Screw", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "A bone-chilling rattling emanates from the drone, and it seems like it make fall at any minute, distracting Survivors from complicated tasks.\n\nSurvivors with a Claw Trap suffer from the Exhausted status effect for 6 seconds. Exhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_LooseScrew"}, {"id": "f04bf3b7-c218-4984-9331-6d6b23e66b18", "internalId": "Addon_K31_14", "name": "Infrared Upgrade", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Heat-detecting cameras focus in on high-stress individuals with pinpoint accuracy.\n\nAnytime a Claw Trap is removed, the Survivor's aura is revealed for 4 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_InfaredUpgrade"}, {"id": "2844a441-cfb0-46b1-9ae0-cd1759e61b93", "internalId": "Addon_K31_15", "name": "Randomized Strobes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Lights flash randomly on the ground, making it harder to find purchase on the uneven terrain.\n\nIncreases the duration of the Hindered status effect Claw Trapped Survivors suffer from when detected by a Drone by 1 second.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_RandomizedStrobes"}, {"id": "7fb482dc-b302-4175-8f20-67e1b2de3b1b", "internalId": "Addon_K31_16", "name": "Advanced Movement Prediction", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Even after they leave the zone of influence, a refined AI program predicts with high accuracy where a person will go next.\n\nWhen a Survivor receives a Claw Trap, reveal their aura for 6 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_AdvancedMovementPrediction"}, {"id": "2b990b5a-c289-4036-b4f8-bbaf15b2ab4a", "internalId": "Addon_K31_17", "name": "Ultrasonic Speaker", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "A high-frequency noise blaster that fills the sonic spectrum with disorienting sounds, making it impossible for observers to pick out more important noises.\n\nDecreases Survivors' scan line immunity duration by 10%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_UltrasonicTrapSpeaker"}, {"id": "a2a383d2-535f-4438-a318-b06af864334f", "internalId": "Addon_K31_18", "name": "Expired Batteries", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "The batteries on these Claw Traps have been swapped out with old alkaline batteries. Recharging is not recommended.\n\nAll Survivors start the trial with a Claw Trap, which has 50% less battery life.Claw Trap battery life increases by 10% for each Claw Trap received, up to 150%.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_ExpiredBatteries"}, {"id": "0831aa57-ce69-4f5f-bc4b-c567a5f80851", "internalId": "Addon_K31_19", "name": "Prototype Rotor", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "The cutting-edge design allows the drone to move with razor-sharp precision.\n\nIncreases Drones' rotation speed by 10%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_PrototypeRotor"}, {"id": "e568ed73-c993-4145-bdd1-d10cdc666eff", "internalId": "Addon_K31_20", "name": "Iridescent Unpublished Manuscript", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K31Power"], "description": "Before he disappeared, Adriana’s father had started a newer, darker manga, Sonhadores Sombrios.\n\nWhen a Drone is disabled, it gains a 32-meter Terror Radius for 15 seconds. During this time, gain the Undetectable status effect.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Saturn/iconAddon_IridescentUnpublishedManuscript"}, {"id": "0f545f51-d73f-4faf-8524-72d5745eff24", "internalId": "Addon_K32_01", "name": "Broken Security Key", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Dozens of security measures were applied across the ship’s equipment, and many of them were in a state of disrepair.\n\nThe reboot timer when the EMP affects the Biopods is reduced by 15%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_brokenSecurityKey"}, {"id": "5564e743-da8b-49e6-9165-80e97f9a3341", "internalId": "Addon_K32_02", "name": "Heavy Water", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A byproduct of the microfission reactors powering cryo and life support. Even a tiny leak would prove disastrous for onboard sensors.\n\nSupply cases' aura distance is reduced by 8 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_heavyWater"}, {"id": "91f7c898-cc59-42c7-a1e5-18bb7d8c431f", "internalId": "Addon_K32_03", "name": "Kid’s Ball Glove", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A kid’s baseball glove owned by one of the colonists. His memories of a youth playing catch were implanted.\n\nOverclock Mode duration is increased by 8%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_kidsBallGlove"}, {"id": "a0f215d2-8277-4ed7-9a13-0fadb4bd4763", "internalId": "Addon_K32_04", "name": "Nutritional Slurry", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Made for the organics, this disgusting concoction works well to nourish any organic matter.\n\nGet 2 extra Biopods.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_nutritionalSlurry"}, {"id": "2b55e744-0820-475a-89a1-6d04495d0513", "internalId": "Addon_K32_05", "name": "Diagnostic Tool (Construction)", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A device that gives highly accurate information on the lay of the land.\n\nReveals the auras of Survivors who pick up an EMP for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_diagnosticToolConstruction"}, {"id": "ae02ee02-c9f0-42ea-8bae-00722f4dd067", "internalId": "Addon_K32_06", "name": "Diagnostic Tool (Repair)", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A device that can find the flaws in constructed objects. Intended to help with repair.\n\nIncreases targeting range while in a Biopod by 4 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_diagnosticToolRepair"}, {"id": "1cad8749-514d-40d1-8368-12f1e085160a", "internalId": "Addon_K32_07", "name": "Android Arm", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Destroying the other HUX units not only made his extermination of humans easier, it gave him more parts to work with.\n\nSlipstream infection range between Survivors is increased by 2 meters and spreads 25% faster.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_androidArm"}, {"id": "d43af1dd-fb30-4a8a-9f47-42d7e2cf551f", "internalId": "Addon_K32_08", "name": "Cremated Remains", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "After extracting the other colonists’ DNA, he burned their remains.\n\nSurvivors afflicted with Temporal Slipstream suffer from Blindness.\n\nBlindness prevents survivors from seeing auras.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_crematedRemains"}, {"id": "e7f811e0-e1d8-41d1-85f1-a3c781cf65a5", "internalId": "Addon_K32_09", "name": "Foreign Plant Fibers", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Xenobotanists would have a field day with these strange samples of alien plant life.\n\nDecreases the duration of the Hindered status effect after being stunned by a pallet while in Overclock mode by 20%.\n\nHindered reduces Killer movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_foreignPlantFibers"}, {"id": "4d7b8f5e-688d-4e6a-b878-80c8166a9215", "internalId": "Addon_K32_10", "name": "Live Wires", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Unconnected wires attached to a live current that have a tendency to deliver a shocking surprise.\n\nA Survivor who is cleansed of Slipstream screams, interrupting their current action.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_liveWires"}, {"id": "c75146ee-c118-42a0-a9a5-7f7ecd86cde4", "internalId": "Addon_K32_11", "name": "Cryo Gel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A no-friction gel applied to crew members before entering deep cryo sleep.\n\nSlipstreamed Survivors suffer from the Hemorrhage status effect for 60 seconds when hit with a basic attack.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_cryoGel"}, {"id": "413d7156-a31c-418d-a810-d140bd599e88", "internalId": "Addon_K32_12", "name": "Denied Requisition Form", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Despite the advent of light speed technology, it seemed nothing could make bureaucracy any faster.\n\nAt the start of the trial, EMPs take 30 seconds longer to generate.All survivors start the match Slipstreamed.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_deniedRequisitionForm"}, {"id": "9b61a799-1823-4aea-ab1e-2953f4f4e4be", "internalId": "Addon_K32_13", "name": "Iridescent Crystal Shard", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A crystal from the alien structure that gave him sentience.\n\nWhen a Biopod is created, the auras of all Survivors within 10 meters of that Biopod are revealed to you for 6 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_iridiscentCrystalShard"}, {"id": "584db8a0-d765-49a7-984b-1a712a080f87", "internalId": "Addon_K32_14", "name": "Ultrasonic Sensor", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A limitation of organic hearing is a limited aural spectrum. Expanding that range is like gaining an entirely new sense.\n\nExiting a Biopod within 2 seconds of Slipstreaming a Survivor decreases your Terror Radius by 12 meters for 12 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_ultrasonicSensor"}, {"id": "45b1101b-f9fb-4b1c-aeca-fcbd74c595fc", "internalId": "Addon_K32_15", "name": "Spent Oxygen Tank", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Without air to breathe, organics don’t last long.\n\nWhen a survivor becomes Slipstreamed, they are Exhausted for 6 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_spentOxygenTank"}, {"id": "ee5b8bb1-9c4f-4a99-80ae-dbcd567d286f", "internalId": "Addon_K32_16", "name": "Nanomachine Gel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A gel that can heal wounds extremely quickly. However, the machines in it have a history of being hacked to hurt people too.\n\nDecreases Biopod cooldown by 15% after Slipstreaming a Survivor.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_nanomachineGel"}, {"id": "c160d4f9-0a8a-444d-a40a-180bbc7f1bc7", "internalId": "Addon_K32_17", "name": "Hyperawareness Spray", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Used by crew members during long shifts to avoid lapses in focus. Side effects of overuse include paranoia and, in extreme cases, hallucination.\n\nWhile a Survivor is Slipstreamed, they hear the Terror Radius as if you were nearby.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_hyperawarenessSpray"}, {"id": "cb5b69e4-7b88-491f-8019-436fdc52052c", "internalId": "Addon_K32_18", "name": "Hologram Generator", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "Originally used for communication and entertainment, this has been repurposed for obfuscation.\n\nAfter a successful Slipstream teleport from a Biopod, the target Survivor suffers from the Oblivious status effect for 60 seconds.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_hologramGenerator"}, {"id": "b3a65032-33e2-490b-bb39-de90fed7d51a", "internalId": "Addon_K32_19", "name": "Soma Family Photo", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A sentimental object that grounds someone to an imagined past.\n\nSlipstreaming a Survivor using a Biopod inflicts a 3% Hindered status effect for 6 seconds.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_somaFamilyPhoto"}, {"id": "a2cf237f-23a1-4405-9abb-08539effc310", "internalId": "Addon_K32_20", "name": "Crew Manifest", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K32Power"], "description": "A complete list of biographical data on the entire crew of the ship sent to Dvarka.\n\nReveals a Slipstreamed Survivor's aura for 8 seconds when they infect another Survivor.Increases the Slipstream infection range between Survivors by 2 meters.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Umbra/iconAddon_crewManifest"}, {"id": "51a578d4-d764-41ed-9df4-0f4e89ebb520", "internalId": "Addon_K33_01", "name": "Lambert’s Star Map", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Vital for interstellar travel, but not as useful on a smaller scale.\n\nDecreases the flame distance of Turrets by 2 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_lambertsStarMap"}, {"id": "3ebd7f12-fc02-4da8-9330-deb7e3964a85", "internalId": "Addon_K33_02", "name": "Cereal Rations", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Contains 100% of the recommended daily intake of Vitamin A. Tastes awful.\n\nTurret auras are visible while in tunnels and when coming out of vents for 3 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_CerealRations"}, {"id": "19a381dd-19f7-4c15-9aab-3b436214da39", "internalId": "Addon_K33_03", "name": "Ripley's Watch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "On a ship as massive as the Nostromo, synchronizing watches was important to keep track of work shifts.\n\nWhen a Turret removes Crawler Mode, it is destroyed automatically.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_ripleysWatch"}, {"id": "1160b0e5-015d-41b2-8054-c7728db77b80", "internalId": "Addon_K33_04", "name": "Ovomorph", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "It looks harmless, but the horrors held inside are immeasurable.\n\nThe cooldown of Crawler Mode is 25% faster while outside of tunnels.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_ovomorph"}, {"id": "7adbc83c-0ed5-4956-98f5-b5ba562e50fd", "internalId": "Addon_K33_05", "name": "Drinking Bird", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "One of the many tchotchkes littering the Nostromo’s living quarters. A bit of whimsy in an otherwise sterile environment.\n\nAfter exiting a tunnel, Killer Instinct duration is increased by 3 seconds.\n\nKiller Instinct intermittently reveals the location of Survivors.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_drinkingBird"}, {"id": "992e2e80-05fc-4547-9d10-6c30a250ed58", "internalId": "Addon_K33_06", "name": "Crew Headset", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "While they facilitated team communication, the constant chatter made the crew easier to track.\n\nWhile in tunnels, footstep detection is increased by 6 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_crewHeadset"}, {"id": "1699c557-5e5b-4432-a9eb-a0f700d16b63", "internalId": "Addon_K33_07", "name": "Emergency Helmet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "An extra helmet on the bridge, for use in emergencies only.\n\nIncreases resistance to staggering from Turrets by 15%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_emergencyHelmet"}, {"id": "5e7340d9-7cdf-48c4-9719-0834b6956cf5", "internalId": "Addon_K33_08", "name": "Ash’s Innards", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "While hardier, mechanical beings break too when enough force is applied.\n\nTurrets take 15 seconds longer to respawn after they are destroyed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_ashsInnards"}, {"id": "112c4349-56bd-4029-9d52-1d464821d7f1", "internalId": "Addon_K33_09", "name": "Light Wand", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "A portable light source used by Ash and Dallas while looking for the invasive creature. Mostly ineffective for lighting larger spaces.\n\nIncreases downtime of Turrets by 3 second after exiting a tunnel.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_lightWand"}, {"id": "1ed5ed28-ef29-444d-aea2-c84ab17543c1", "internalId": "Addon_K33_10", "name": "Kane’s Helmet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "A thin layer of glass was the difference between a minor inconvenience and the tragic destruction of the Nostromo’s crew.\n\nSurvivors hit with a Tail Attack are Mangled for 70 seconds.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_kanesHelmet"}, {"id": "884fee1d-40f4-46e2-bde9-dc83df339fa3", "internalId": "Addon_K33_11", "name": "Multipurpose Hatchet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Equally useful for destruction and repair.\n\nSurvivors hit by a Tail Attack suffer from Hemorrhage.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors. This lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_multipurposeHatchet"}, {"id": "60e0a290-95c3-4cb9-91b3-7197f0162dd1", "internalId": "Addon_K33_12", "name": "Parker’s Headband", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "A bold fashion choice that doubled as a handy way to wick sweat from the eyes.\n\nAfter exiting a tunnel, gain 5% Haste for 3 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_parkersHeadband"}, {"id": "135135a1-4162-424b-8250-8d2bbeb6aaf0", "internalId": "Addon_K33_13", "name": "Molted Skin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "The Xenomorph molted many times as it rapidly grew on the Nostromo. Its shed skin was a constant reminder of its presence.\n\nAfter deploying a Turret, the deploying Survivor suffers from the Exhausted status effect for 30 seconds.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_moltedSkin"}, {"id": "1dfbe1f3-e663-4391-b7a0-145411e0bd68", "internalId": "Addon_K33_14", "name": "Brett’s Cap", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "This Nostromo ballcap was fashionable, but severely limited his vertical field of vision.\n\nDestroying a Turret causes all Survivors within 16 meters to suffer from Blindness for 25 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_brettsCap"}, {"id": "7c7c9ee2-9a5f-463b-aa73-509db2c8875e", "internalId": "Addon_K33_15", "name": "Semiotic Keyboard", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Its symbols are designed to be universally recognizable, but they take some getting used to.\n\nGenerators within 16 meters of a Turret have the intensity of their auras determined by their repair progression.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_semioticKeyboard"}, {"id": "c01cbcc8-391d-4927-927e-6e614b55c9ca", "internalId": "Addon_K33_16", "name": "Harpoon Gun", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Barely a weapon, its use is only viable in a situation of last resort.\n\nExiting a tunnel and hitting a Survivor within 30 seconds causes all Survivors further than 16 meters from you to scream and reveal their locations.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_harpoonGun"}, {"id": "4f144b38-8448-4a9d-8a4b-6e63c17b2bf5", "internalId": "Addon_K33_17", "name": "Cat Carrier", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "Saving the cat is a noble goal. It’s also very distracting.\n\nExiting Crawler Mode due to a Turret attack makes you Undetectable for 30 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_catCarrier"}, {"id": "d980da00-ef4b-4639-aec1-6fe2030ca3db", "internalId": "Addon_K33_18", "name": "Self-Destruct Bolt", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "They needed to be removed to start, and replaced to end, the self-destruct sequence. Just seeing them evokes a sense of urgency.\n\nIncreases vault speed by 30% while in Crawler Mode.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_selfDestructBolt"}, {"id": "7cd1ecd2-3446-4fa2-8da1-ff1d9b72f511", "internalId": "Addon_K33_19", "name": "Improvised Cattle Prod", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "A brutal and noisy weapon, which might have been more effective against a cow.\n\nEach time a generator is completed, a 15-second timer starts. Any Survivor who comes within 10 meters of a Control Station during that time has their aura revealed for the remainder of the timer.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_improvisedCattleProd"}, {"id": "e2f256e8-fef4-42d0-a036-3852a1ff7b73", "internalId": "Addon_K33_20", "name": "Acidic Blood", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K33Power"], "description": "When damaged, the Xenomorph’s unique physiology made it deadlier than ever.\n\nWhile exiting a tunnel in Crawler Mode, any Survivor who stuns you with a pallet in the next 20 seconds takes damage. If that Survivor is already injured, they suffer from Deep Wound.\n\nDeep Wound will put a Survivor in the dying state unless it is mended before the timer runs out.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wormhole/iconAddon_acidicBlood"}, {"id": "c6b47ccd-256b-4a12-bcb0-9e40b8c344f7", "internalId": "Addon_K34_01", "name": "Strobing Light", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "With the right training, can be used to make people more suggestible.\n\nDecreases the Terror Radius by 8 meters when Hidey-Ho Mode is in cooldown.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_strobingLight"}, {"id": "aaa5e966-a1f1-4d30-a2e0-68529836c0fe", "internalId": "Addon_K34_02", "name": "Doll Eyes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "One of the advantages of possessing a mass-produced doll is easy access to replacement parts.\n\nWhile in Hidey-Ho Mode, reveals auras of all windows and downed pallets within 20 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_dollEyes"}, {"id": "7b7a7eec-1299-4700-82fe-bcb434bc6482", "internalId": "Addon_K34_03", "name": "Tiny Scalpel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Sometimes, a precision cut can lead to a beautiful bleed.\n\nWhile in Hidey-Ho Mode, blood pools are more visible.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_tinyScalpel"}, {"id": "bc8770c0-1336-420a-ac0f-001401edd296", "internalId": "Addon_K34_04", "name": "Good Guy Box", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Someone kept this box around in case they needed to bring Chucky back to the store.\n\nDecreases Slice & Dice hit cooldown by 7%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_goodGuyBox"}, {"id": "3d51841f-3c24-4f36-814c-27ebdd28c574", "internalId": "Addon_K34_05", "name": "Power Drill", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Comes with a dozen convenient drill tips. They all make a big mess when applied to people.\n\nReduces Hidey-Ho Mode cooldown by 10% after hitting a Survivor with Slice & Dice.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_powerDrill"}, {"id": "f0991fa2-bbdb-42e1-b1be-143b6f27e03a", "internalId": "Addon_K34_06", "name": "Electric Carving Knife", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "The annoying buzzing sound means it’s ready to carve some flesh.\n\nDecreases Slice & Dice miss cooldown by 5%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_electricCarvingKnife"}, {"id": "db3ff8c0-dbe4-44ed-b5e6-fca94f7c76ab", "internalId": "Addon_K34_07", "name": "Jump Rope", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Good for a bit of exercise, or for tying up your target.\n\nIncreases duration of Slice & Dice by 8%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_jumpRope"}, {"id": "60a3f652-215e-4e5f-84bf-e71bf7ef39d8", "internalId": "Addon_K34_08", "name": "Hair Spray & Candle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "An aerosolized inferno that will ensure a bad hair day is the least of your worries.\n\nDecreases the time that basic attacks remove from Hidey-Ho Mode by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_flamingHairSpray"}, {"id": "cdf7d848-5d37-4bb1-bd3b-d70de2316dab", "internalId": "Addon_K34_09", "name": "Automatic Screwdriver", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "A good way to make mechanical adjustments on the fly.\n\nMissing a Slice & Dice reduces Hidey-Ho Mode cooldown by 8%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_automaticScrewdriver"}, {"id": "e4ca3c3a-8fb5-4669-ad06-f7466eb0cea2", "internalId": "Addon_K34_10", "name": "Portable TV", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Small enough for any room. Just keep it out of the bath.\n\nSlice & Dice duration increased by 70% once the Exit Gates have been powered.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_portableTV"}, {"id": "b4c2c674-4d85-4123-85c9-1639f758308a", "internalId": "Addon_K34_11", "name": "Silk Pillow", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "For when you want
