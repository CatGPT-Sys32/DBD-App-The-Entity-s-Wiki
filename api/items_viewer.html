t probably from a broken mirror.\n\nHitting a Survivor with Slaughtering Strike adds 20 seconds to Evil Incarnate's duration.Slaughtering Strike only deals a single health state of damage.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_reflectiveFragment"}, {"id": "015e88db-1b5f-42db-a722-9f895a384ad9", "internalId": "Addon_Stalker_ScratchedMirror", "name": "Scratched Mirror", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A standing portable vanity mirror which has been violently scratched with a sharp metallic object.\n\nReveal the auras of Survivors within 32 meters while stalking.Cannot leave Stalker Mode.Score events for hits grant 100% more Brutality and 200% more Deviousness Bloodpoints.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_scratchedMirror"}, {"id": "efd8c494-92e7-4650-833d-4bdad6b138dd", "internalId": "Addon_Stalker_TackyEarrings", "name": "Tacky Earrings", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A very cheap piece of jewelry made from plastic. Painted to resemble precious material.\n\nIncreases movement speed while stalking by 20%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_tackyEarrings"}, {"id": "96f744b2-df3f-4248-b1e3-7ed4223b96cc", "internalId": "Addon_Stalker_TombstonePiece", "name": "Tombstone Piece", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A fist-sized granite piece taken from a broken tombstone.\n\nWhen Evil Incarnate activates, you become Undetectable for 20 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_tombstonePiece"}, {"id": "3bbe1eee-cdb7-42c4-bb75-150af748a70e", "internalId": "Addon_Stalker_VanityMirror", "name": "Vanity Mirror", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A standing portable vanity mirror in perfect condition except for a fine layer of dust and face powder covering it.\n\nWhen Evil Incarnate ends, you see the auras of all Survivors for 4 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_vanityMirror"}, {"id": "f2b9fe0f-57fb-4138-b4dd-c997530cc69f", "internalId": "Addon_TheOnryo_01", "name": "Videotape Copy", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A copy of the deadly videotape imprinted upon by Sadako. It dampens the desire for vengeance.\n\nIncreases the range at which Survivors gain Condemned from Projection by 2 meters", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_VhsCopy"}, {"id": "b2ff62b3-2b90-4882-a2c9-6e5620911f6d", "internalId": "Addon_TheOnryo_02", "name": "Old Newspaper", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "It tells of a local woman who predicted a volcanic eruption, evidence used to initially find Sadako.\n\nIncreases the Manifestation invisibility duration by 33%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_OldNewspaper"}, {"id": "d91609c9-edaa-45b1-b722-a5579dc16a49", "internalId": "Addon_TheOnryo_03", "name": "Cabin Sign", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The cabin where both Tomoko and Reiko watched the tape. Carries the memory of those first curses.\n\nDecreases the time it takes for a TV to turn on after Projection by 4.5 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_CabinSign"}, {"id": "392e9872-2c90-459a-8e59-604f37c1d3c8", "internalId": "Addon_TheOnryo_04", "name": "Mother's Mirror", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A mirror from Sadako's mother's house. A reminder of what Sadako has lost.\n\nIncreases the Manifestation intermittent visibility duration by 2 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_MothersMirror"}, {"id": "cb52bd34-7a81-4f04-8463-a16ff7f6cbeb", "internalId": "Addon_TheOnryo_05", "name": "Reiko's Watch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The watch that Reiko left her son Yoichi. A distracting and constant reminder of one’s impending doom.\n\nIncreases the invisibility duration while Demanifested by 25%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_ReikosWatch"}, {"id": "dd4ebfe1-01e3-41f1-8ffc-738800bc7fa3", "internalId": "Addon_TheOnryo_06", "name": "Sea-Soaked Cloth", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The hood worn by the mysterious figure in the tape. Makes those near it unable to trust what they see.\n\nWhile Survivors are within 8 meters of a powered TV, they are afflicted with the Blindness status effect. This effect lingers for 7 seconds after the TV is turned off.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_SeaSoakedCloth"}, {"id": "9492cca1-e18e-4ea6-ae6c-1eafed26de51", "internalId": "Addon_TheOnryo_07", "name": "Clump of Hair", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "Once beautiful and long, Sadako now hides behind her ragged, matted locks.\n\nDecreases the range at which The Onryō is visible while Demanifested by 6 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_ClumpOfHair"}, {"id": "a4a745bd-de4d-4fa2-8ce3-ec8fb5305603", "internalId": "Addon_TheOnryo_08", "name": "Well Stone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A piece of the well where Sadako was trapped, an image burned into the mind of all those who have watched the tape.\n\nDecreases the time it takes for a TV to turn on after being turned off by a Survivor by 7 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_WellStone"}, {"id": "06db4ce5-3a0d-483f-91ad-3f8fb7705e91", "internalId": "Addon_TheOnryo_09", "name": "Yoichi's Fishing Net", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The net Yoichi used while fishing with his grandfather. A reminder that death comes to us all.\n\nSurvivors with at least 4 stacks of Condemned suffer from Blindness.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_YoichisFishingNet"}, {"id": "acee50f0-e229-4953-a603-6ec5ceced3ba", "internalId": "Addon_TheOnryo_10", "name": "Rickety Pinwheel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A pinwheel found in the caves of Izu Oshima. It spins even when there is no wind, disorienting those who see or hear it.\n\nWhile Survivors are within 8 meters of a powered TV, they are afflicted with the Oblivious status effect. This effect lingers for 7 seconds after the TV is turned off.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_RicketyPinwheel"}, {"id": "acb37843-8883-466c-b74b-22171ad657f4", "internalId": "Addon_TheOnryo_11", "name": "Well Water", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "Water from the well where Sadako was left to die. Murky and black, it obscures everything around it.\n\nIncreases the duration of the Undetectable status effect by 2 seconds when Manifesting by any means.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_WellWater"}, {"id": "239f7e8f-be2c-4bc9-a147-0f2d40af7343", "internalId": "Addon_TheOnryo_12", "name": "Ring Drawing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A drawing of the view from inside the well, as drawn by a young Yoichi. Helping those cursed by the tape can only bring misfortune.\n\nWhen hooking a Survivor carrying a tape, other Survivors gain 1 Condemned stack.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_RingDrawing"}, {"id": "519b504b-dbf5-4fed-ae02-fc88b8a1b150", "internalId": "Addon_TheOnryo_13", "name": "Bloody Fingernails", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "Sadako's bloody fingernails, lost as she tried to claw her way out of the well. Evidence of her single-minded need to kill.\n\nIncreases the duration of Projection’s bonus movement speed by 50%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_BloodyFingernail"}, {"id": "44acc06d-1df3-4b0e-9699-9a9695fdb7f1", "internalId": "Addon_TheOnryo_14", "name": "Mother's Comb", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The comb Sadako's mother used in the tape. Sadako's psychic abilities are enhanced when she focuses on it.\n\nTurning off a TV will trigger a loud noise notification.Reveals the yellow aura of any TV that is turned off by any means.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_MothersComb"}, {"id": "f3039128-dc0b-4fc6-8541-cdb698db5d5d", "internalId": "Addon_TheOnryo_15", "name": "VCR", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The original VCR that played Sadako's tape. It is still warm to the touch.\n\nAll TVs play the Projection effects when The Onryō Projects to a TV.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_VCR"}, {"id": "9e196bde-9e93-4cc9-af53-9126fc5ccafe", "internalId": "Addon_TheOnryo_16", "name": "Distorted Photo", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "Those who have watched the tape find all photos of them distorted, a reminder of their impending doom.\n\nSurvivors witnessing a Manifestation from within 16 meters will scream, and then their auras are shown for 4 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_DisortedPhoto"}, {"id": "825831de-d54f-41e4-832a-3d07e487d6c8", "internalId": "Addon_TheOnryo_17", "name": "Telephone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "After watching the video, victims receive a phone call. They are frozen in fear as they realize they have seven days to live.\n\nManifestation afflicts Survivors within 7 meters with a 3% Hindered status effect for 3 seconds.\n\nHindered reduces survivor movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_Telephone"}, {"id": "b178e43c-015a-447e-88cf-a2c08bc7153a", "internalId": "Addon_TheOnryo_18", "name": "Tape Editing Deck", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The editing deck used by Reiko and Ryuji to analyze and copy the tape. Copying and sharing the tape is the only way to survive the curse.\n\nEach Survivor starts the trial with a Tape in their possession, and their target TV is the furthest from their location.Anytime a Survivor inserts a tape in their target TV, reveal their aura for 6 seconds", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_TapeEditingDeck"}, {"id": "8d95f757-be63-41bc-a87a-e8177f91b4d5", "internalId": "Addon_TheOnryo_19", "name": "Remote Control", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "A remote for the VCR at the cabin. It allows Sadako to focus on those enemies at a distance.\n\nAfter using Projection, the Auras of Survivors who are within 12 meters of a powered TV are revealed to you for 7 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_RemoteControl"}, {"id": "dc3cf397-8945-422f-9666-a4a2eacbba2f", "internalId": "Addon_TheOnryo_20", "name": "Iridescent Videotape", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K27Power"], "description": "The original tape containing Sadako’s curse.\n\nProjection does not turn off TVs, and does not apply Condemned.Increases the time it takes for a TV to turn on after being turned off by Survivors by 20%", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Kepler/iconAddon_IridescentVHStape"}, {"id": "4f660c43-5d26-457d-8caf-cf56b8d48cab", "internalId": "Addon_Toolbox_001", "name": "Scraps", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "Springs, screws and gears. Mostly unusable junk.\n\nAdds 8 charges to the Toolbox.", "role": "survivor", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_scraps"}, {"id": "720c0788-b344-4576-bac8-da2e71ba7869", "internalId": "Addon_Toolbox_002", "name": "Wire Spool", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "A portable but heavy spool of copper wire.\n\nAdds 12 charges to the Toolbox.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_spoolOfWire"}, {"id": "327ae3e0-7b67-4d94-a8ea-e3c6c55fce9d", "internalId": "Addon_Toolbox_003", "name": "Clean Rag", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "A mundane rag. Suspiciously clean.\n\nIncreases the Toolbox's repair speed by 20%.", "role": "survivor", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_cleanRag"}, {"id": "da8d0ccc-e999-4bba-b2e5-54155f1b81f7", "internalId": "Addon_Toolbox_004", "name": "Grip Wrench", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "An adjustable wrench with a tough grip. Essential in any Toolbox.\n\nHooks sabotaged using the Toolbox take an extra 20 seconds to respawn.", "role": "survivor", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_gripWrench"}, {"id": "ddf1bb7a-35d7-484c-b67f-0f0859d01a56", "internalId": "Addon_Toolbox_005", "name": "Hacksaw", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "A small hand saw mounted with a metal cutting blade.\n\nIncreases the Toolbox's sabotage speed by 30%.", "role": "survivor", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_metalSaw"}, {"id": "f074d9e1-80ce-479e-85f2-934b4fa40c6a", "internalId": "Addon_Toolbox_006", "name": "Protective Gloves", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "Thick gloves which reduce manual dexterity but protect hands from injury.\n\nPrevents the Killer from being notified when sabotaging a hook with the Toolbox.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_protectiveGloves"}, {"id": "72d98251-fcab-4c56-a62d-555d69bc0ffc", "internalId": "Addon_Toolbox_007", "name": "Brand New Part", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "This intricate mechanical part feels oddly out of place. It is clean and shiny as if straight out of the factory.\n\nToolbox Repair action is replaced with Install Brand New Part.During the installation, you will be faced with a difficult Skill Check.Upon succeeding the Skill Check, the generator's required charges are reduced by 10.This add-on is consumed after use.", "role": "survivor", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_brandNewPart"}, {"id": "20162357-7ad8-4489-98b8-d5438bd56e6a", "internalId": "Addon_Toolbox_008", "name": "Instructions", "type": "itemaddon", "itemType": "toolbox", "parents": [], "description": "Someone quickly painted what seems to be repair instructions on this piece of bark.\n\nEliminates Skill Checks while repairing with the Toolbox.", "role": "survivor", "rarity": "common", "bloodwe us Effect for 80 seconds.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wales/iconAddon_lostMemoriesBook"}, {"id": "b03cdd51-a4a4-48c8-84e6-26a649093e62", "internalId": "ADDON_TormentMode_MannequinFoot", "name": "Mannequin Foot ", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_TormentMode"], "description": "The smooth grey foot of a mannequin, brutally torn from its leg.Rites of Judgement trails inflict Exhausted for 10 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wales/iconAddon_mannequinFoot"}, {"id": "e9885d77-c301-451c-a219-437609a6e6e7", "internalId": "ADDON_TormentMode_MistyDayRemainsofJudgment", "name": "Misty Day, Remains of Judgment ", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_TormentMode"], "description": "A painting of an imposing figure wearing a steel pyramid atop his head. Victims are caged in the background.Injuring a Survivor with Punishment of the Damned reveals their aura for 8 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wales/iconAddon_mistyDay"}, {"id": "a5390bae-4029-45a1-822b-dc2b1d4908b8", "internalId": "ADDON_TormentMode_ObsidianGoblet", "name": "Obsidian Goblet ", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_TormentMode"], "description": "An ancient looking goblet carved from pure obsidian.Punishment of the Damned destroys breakable walls and pallets.Increases Punishment of the Damned's cooldown by 20%.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Wales/iconAddon_obsidianGoblet"}, {"id": "56256cf5-6fa6-408d-8879-eddeb0cccf83", "internalId": "ADDON_Tor tion": "Traps sharpened with this sickly gleaming stone seem to gain a life of their own.\n\nEvery 30 seconds, one closed Bear Trap chosen at random becomes set.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_diamondStone"}, {"id": "6e46f834-0881-4e0a-ac34-970eed056858", "internalId": "ADDON_trap_OilyCoil", "name": "Oily Coil", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Beartrap"], "description": "An oiled spring that marks the hands of those who meddle with a Bear Trap.\n\nWhen resetting a Bear Trap, reveal the aura of the most recent Survivor to disarm it for 5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_oilyCoil"}, {"id": "1fb89486-5311-4ed1-ad85-085eb6665041", "internalId": "ADDON_trap_RustedJaw", "name": "Rusted Jaws", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Beartrap"], "description": "These Bear Trap jaws are covered with crusty and volatile rust spots that makes injuries particularly difficult to heal.\n\nBear Traps inflict Mangled on trapped survivors for 70 seconds.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_rustedJaws"}, {"id": "6d162085-e637-4db7-9d3e-2b159f4554ac", "internalId": "ADDON_trap_StitchedBag", "name": "Tension Spring", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Beartrap"], "description": "A high tension spring that snaps back into place after being stretched.\n\nA Bear Trap resets 2 seconds after a Survivor escapes from it.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_tensionSpring"}, {"id": "7bcb3031- porated the sounds into one of his more popular tracks.\n\nIncreases Blade reload speed at lockers by 25%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_YumisMurder"}, {"id": "f6558d2b-b75c-4714-a5df-c27d672acc86", "internalId": "Addon_Trickster_15", "name": "Diamond Cufflinks", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "Cufflinks gouged into the eyes of a sasaeng fan who made the mistake of stalking Ji-Woon. Rubbing off the blood, there’s so much to be seen in the glitter.\n\nReveals Survivor auras for 6 seconds when their Laceration reaches one Blade hit from maximum.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_DiamondCufflinks"}, {"id": "7ec5714b-5af9-48e1-b8fb-c6b66d15f23b", "internalId": "Addon_Trickster_16", "name": "Edge of Revival Album", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "The Trickster’s debut album. The coarse and vicious tone was met with a mixed reaction from fans despite critical acclaim.\n\nBlades shatter when hitting the environment, dealing 50% Laceration to nearby Survivors.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_EdgeOfRevivalAlbum"}, {"id": "f71b70df-b10c-44bd-a78b-a62ab2b8e3d3", "internalId": "Addon_Trickster_17", "name": "Trick Blades", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "Specialty blades that are only seen as faulty by those who lack imagination. A young Ji-Woon dazzled spectators with the tricks he performed.\n\nBlades ricochet off the environment twice.Ricochet hits grant 100 Bloodpoints.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_TrickBlades"}, {"id": "95c2b92e-bcbd-435c-afca-952b725d91da", "internalId": "Addon_Trickster_18", "name": "Cut Thru U Single", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "The first single released by NO SPIN after Ji-Woon joined their ranks. Scored an all-kill on the Korean charts.\n\nBlades pierce through Survivors.Subsequent Survivors hit by the same Blade receive 50% Laceration.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_CutThruUsingle"}, {"id": "c205eba5-18f6-4e2f-a036-097aef16f457", "internalId": "Addon_Trickster_19", "name": "Death Throes Compilation", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "A collection of the final sounds from Ji-Woon's victims, adapted to a vinyl record. Terrifying and emotionally raw.\n\nReveal the aura of Survivors hit during Main Event for 6 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_DeathThroesCompilation"}, {"id": "1ccb10b0-c298-4be7-aef5-00d34c6c35f3", "internalId": "Addon_Trickster_20", "name": "Iridescent Photocard", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_ThrowingKnives"], "description": "A glass-like photo molded from The Fog itself. Ji-Woon's eyes shimmer holographically on his grinning face.\n\nFor each consecutive Blade hit, gain a stackable 1% Haste status effect, up to a maximum of 7%.This bonus is lost when missing a Blade throw or when injuring a Survivor by any means.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Comet/icons_Addon_IridescentPhotocard"}]};
        
        document.getElementById('stats').textContent = 
            `${data.items.length} Items | ${data.offerings.length} Offerings | ${data.addons.length} Addons`;
        
        function getImageUrl(item) {
            if (!item.image) return '';
            let url = item.image;
            if (!url.endsWith('.png') && !url.endsWith('.jpg')) url += '.png';
            return url;
        }
        
        function createCard(item, onclick = null) {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <img src="${getImageUrl(item)}" alt="${item.name}" onerror="this.style.display='none'">
                <div class="name">${item.name}</div>
                <div class="rarity rarity-${item.rarity}">${item.rarity || ''}</div>
            `;
            if (onclick) div.onclick = () => onclick(item, div);
            return div;
        }
        
        function renderItems() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = '';
            data.items.forEach(item => grid.appendChild(createCard(item, showItemAddons)));
        }
        
        function showItemAddons(item, cardElement) {
            document.querySelectorAll('#items-grid .card').forEach(c => c.classList.remove('selected'));
            cardElement.classList.add('selected');
            
            // Find addons by itemType match
            const relatedAddons = data.addons.filter(addon => 
                item.itemType && addon.itemType === item.itemType
            );
            
            const section = document.getElementById('item-addons');
            const grid = document.getElementById('addon-grid');
            document.getElementById('addon-title').textContent = `Addons for: ${item.name} (${relatedAddons.length} found)`;
            grid.innerHTML = '';
            
            if (relatedAddons.length === 0) {
                grid.innerHTML = '<p style="color:#888">No addons found for this item type.</p>';
            } else {
                relatedAddons.forEach(addon => {
                    const div = document.createElement('div');
                    div.className = 'addon-card';
                    div.innerHTML = `
                        <img src="${getImageUrl(addon)}" alt="${addon.name}" onerror="this.style.display='none'">
                        <div class="name">${addon.name}</div>
                        <div class="rarity rarity-${addon.rarity}">${addon.rarity || ''}</div>
                    `;
                    div.title = addon.description || '';
                    grid.appendChild(div);
                });
            }
            section.classList.add('visible');
        }
        
        function renderOfferings() {
            const grid = document.getElementById('offerings-grid');
            grid.innerHTML = '';
            data.offerings.forEach(item => {
                const card = createCard(item);
                card.title = item.description || '';
                if (item.retired) card.style.opacity = '0.5';
                grid.appendChild(card);
            });
        }
        
        function renderAddons() {
            const grid = document.getElementById('addons-grid');
            grid.innerHTML = '';
            data.addons.forEach(addon => {
                const card = createCard(addon);
                card.title = `${addon.description || ''}\n\nParents: ${addon.parents?.join(', ') || 'None'}`;
                grid.appendChild(card);
            });
        }
        
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`[onclick="showTab('${tabId}')"]`).classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }
        
        renderItems();
        renderOfferings();
        renderAddons();
    </script>
</body>
</html>
