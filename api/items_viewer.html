 "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_BelayingPins"}, {"id": "dfeb7b3a-347c-4b4f-a966-1088c1d2a9bc", "internalId": "Addon_K38_07", "name": "Smoked Snapper", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A protein-packed foodstuff, preserved to ensure its quality over long expeditions.\n\nPower cooldown is reduced by 5%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_SmokedSnapper"}, {"id": "7887988a-d574-498c-865e-4f27eb5fe865", "internalId": "Addon_K38_08", "name": "Knotted Rope", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "The dog's jaws tightened around the makeshift toy, and he thrashed it back and forth.\n\nReduces the cooldown of basic attacks against Survivors injured while in the Dog's Grab by 2%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_KnottedRope"}, {"id": "f1794875-c3b0-4887-a19d-cac7f7c99299", "internalId": "Addon_K38_09", "name": "Spyglass", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Used to spot what one is looking for, no matter how far away.\n\nWhen Houndsense duration ends, the Survivor's aura is revealed for 3 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_Spyglass"}, {"id": "7031017b-cfe4-4861-b289-be542e8d616a", "internalId": "Addon_K38_10", "name": "Waterskin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "She gave him the last of her water, knowing he needed the strength to hunt.\n\nIncreases the Dog's Chase redirect distance by 20%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_Waterskin"}, {"id": "9afd279e-cfe2-4a78-9f50-ed4811c54a84", "internalId": "Addon_K38_11", "name": "Unfinished Map", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Features details on the area that would come to be known as the Bermuda Triangle.\n\nSurvivors revealed by Killer Instinct when entering the Houndsense Radius also become Exhausted for 15 seconds.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_UnfinishedMap"}, {"id": "58f4c756-e423-4c0e-9572-634af714485e", "internalId": "Addon_K38_12", "name": "Training Bell", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Even over great distances, it will notify a dog exactly where their owner is.\n\nWhen the Dog is stunned, the responsible Survivor's aura is revealed for 8 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_TrainingBell"}, {"id": "ac4cfea3-4950-4840-866c-edf82640dde3", "internalId": "Addon_K38_13", "name": "Spiked Collar", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A dangerous accessory worn by dogs sent to battle.\n\nSurvivors injured while in the Dog's grab suffer from Mangled and Hemorrhage for 60 seconds.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_SpikedCollar"}, {"id": "6c12b007-3ce9-4784-9654-e195d0ab1dc6", "internalId": "Addon_K38_14", "name": "Fatty Meat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A strange and irresistible treat for a canine friend.\n\nSurvivors who are affected by Houndsense periodically scream without notifying The Houndmaster every 15 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_FattyMeat"}, {"id": "3c7c6d8b-082d-4236-8f69-5a43873b7886", "internalId": "Addon_K38_15", "name": "Leather Harness", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Allows greater control over a dog’s every movement.\n\nIncreases the Dog's Chase speed by 20% for 30 seconds after a generator is repaired.This bonus becomes permanent once all generators are repaired.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_LeatherHarness"}, {"id": "e7bb38bc-d7f0-4171-8b4d-6ff6861ea487", "internalId": "Addon_K38_16", "name": "Gunpowder Tin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Useful for all manner of explosive schemes.\n\nIncreases the action speed for breaking downed pallets, breakable walls, and damaging generators by 30% for 20 seconds when at least one Survivor becomes affected by Houndsense.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_GunpowderTin"}, {"id": "bab06e1f-221a-4353-b708-9a148a9ad287", "internalId": "Addon_K38_17", "name": "Marlinspike", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "As good for unsplicing rope as it is for causing grievous bodily harm.\n\nSurvivors within 20 meters of a Survivor who is Grabbed by the Dog become afflicted with Houndsense.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_Marlinspike"}, {"id": "398b2811-d609-435d-9e52-5c4782635e5d", "internalId": "Addon_K38_18", "name": "Ship Figurehead", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A trophy torn from the bow of another ship.\n\nWhile the Dog is following The Houndmaster, Terror Radius is increased by 8 meters.While the Dog is away from The Houndmaster, Terror Radius is reduced by 8 meters.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_ShipFigurehead"}, {"id": "1fd05ea1-0b8a-4d40-a3c0-150b33879465", "internalId": "Addon_K38_19", "name": "Torn Novel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A book given to her by her father. All but destroyed after a raid.\n\nWhile aiming the Chase Redirect, auras of Survivors within 10 meters of the Dog are revealed.Upon reassuming control of The Houndmaster, Survivors' auras revealed this way are shown for an additional 2 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_TornNovel"}, {"id": "b161419e-dae1-4b60-80c5-ccbd820279ce", "internalId": "Addon_K38_20", "name": "Iridescent Wheel Handle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Once used to guide a great vessel across the open seas, its remnants now serve as a memory of times past.\n\nIncreases the time the Dog lingers at a Search destination by 20%.While the Dog is running to and from the Search destination, The Houndmaster gains the Undetectable status effect.Standing on the Search Path removes the Undetectable status effect.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_IridescentWheelHandle"}, {"id": "f0f79632-bcff-45b3-bd46-3cb98d5a02bf", "internalId": "Addon_K39_01", "name": "Kaneki’s Wallet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Lost to a strange boy who happened to bump into him on the street.\n\nIncreases the window to perform consecutive Kagune Leaps by 3 second.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_KanekisWallet"}, {"id": "64bb3ccd-c5d3-4f67-add3-4493606341ac", "internalId": "Addon_K39_02", "name": "The Black Goat’s Egg", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "The book he used to bond with a woman of consequence.\n\nPerfectly timed grab-attacks grant a 100% Bloodpoints bonus.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_TheBlackGoatsEgg"}, {"id": "d6988a92-adc8-4f8c-8377-50c385b78ca5", "internalId": "Addon_K39_03", "name": "Anteiku Apron", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Standard-issue uniform at a lovely little coffee shop.\n\nDecrease the slide after a Kagune Leap by 50%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_AnteikuApron"}, {"id": "df341171-b74a-48ee-9c7b-2b9485c326aa", "internalId": "Addon_K39_04", "name": "Fresh Coffee", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Every ghoul's favorite drink, the one human delicacy they can consume.\n\nIncreases Kagune Leap speed by 14%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_freshCoffee"}, {"id": "bb9b792d-c68d-4241-84cf-7f16814e80ac", "internalId": "Addon_K39_05", "name": "Broken Chain", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Nothing could restrain him once he finally embraced his full potential.\n\nDecreases Kagune Leap cooldown by 35% when not Enraged.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_brokenChain"}, {"id": "bcde9c65-5c0d-432c-bc31-2ec385c1e1a5", "internalId": "Addon_K39_06", "name": "Kaneki's Satchel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Essential gear for any student trying to keep up with their studies.\n\nIncreases the speed of the third consecutive Kagune Leap by 30%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_satchel"}, {"id": "c6b4455c-8ad8-4c6c-8b1b-4948d1eb329c", "internalId": "Addon_K39_07", "name": "Hide’s Headphones", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "They belonged to his best friend, who he tried to keep safe at all costs.\n\nSurvivors affected by Kagune Mark are afflicted with the Oblivious status effect.\n\nOblivious prevents Survivors from hearing and being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_HidesHeadphones"}, {"id": "689ddccf-4aa8-4c47-ac20-0775abcf8187", "internalId": "Addon_K39_08", "name": "Taiyaki", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Ghouls can never eat human food, but they can find ways to pretend.\n\nIncreases the Enraged Mode countdown by 5 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_taiyaki"}, {"id": "aae51b07-faf3-4432-b01a-505cc3736b33", "internalId": "Addon_K39_09", "name": "Blood-Stained Handkerchief", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Even a single drop of blood can excite the senses of any gourmet.\n\nIncreases the Kagune's reach by 1 meter.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_bloodStainedHandkerchief"}, {"id": "3a1f0666-d58e-45da-874b-cae57c08e666", "internalId": "Addon_K39_10", "name": "Mado’s Glove", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "A glove worn by a ghoul investigator.\n\nUpon removing Kagune Mark, Survivors suffer from the Exhausted status effect for 15 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_MadosGlove"}, {"id": "270c307a-a0bc-4502-9f01-2fe47b65f4ec", "internalId": "Addon_K39_11", "name": "Hinami’s Umbrella", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "It was raining the day her mother was viciously taken from her.\n\nIncreases the amount of time added to the Enraged countdown for each perfectly timed grab-attack by 10 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_HinamisUmbrella"}, {"id": "46f30de3-2be5-4521-8186-0f940fa95023", "internalId": "Addon_K39_12", "name": "Rize's Glasses", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "They made her look innocent enough, which was exactly what she wanted.\n\nUpon entering Enraged Mode, reveals the auras of any healthy Survivors repairing generators for 8 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_RizesGlasses"}, {"id": "a9cadc7b-e7dc-4a05-a497-caae0260c515", "internalId": "Addon_K39_13", "name": "Aogiri Tree Robe", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Garments worn by an anti-human ghoul organization.\n\nIf a generator is completed while The Ghoul is in Enraged Mode, gain the Undetectable status effect for 20 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_AogiriTreeRobe"}, {"id": "ce1b9831-284e-46f6-b47f-4067f43f68b3", "internalId": "Addon_K39_14", "name": "Amon’s Necktie", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Cold, calculated, precise. He had a firm grasp of every situation.\n\nWhile aiming mid-Leap, reveals the auras of pallets and windows within 32 meters.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_AmonsNecktie"}, {"id": "1e3eff9f-f7c3-40bf-958c-b099f743c022", "internalId": "Addon_K39_15", "name": "Red Spider Lily", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "The white flowers turned red as blood.\n\nWhile in Enraged Mode, base attacks afflict Survivors with the Hemorrhage status effect for 60 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors. This lasts for a set duration or until fully healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_redSpiderLily"}, {"id": "879e52e5-9a49-402f-9699-7ff246d3ea18", "internalId": "Addon_K39_16", "name": "CCG ID Card", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "A card carried by every ghoul investigator.\n\nPerforming a Kagune Leap vault reveals the auras of all Kagune Marked Survivors within 24 meters for 3 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_CCGIDCard"}, {"id": "8d4599e3-57d6-4698-96e9-8439330686c7", "internalId": "Addon_K39_17", "name": "Red-Headed Centipede", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "The thing caused him immeasurable torment.\n\nVaulting while in Enraged Mode blocks that vault location for 10 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_redHeadedCentipede"}, {"id": "93d8035a-aa58-4ded-a4cf-7932b2639065", "internalId": "Addon_K39_18", "name": "Torture Apparatus", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "A cutting tool used every time his extremities grew back.\n\nWhen Enraged Mode ends, The Ghoul gains 5% Haste for 6 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_medicalApparatus"}, {"id": "d0f32c9b-cc33-492c-a0bb-3d8a205a2ed7", "internalId": "Addon_K39_19", "name": "Yamori’s Mask", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "Worn by a ghoul from the 13th district whose hobby was torture.\n\nUpon hooking a Survivor while in Enraged Mode, all Survivors further than 40 meters scream and reveal their location for 3 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_YamorisMask"}, {"id": "dd4f8a4f-7ff2-4c5a-b959-9e2a53bdc9a8", "internalId": "Addon_K39_20", "name": "Iridescent Eye Patch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K39Power"], "description": "An innocent way to hide his true nature from the world.\n\nPerforming a pallet vault on your third consecutive Kagune Leap while in Enraged Mode destroys the pallet.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Icecream/T_UI_iconAddon_iridescentEyePatch"}, {"id": "7c6322f0-a4d9-4708-8ef3-81521910f1e4", "internalId": "Addon_K40_01", "name": "Help Wanted Ad", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "We all need a little help sometimes...\n\nWhile winding up an axe throw, see a preview of the starting trajectory.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_HelpWantedAd"}, {"id": "e3704195-0b73-42b3-9d12-456c15ecb1bc", "internalId": "Addon_K40_02", "name": "Security Guard’s Badge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "The badge comes with certain privileges for whoever carries it.\n\nWhen exiting a Security Door after a teleport, gain the Undetectable status effect for 25% longer.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_SecurityGuardsBadge"}, {"id": "dbcb8c9f-4fe7-43f4-8ce2-15a0aa0c5209", "internalId": "Addon_K40_03", "name": "Restaurant Menu", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "The lamination is peeling and crusty. How appetizing.\n\nDecreases the minimum time required to retrieve an axe embedded in the environment by 20%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_RestaurantMenu"}, {"id": "ef92a9e9-81f0-4fcb-b254-6a85189cec4b", "internalId": "Addon_K40_04", "name": "Rotten Pizza", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Food poisoning is no laughing matter.\n\nIncreases the duration of Killer Instinct from the Axe's area of effect by 100%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_RottenPizza"}, {"id": "c9b87526-4be7-494f-a6b0-b5d5a9754513", "internalId": "Addon_K40_05", "name": "Ripped Curtain", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Taken from Pirates Cove, caught on the animatronic that lived there.\n\nWhen an Axe hits a Survivor, they gain the Hemorrhage and Mangled status effects for 60 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors. This lasts for a set duration or until fully healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_RippedCurtain"}, {"id": "ed64345f-02e4-49c8-b3f6-8cda832ecd59", "internalId": "Addon_K40_06", "name": "Greasy Paper Plate", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "It sticks to everything it touches. No amount of soap can wash it off.\n\nIncreases the time required for Survivors to remove the Axe by 15%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_GreasyPaperPlate"}, {"id": "2b14d3f0-51f4-480a-8a6b-5db2cd218836", "internalId": "Addon_K40_07", "name": "Streamers", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Employees would throw them over the rafters for a quick decoration.\n\nIncreases the speed at which you travel through Security Doors by 15%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_Streamers"}, {"id": "9acfe80e-1d30-46c7-aa56-f0d537a93623", "internalId": "Addon_K40_08", "name": "Party Hat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "The party never ends, no matter how much they beg.\n\nWhen an Axe is embedded in the environment:Increases its area of effect radius to 250% over 3 seconds.Decreases the duration of the area of effect by 20%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_PartyHat"}, {"id": "49d53e5c-dfe9-4eae-ba1e-545903742d47", "internalId": "Addon_K40_09", "name": "Office Phone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "He tried to leave messages as a warning. He didn't last long, either.\n\nSurvivors within 24 meters of a Survivor with an embedded Axe gain the Oblivious and - if injured - Broken status effects. Reveals the aura of the Axe to Survivors within this range.\n\nDecreases the time required to remove the Axe from another Survivor by 50%.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.\n\nBroken prevents Survivors from being healed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_OfficePhone"}, {"id": "7ed0f2c8-3615-4858-8ff9-9ff18af24709", "internalId": "Addon_K40_10", "name": "Chica’s Bib", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "A good way to keep Mr. Cupcake from making a mess.\n\nSurvivors within the Axe's area of effect gain the Exhausted status effect for 5 seconds.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_ChicasBib"}, {"id": "5f917f34-2bdf-487e-9d08-3d91295f57d0", "internalId": "Addon_K40_11", "name": "Bonnie’s Guitar Strings", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Worn strings that are off-tune and liable to snap.\n\nUnlocks potential in one’s aura reading ability.\n\nWhile moving between Security Doors, the repair progress of generators can be determined by the intensity of their auras.\n\nDecreases the duration of the Undetectable status effect upon exiting the Security Door by 100%.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_BonniesGuitarStrings"}, {"id": "f8effcd3-f9e6-44c3-907d-2d915b1c5ffc", "internalId": "Addon_K40_12", "name": "Foxy’s Hook", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "A pirate’s hook that seems more menacing than playful.\n\nPlayers within range of the Axe's area of effect gain 7% Haste for 6 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_FoxyHook"}, {"id": "ea4650fa-0656-4360-ad1c-5c4653d21ea8", "internalId": "Addon_K40_13", "name": "Purple Guy Drawing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "He only takes 10 seconds to draw!\n\nWhile a Survivor has an Axe embedded in them, any rushed interactions they perform reveal their aura to you for 3 seconds.\n\nRemoving the Axe from themselves reveals their aura to you for 6 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_PurpleGuyDrawing"}, {"id": "207de7ea-c578-4c7f-ba6c-2cefaf795e9c", "internalId": "Addon_K40_14", "name": "Freddy’s Hat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Gabriel trusted the wrong grown-up. Now he's the star of the show.\n\nIncreases the Axe's weight while throwing by 100%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_FreddysHat"}, {"id": "3979a1c1-e7bb-445d-aa41-714a73909bae", "internalId": "Addon_K40_15", "name": "Loot Bag", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Open the bag, and see what goodies are inside.\n\nWhile a Survivor has an Axe embedded in them: Exit gates will be blocked for them and any Survivors within 12 meters.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_LootBag"}, {"id": "15b8d202-ab91-448a-aa3d-33871d299d8e", "internalId": "Addon_K40_16", "name": "Access Panel", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Gaining control over the security doors is key to getting the job done.\n\nYour Axe gains the ability to travel through Security Doors, and will exit straight through the connected Security Door.\n\nWhen aiming your Axe:Gain Killer Instinct on Survivors within 4 meters of any Security Door.Reveals the auras of all Security Door numbers.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_AccessPanel"}, {"id": "c238176d-23bf-4ddb-be1d-f9a690e9f6b3", "internalId": "Addon_K40_17", "name": "Celebrate! Poster", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "The celebration lasts all night long, or until no one is left.\n\nWhile the Axe is embedded in a Survivor, all players within 32 meters gain 12% Haste and vault 20% faster.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_CelebratePoster"}, {"id": "471f1cc4-fe2a-415d-9322-d94d637513d9", "internalId": "Addon_K40_18", "name": "Faz-Coin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Collecting these tokens comes with a price.\n\nUpon throwing the Axe, it gains a Terror Radius of 24 meters until it is reclaimed. You gain the Undetectable status effect for 10 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_FazCoin"}, {"id": "45f525e9-3e5e-4261-ae86-fe58c1b1b568", "internalId": "Addon_K40_19", "name": "Endo CPU", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Greater computing power, for greater efficacy.\n\nWhile within the Axe's area of effect, pallets, breakable doors, and generators break 40% faster. This effect lingers for 5 seconds after leaving the area of effect.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_EndoCPU"}, {"id": "dbe1d30e-d89c-4630-b1e5-e7b0ebf31d40", "internalId": "Addon_K40_20", "name": "Iridescent Remnant", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K40Power"], "description": "Molten metal - in the right hands, it's the key to immortality.\n\nWhen you start moving to a Security Door, upright pallets within 32 meters of the destination Door are blocked for 12 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Ketchup/T_UI_iconAddon_IridescentRemnant"}, {"id": "189c654f-1ec3-4582-99e8-a6cf033a311c", "internalId": "Addon_K41_01", "name": "Sticky Lozenge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A simple tablet to moisten a dry throat, often taken before an audition.\n\nWhen charging Regurgitate, see a preview of the impact zone.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_StickyLozenge"}, {"id": "7821c3f2-3314-445a-b0c6-26b2c3c1be66", "internalId": "Addon_K41_02", "name": "Broken Tiara", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A dazzling stage prop worn by a pharaoh's daughter, as distracting as it is fake.\n\nSurvivors are Oblivious under the Glowing Fungus' effect.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_BrokenTiara"}, {"id": "91d68476-67cd-4958-ba47-17eaf8e4013e", "internalId": "Addon_K41_03", "name": "Luckless Mouse", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A game of cat and mouse always gets the blood pumping.\n\nIncreases Headlong Flight's charges by 2.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_LucklessMouse"}, {"id": "716d29cd-494c-42ac-9ed3-17dd2129092c", "internalId": "Addon_K41_04", "name": "First Libretto", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "She felt as if she could walk on the air after landing a role in her first opera.\n\nDecreases Headlong Flight's consumption rate by 30% for 15 seconds any time you hook a Leeched Survivor.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_FirstLibretto"}, {"id": "8c0ffc7b-21a6-4a21-926e-a4e61cb54850", "internalId": "Addon_K41_05", "name": "Wriggling Parasite", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A fragile organism that has an unusual effect on its host.\n\nIncreases the passive growth rate to Leeched II by 16%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_WrigglingParasite"}, {"id": "ceb6901b-deea-463e-8cad-b8e0f37b4e98", "internalId": "Addon_K41_06", "name": "Chunk of Malai", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A varied source of protein contributes to good gut health.\n\nDecreases the Glowing Fungus' cleanse rate by 8% for each Leeched Survivor.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_ChunkOfMalai"}, {"id": "d7b0e960-2504-49ca-972b-ea33ce23efe3", "internalId": "Addon_K41_07", "name": "Crumpled Sheet Music", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "Before her desperation, she hoped that continued practice would be enough to succeed.\n\nGain 12 charges to Headlong Flight when a Survivor is hit by a Leeching Gland.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_CrumpledSheetMusic"}, {"id": "844b4c05-5da0-430e-8481-6e180a2f8af8", "internalId": "Addon_K41_08", "name": "Defective Metronome", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "The metronome sparks as it plays at a frenetic pace.\n\nSurvivors under the Glowing Fungus' effect are Exhausted.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_DefectiveMetronome"}, {"id": "f99ebd92-dbf6-4075-b9a3-a7b084dab6ab", "internalId": "Addon_K41_09", "name": "Pig's Eye", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "It still glistens with saliva.\n\nWhen a Survivor eats a Glowing Fungus from further than 40 meters away, their aura is revealed to you for 6 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_PigsEye"}, {"id": "64dfa3ea-9d82-45f5-9279-ae47806bd1d3", "internalId": "Addon_K41_10", "name": "Chicken Head", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "Believed by some to have mystical properties, this particular sample was lodged in the Krasue's throat after a feed.\n\nAll Survivors start afflicted with Leeched I.2 additional Glowing Fungi are spawned at the start of the trial.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_ChickenHead"}, {"id": "1bcb77f9-43ae-43c6-9fb8-4f3ffd52d01b", "internalId": "Addon_K41_11", "name": "Janjira's Hand", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "One of the few distinguishable parts that remained of her friend.\n\nGain 2 Headlong Flight charges whenever a generator is repaired. Headlong Flight's recharge rate is increased by 25% for 15 seconds.When 5 generators are repaired, Headlong Flight is fully charged and the recharge rate is permanently increased by 25%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_JanjirasHand"}, {"id": "ef76984e-2aba-4e66-94ad-aa128ec743bf", "internalId": "Addon_K41_12", "name": "Dulled Knife", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A stage prop, symbolic of a woman's gambit in an attempt to save her lover on death's row.\n\nDecreases Headlong Flight's charge consumption by 25%.Glowing Fungus grants Survivors 10% Haste for 5 seconds while preventing scratch marks, pools of blood, grunts of pain, and aura reveals.\n\nHaste increases Survivor's movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_DulledKnife"}, {"id": "ff093617-54d4-458c-8311-e96c7d8381fa", "internalId": "Addon_K41_13", "name": "Spattered Handkerchief", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A sign that something was very wrong presented itself but she chose to ignore it.\n\nWhen the exit gates are powered, all Survivors are afflicted with Leeched I. Glowing Fungi begin to decay and activating Corporeal Weave no longer creates new Glowing Fungi.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_SpottedHandkerchief"}, {"id": "0c1b98bc-2e7a-47db-9ae2-af284cae65a9", "internalId": "Addon_K41_14", "name": "Framed Newspaper", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "She had once made it onto the entertainment section of the city's newspaper but she wanted more.\n\nIncreases Headlong Flight's charges by 6 and its recharge rate by 15%.Headlong Flight must be at least half-charged to activate.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_FramedNewspaper"}, {"id": "e37ccfc7-8e49-4cbe-ac63-e2e1f5f084f7", "internalId": "Addon_K41_15", "name": "Lorenza's Remains", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "Even her pet bird would fall victim to the Krasue's thirst for blood.\n\nLeeched I applies Blindness.Leeched II applies 4% Hindered.\n\nBlindness prevents Survivors from seeing auras.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_LorenzasRemains"}, {"id": "7ceefb83-53e1-4391-a981-e134af6f3f5d", "internalId": "Addon_K41_16", "name": "Shredded Gown", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "She tore at her clothes and into her flesh as her body burnt.\n\nCorporeal Weave reveals the auras of all Survivors who are within 8 meters of Glowing Fungus or holding Glowing Fungus of their own for 5 seconds.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_ShreddedGown"}, {"id": "f54d208b-5b0b-4c3a-9b43-5b2ba3528258", "internalId": "Addon_K41_17", "name": "Rotten Swine", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A revolting meal that left her disgusted when she awoke.\n\nHitting a generator, dropped pallet, or breakable wall with a Leeching Gland marks it.Damaging or breaking the marked item is 15% faster and removes the mark.Only one object can be marked at a time.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_RottenSwine"}, {"id": "b8be85b6-b67d-4cd2-a567-8d49a5ff412d", "internalId": "Addon_K41_18", "name": "Theater Binoculars", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A pair of glasses that have watched many tragedies.\n\nHitting a non-Leeched Survivor with Intestinal Whip reveals the auras of other Survivors within 24 meters for 5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_TheaterBinoculars"}, {"id": "9ebcfe27-7c12-402f-8deb-255ad9c8d606", "internalId": "Addon_K41_19", "name": "Queen's Scepter", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "The stage prop of a vengeful queen who demands blood.\n\nSuccessful Intestinal Whip hits cause a Leeching Gland to spatter near the Survivor.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_QueensScepter"}, {"id": "ef24b92a-e76f-4279-8149-d51d039caa0e", "internalId": "Addon_K41_20", "name": "Mysterious Elixir", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K41Power"], "description": "A liquid moulded from The Fog itself. Though similar to the concoction she drank, there seem to be slight alterations.\n\nHit a window with Leeching Gland to mark it.Vault the marked window to block it for Survivors only for 10 seconds. Removes the mark.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Maple/T_UI_iconAddon_IridescentElixir"}, {"id": "47498741-1c59-48e1-a1a3-88cbc4a28287", "internalId": "Addon_Kanobo_AkitosCrutch", "name": "Akito's Crutch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "The crutch used by Kazan's son after falling from a tree. Akito's playmate and her family were punished for the boy's injury.\n\nIncreases movement speed of Demon Dash by 13%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_akitosCrutch"}, {"id": "777b2b9d-cabb-42c7-8518-589c5c897b29", "internalId": "Addon_Kanobo_BlackenedToenail", "name": "Blackened Toenail", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "Fell off during one of Kazan's hundred winter treks to the temple. Despite his pilgrimage, Akito's leg would never heal.\n\nIncreases movement speed while absorbing Blood Orbs by 0.4 m/s.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_blackenedToenail"}, {"id": "41123d77-3bc7-4bc4-ab06-346a168daf3b", "internalId": "Addon_Kanobo_BloodySash", "name": "Bloody Sash", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "Blood from a boy who called Kazan The Imposter Noble. Kazan hid evidence of the fight from his father, often reveling at the sash in secret.\n\nIncreases movement speed while absorbing Blood Orbs by 0.7 m/s.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_bloodySash"}, {"id": "c1479c20-7f16-4911-a0d5-f5cab37dea21", "internalId": "Addon_Kanobo_ChildsWoodenSword", "name": "Child's Wooden Sword", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "Akito's practice sword. The child had little use for it after his injury.\n\nIncreases Blood Orb aura reading range by 3 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_childsWoodenSword"}, {"id": "5521877a-999d-4b32-bbcf-f1b3bdf27241", "internalId": "Addon_Kanobo_ChippedSaihai", "name": "Chipped Saihai", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "A baton that belonged to Renjiro, it was stolen by Kazan upon his departure.\n\nIncreases Blood Fury duration by 6 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_chippedSaihai"}, {"id": "aa4fd159-9fb9-4f1a-b434-4545fb20e5d3", "internalId": "Addon_Kanobo_CrackedSakazuki", "name": "Cracked Sakazuki", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "A cup from Kazan's wedding ceremony, it never made it through the night before being damaged.\n\nDecreases Blood Fury activation time by 0.5 seconds.Decreases Blood Fury cooldown by 0.5 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_crackedSakazuki"}, {"id": "f4d5d741-9a3b-4512-a822-18ce9a7430bb", "internalId": "Addon_Kanobo_InkLion", "name": "Ink Lion", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Kanobo"], "description": "An ink painting that once hung in the Yamaoka estate. Depicts the story of a lion eaten by mice.\n\nDecreases Blood Fury activation time by 0.5 seconds.Decreases Blood Fury cooldown by 0.5 seconds.Decreases Blood Fury consumption when downing a Survivor by 2 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Sweden/iconAddon_inkLion"}, {"id": "b2477a0f-b143-47bb-aba1-e3d2cf5c19b2", "intern me/UI/UMGAssets/Icons/ItemAddons/iconAddon_prayerBeads"}, {"id": "6a08ba1e-5e64-43cd-b3e6-fdd127ef53b0", "internalId": "Addon_Key_003", "name": "Shrill Whistle", "type": "itemaddon", "itemType": "key", "parents": [], "description": "The high-pitched scream gives a sense of urgency to everything.\n\nDecreases the time to channel a key by 35%.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Lasagna/T_UI_iconAddon_ShrillWhistle"}, {"id": "f919fe73-9ce5-471a-b820-7e305780864e", "internalId": "Addon_Key_004", "name": "Gold Token", "type": "itemaddon", "itemType": "key", "parents": [], "description": "A gold token with a dull appearance. Both faces are smooth and void of any inscriptions. Can be attached to the Key using its jump ring to channel the key's aura reading ability.\n\nReveals Survivor auras when within a 48 meter range.", "role": "survivor", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_tokenGold"}, {"id": "928f6d35-ca82-4913-aa62-2f95ed9613f5", "internalId": "Addon_Key_005", "name": "Blood Amber", "type": "itemaddon", "itemType": "key", "parents": [], "description": "A blood-red amber striped with black veins. The amber is warm to the touch.Using this key reveals the Killer to you, and you to the Killer.Reduces aura reveal time by 6 seconds.Reduces number of charges by 2.", "role": "survivor", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_bloodAmber"}, {"id": "916eddfe-3913-4287-8780-a1bbf21e593a", "internalId": "Addon_Key_006", "name": "Milky Glass", "type": "itemaddon", "itemType": "key", "parents": [], "description": "This opaque piece of glass emits a dull vibrating noise. When the Key is used to unlock the Hatch, the glass token protects the Key from breaking, channeling The Fog's energy into the glass.\n\nDo not lose the Key when unlocking the Hatch, lose this add-on instead.", "role": "survivor", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_milkyGlass"}, {"id": "6396276a-ea32-43b0-be3d-eaa689abd29e", "internalId": "Addon_Key_007", "name": "Weaved Ring", "type": "itemaddon", "itemType": "key", "parents": [], "description": "A mundane key ring in appearance with an unusual bluish dark sheen. The ring binds the Key to the user, preventing its loss even in the darkest of times.\n\nDo not lose the Key on death, lose this add-on instead.", "role": "survivor", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_weavedRing"}, {"id": "7024f379-703a-4fe3-9f4a-14d5abc18b9a", "internalId": "Addon_Key_008", "name": "Braided Bauble", "type": "itemaddon", "itemType": "key", "parents": [], "description": "Four thin but sturdy cords, all masterfully wrapped around one another.\n\nIncreases the duration of auras revealed by keys by 2 seconds.", "role": "survivor", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Lasagna/T_UI_iconAddon_BraidedBauble"}, {"id": "39325ed2-d484-41eb-9cda-878990688a52", "internalId": "Addon_Key_WeddingRing", "name": "Unique Wedding Ring", "type": "itemaddon", "itemType": "key", "parents": [], "description": "An engraved wedding ring that emerged from The Fog and resonates with an indescribable and incomprehensible energy. The Obsession and yourself both see each other's aura at all times.Decreases your chances to be The Killer’s Obsession.", "role": "survivor", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_uniqueRing"}, {"id": "64a7ffcb-7589-4d3c-9fe9-cd0edb9efcc6", "internalId": "Addon_Killer_Halloween2020", "name": "Blight Serum", "type": "poweraddon", "itemType": null, "parents": [], "description": "A small amount of Compound Thirty-Four, the final serum The Blight worked on before his transformation. Causes extreme mutations in high doses.\n\nYou gain 1 charge of Blighted Rush that replaces your Killer power until consumed. Press the Power button to initiate a Blighted Rush, allowing you to quickly dash forward.You can not attack during a Blighted Rush.You gain 1 additional charge of Blighted Rush every time you hook a Survivor, up to a maximum of 1 charge.This add-on may have unknown effects on certain Killers.Only playable during the Haunted by Daylight Event.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Zambia/iconAddon_blightedSerum"}, {"id": "0983d92a-fc96-4c5b-abe3-71c6bb81b2ef", "internalId": "ADDON_Lastbreath_AtaxicRespiration", "name": "Ataxic Respiration", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Blinker"], "description": "The irregular and deteriorating breath collected from the catatonic boy. Normally stable and calm, becomes incredibly agitated at The Nurse's touch.\n\nDecreases base Blink fatigue duration by 7%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_ataxicRespiration"}, {"id": "b2ff36c1-7156-414b-b5bc-74180c7ad381", "internalId": "ADDON_Lastbreath_BadManLastBreath", "name": "\"Bad Man's\" Last Breath", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Blinker"], "description": "A powerful last breath snatched from Crotus Prenn asylum patient \"the Bad Man.\" In the hands of The Nurse, it jolts with intensity.\n\nHitting a survivor with a successful Blink Attack grants the Nurse Undetectable for 25 seconds. This effect may be only triggered once every 45 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_badMansLastBreath"}, {"id": "556bf945-09dc-4326-aae3-7f993e28771f", "internalId": "ADDON_Lastbreath_DullBracelet", "name": "Dull Bracelet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Blinker"], "description": "A worthless piece of jewelry that might have had an important significance to someone. Taken from the anxious girl's body.\n\nDecreases maximum Blink distance by 20%.Increases Bloodpoints for Precise Blink score events by 100%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_dullBracelet"}, {"id": "5f31be70-0570-4c6c-b4b8-e2d1302ed5bb", "internalId": "ADDON_Lastbreath_HeavyPanting", "name": "Heavy Panting", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Blinker"], "description": "The slow and bulging breath stolen from the orderly. Dimly oscillates at The Nurse's touch.\n\nExtends the duration of a lunge after more than one Blink by 30%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_heavyPanting"}, {"id": "62ca629e-d463-4dbc-b39b-01e5479cf569", "internalId": "ADDON_Lastbreath_JennerLastBreath", "name": "Jenner's Last Breath", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Blinker"], "description": "A powerful last breath snatched from Crotus Prenn asylum patient Mary Jenner. In the hands of The Nurse, it trembles with intensity.\n\nOnce The Nurse has exhausted all of her Blinks, allows The Nurse to immediately Blink back to her original position by pressing the Active Ability Button.Must be triggered before The Nurse succumbs to fatigue.After returning to her original position, The Nurse will have one Blink charge ready.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_jennersLastBreath"}, {"id": "4e9f3659-651b-4dac-8f39-b57  ["Item_Slasher_LFChainsaw"], "description": "A thick yellowish ooze, concocted by the Sawyers. Used for all-purpose lubrication around their house.\n\nIncreases the time the Chainsaw can be revved before triggering a tantrum by 3 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Cannibal/iconAddon_theGrease"}, {"id": "71566e7d-b5a0-406d-a3af-cb8ba9667a2d", "internalId": "ADDON_LFChainsaw_VegetableOil", "name": "Vegetable Oil", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_LFChainsaw"], "description": "A rancid oil used as a poor quality lubricant.\n\nDecreases Chainsaw cooldown by 0.3 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_vegetableOil"}, {"id": "d31461a9-2a59-407d-a75a-1d08073b0061", "internalId": "Addon_Map_001", "name": "Glowing Ink", "type": "itemaddon", "itemType": "map", "parents": [], "description": "Some of the images seemed to jump right off the page.\n\nIncreases the duration of auras revealed by maps for 2 seconds.", "role": "survivor", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Lasagna/T_UI_iconAddon_GlowingInk"}, {"id": "ecd4926a-f2e6-4d59-aeb1-7b9757933993", "internalId": "Addon_Map_002", "name": "Retardant Jelly", "type": "itemaddon", "itemType": "map", "parents": [], "description": "A slimy, translucent substance with a ghastly lavender shade. This jelly from unknown origin is highly resistant to heat.\n\nSlows down the burning rate of the Map by 20%.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/iconAddon_retardantJelly"}, {"id": "5c4a960f-fb0f-4d33-9ad3-bce02604d315", "internalId": "Addon_Map_003", "name": "Gnarled Compass", "type": "itemaddon", "itemType": "map", "parents": [], "description": "It speed while Rushing by 2% for each consecutive Rush.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_blightedRat"}, {"id": "cea8306d-f523-4aa2-bb48-d506b117585c", "internalId": "Addon_Rush_CankerThorn", "name": "Canker Thorn", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A sizable thorn snipped from a visceral canker. It secretes a mild toxin.\n\nDecreases recovery time after Rushing by 0.5 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_cankerThorn"}, {"id": "0255b60e-acea-40d6-9078-9d390e6ba9fd", "internalId": "Addon_Rush_ChippedMonocle", "name": "Chipped Monocle", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A monocle Talbot rarely used despite his eyesight weakening in later years.\n\nDisplays the target location of a Slam.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_chippedMonocle"}, {"id": "b20c68b5-a5c9-4f49-8f72-813950226c61", "internalId": "Addon_Rush_CompoundSeven", "name": "Compound Seven", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "This early sample failed to achieve desired results but demonstrated surprising effects regardless.\n\nAutomatically face the nearest Survivor within 16 meters after a Slam.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_compoundSeven"}, {"id": "525b6fd2-8d2d-48f1-b04b-7066f5271043", "internalId": "Addon_Rush_CompoundThirtyThree", "name": "Compound Thirty-Three", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "Talbot’s penultimate attempt at a serum. Though it did not facilitate his escape, it did have powerful side effects.\n\nRush cannot be performed more than 5 times.Increases Rush turn rate by 11%.Increases Rush duration by 11%.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_compoundThirtyThree"}, {"id": "87227b46-9da0-49ec-a2e9-0793e7b69691", "internalId": "Addon_Rush_CompoundTwentyOne", "name": "Compound Twenty-One", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A serum that's fatal to humans. It evokes beneficial qualities in those who are... something more.\n\nReveals the auras of all Survivors within 8 meters for 3 seconds after a Slam.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_compoundTwentyOne"}, {"id": "a49ca9d1-6e02-4226-8d43-01698be96ea4", "internalId": "Addon_Rush_Foxglove", "name": "Foxglove", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A poisonous plant that sparked Talbot’s interest in chemistry. It rekindles deeply buried memories.\n\nDecreases Rush recovery time by 0.25 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_foxglove"}, {"id": "3fe77f43-8fd2-425f-bc0a-efbded79fa65", "internalId": "Addon_Rush_IridescentBlightTag", "name": "Iridescent Blight Tag", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A glass-like laboratory tag, molded from The Fog itself. Either a gift from The Entity or a cruel jest to tag The Blight as he once did to others.\n\nRush cannot be performed more than 3 times.Increases maximum Rush look angle by 20 degrees.Increases Rush speed by 10%.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_iridescentBlightTag"}, {"id": "c3851011-57ff-44aa-a080-4007aed77792", "internalId": "Addon_Rush_PlaceboTablet", "name": "Placebo Tablet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A pill that’s utterly ineffective... or is it?\n\nDecreases movement speed while Rushing by 15%.Gain 100% bonus Bloodpoints on Rush score events.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_placeboTablet"}, {"id": "45d74b3d-71de-4117-b029-1ed144ffc4fd", "internalId": "Addon_Rush_PlagueBile", "name": "Plague Bile", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A sample of The Plague’s bile, distilled and treated with a mixture of chemicals.\n\nIncreases turn rate while Rushing by 10%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_plagueBile"}, {"id": "2bed2fef-f5e8-46d4-b4a5-4ed738eec616", "internalId": "Addon_Rush_PustulaDust", "name": "Pustula Dust", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "Dried pustula petals ground into a fine dust.\n\nIncreases maximum Slam duration by 0.75 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_pustulaDust"}, {"id": "4911b7ee-3863-4832-b00b-a42ef1322750", "internalId": "Addon_Rush_RoseTonic", "name": "Rose Tonic", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A mixture made with dried roses from the exceedingly rare New Moon Bouquet.\n\nIncreases maximum Slam duration by 1 second.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_roseTonic"}, {"id": "76ec725b-9436-4c27-bd52-b8cc7c4b033d", "internalId": "Addon_Rush_ShreddedNotes", "name": "Shredded Notes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "The remnants of Talbot’s notes, they still contain some valuable information within.\n\nDecreases time to recharge a Rush token by 0.33 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_shreddedNotes"}, {"id": "f384dd00-4e01-4744-ae6c-d0d98376df29", "internalId": "Addon_Rush_SoulChemical", "name": "Soul Chemical", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "A chemical squeezed from the pineal gland of a recently deceased Survivor.\n\nIncreases the initial Rush speed by 5%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_soulChemical"}, {"id": "3bb260d5-5792-4df3-bb0b-0a3c0707644a", "internalId": "Addon_Rush_SummoningStone", "name": "Summoning Stone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "Talbot used this stone to carve what he believed was his research into the opium den’s walls.\n\nIncreases the initial Rush duration by 0.5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_summoningStone"}, {"id": "6b2bd6c0-5e31-478a-9f94-14c651aeb037", "internalId": "Addon_Rush_UmbraSalts", "name": "Umbra Salts", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "Regular sea salt that has momentarily passed through the spirit world, altering its properties in the process.\n\nIncreases turn rate while Rushing by 15%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_umbraSalts"}, {"id": "c91aa2e3-035b-48d2-ba97-54d86293422b", "internalId": "Addon_Rush_VigosJournal", "name": "Vigo's Journal", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K21Power"], "description": "The journal of a man who claimed to have returned from the Void. The knowledge within has practical applications.\n\nGrants Undetectable while Rushing.\n\nUndetectable hides the Killer's aura, terror radius and red stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yemen/iconAddon_vigosJournal"}, {"id": "9fe98a03-32e0-425b-abaa-a57efda40c6f", "internalId": "Addon_Spark_CalmClassI", "name": "\"Calm\" - Class I", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "An ECT procedure using a deep wavelength that soothes various mental illness. With Carter's Spark as its source, this procedure can cause mild anxiety in the patient.\n\nIncreases Terror Radius by 4 meters while Static Blast is ready.Decreases Terror Radius by 4 meters while Static Blast is on cooldown.\n\nSurvivors with Madness suffer from the Affliction of Calm:\n\nMadness II: Intermittently causes Survivors to hear a distant illusionary Terror Radius.Madness III: Constantly causes Survivors to hear a distant illusionary Terror Radius.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_calmClassI"}, {"id": "1c84859a-9f1c-430f-9424-e1025907418d", "internalId": "Addon_Spark_CalmClassII", "name": "\"Calm\" - Class II", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A risky ECT procedure using a deep wavelength that soothes various mental illness. With Carter's Spark as its source, this procedure can cause moderate anxiety in the patient.\n\nIncreases Terror Radius by 6 meters while Static Blast is ready.Decreases Terror Radius by 6 meters while Static Blast is on cooldown.\n\nSurvivors with Madness suffer from the Affliction of Calm:\n\nMadness II: Intermittently causes Survivors to hear a distant illusionary Terror Radius.Madness III: Constantly causes Survivors to hear a distant illusionary Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_calmClassII"}, {"id": "8eb45c10-b2ea-4355-8ea2-a1942ca003fd", "internalId": "Addon_Spark_CalmMuYisNotes", "name": "\"Calm\" - Carter's Notes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "An experimental version of the ECT procedure annotated by Doctor Herman Carter himself. Uses a deep wavelength that soothes various mental illness. With Carter's Spark as its source, this procedure causes uncontrollable fear and anxiety in the patient.\n\nIncreases Terror Radius by 8 meters while Static Blast is ready.Decreases Terror Radius by 8 meters while Static Blast is on cooldown.\n\nSurvivors with Madness suffer from the Affliction of Calm:\n\nMadness II: Intermittently causes Survivors to hear a distant illusionary Terror Radius.Madness III: Constantly causes Survivors to hear a distant illusionary Terror Radius.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_calmCartersNotes"}, {"id": "a7ddaf52-96b4-4e84-b2b3-0b483b9c644d", "internalId": "Addon_Spark_DisciplineClassII", "name": "\"Discipline\" - Class II", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "Project Awakening ECT procedure for disciplinary action which uses a fixed dose at high voltage. Can cause a state of moderate paranoia in the patient.\n\nDecreases the detonation delay of Shock Therapy by 10%.\n\nSurvivors with Madness suffer from the Affliction of Discipline:\n\nMadness II: While in a chase, Survivors perceive an illusionary Red Stain and Terror Radius as though The Doctor were directly behind them. This effect persists for 6 seconds after the chase ends.Madness III: Illusionary Red Stain and Terror Radius are constantly active.The Doctor also sees the illusionary Red Stain.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_diciplineClassII"}, {"id": "e2984b0d-576d-4e9b-9adb-efa2cd9aa4e4", "internalId": "Addon_Spark_DisciplineClassIII", "name": "\"Discipline\" - Class III", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "Project Awakening ECT procedure for disciplinary action which uses a fixed dose at very high voltage. Can cause a state of serious paranoia in the patient.\n\nDecreases the detonation delay of Shock Therapy by 15%.\n\nSurvivors with Madness suffer from the Affliction of Discipline:\n\nMadness II: While in a chase, Survivors perceive an illusionary Red Stain and Terror Radius as though The Doctor were directly behind them. This effect persists for 6 seconds after the chase ends.Madness III: Illusionary Red Stain and Terror Radius are constantly active.The Doctor also sees the illusionary Red Stain.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_diciplineClassIII"}, {"id": "3f2968c6-5cb9-4a4f-bc32-08ec7f0f1eb6", "internalId": "Addon_Spark_DisciplineMuYisNotes", "name": "\"Discipline\" - Carter's Notes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "Project Awakening ECT procedure for disciplinary action, annotated by Doctor Herman Carter himself. The intolerably high voltage leaves the patient in a severe state of paranoia.\n\nDecreases the detonation delay of Shock Therapy by 20%.\n\nSurvivors with Madness suffer from the Affliction of Discipline:\n\nMadness II: While in a chase, Survivors perceive an illusionary Red Stain and Terror Radius as though The Doctor were directly behind them. This effect persists for 6 seconds after the chase ends.Madness III: Illusionary Red Stain and Terror Radius are constantly active.The Doctor also sees the illusionary Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_diciplineCartersNotes"}, {"id": "4570953b-aa90-4ed7-abec-6e843bf05a3b", "internalId": "Addon_Spark_HighStimulusElectrode", "name": "High Stimulus Electrode", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "An experimental electrode that can withstand very-high charges for a longer period of time.\n\nIncreases the range of Shock Therapy by 4 meters.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_highStimulusElectrode"}, {"id": "85a61d2a-ea5c-46dd-980f-f06e698468b5", "internalId": "Addon_Spark_IridescentGeneral", "name": "Iridescent King", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A glass-like king chess piece molded from The Fog Itself. The Entity's trace reverberating within can break the most powerful minds.\n\nSurvivors with Madness status effect suffer from the following Afflictions: Calm, Discipline, Order, and Restraint.Causes Survivors to hear a distant illusionary Terror Radius. The effect is intermittent in Madness II and constant in Madness III.While in a chase, Survivors perceive an illusionary Red Stain and Terror Radius as though The Doctor were directly behind them. This effect persists for 6 seconds after the chase ends in Madness II and is constantly active in Madness III.Broken pallets may appear to be replaced with illusionary pallets that persist until approached. A new illusionary pallets is generated at the location of a random broken pallet every 20 seconds.Increases the duration of illusionary Doctor hallucinations by 6 seconds.The Doctor sees illusionary Red Stains as well as the auras of illusionary Doctors and illusionary pallets.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_iridescentKing"}, {"id": "2a69245b-0308-47f5-b2da-9d45f13326b9", "internalId": "Addon_Spark_JadeCharm", "name": "Iridescent Queen", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A glass-like queen chess piece molded from The Fog itself. It can't be touched without receiving a considerable jolt of electricity.\n\nAll Survivors struck by Shock Therapy or Static Blast acquire a lingering Static Charge. The Static Charge remains with The Survivor(s) until discharged.Multiple Survivors struck by the same Shock Therapy or Static Blast that are within 4 meters of each other do not acquire a Static Charge.Any time a Survivor is within 4 meters of another Survivor carrying a Static Charge, the Survivor receives a shock identical to Shock Therapy and the Static Charge is discharged immediately.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_iridescentQueen"}, {"id": "34a01310-c5d8-4462-8b2e-4311cd14eb24", "internalId": "Addon_Spark_MoldyElectrode", "name": "Moldy Electrode", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A moldy electrode which nevertheless conducts a weak electrical current.\n\nIncreases the range of Shock Therapy by 2 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_moldyElectrode"}, {"id": "c1ea653f-1c48-4c09-b1c0-a0f54409e0da", "internalId": "Addon_Spark_NanmuCatapult", "name": "Maple Knight", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A white knight chess piece made of maple. This gift from an old man brings back distant memories and imbues The Doctor with devastating focus.\n\nReveals the area of effect of Shock Therapy.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_mapleKnight"}, {"id": "64209cd5-07d8-4f3b-a0eb-2e27dc3dc6ec", "internalId": "Addon_Spark_Obedience_MuYisNotes", "name": "Scrapped Tape", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A compact cassette from Project Awakening containing mostly white noise. Opens The Doctor's mind to alternate treatment methods.\n\nChanges the shape of Shock Therapy to a ring with a range of 8 meters, a radius of 4 meters, and a thickness of 1 meter.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_scrappedTape"}, {"id": "8398d4b8-1f92-4f94-a643-b5cd225b624a", "internalId": "Addon_Spark_OrderClassI", "name": "\"Order\" - Class I", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Killer07Item"], "description": "A conventional ECT procedure, part of a patient's daily routine at the Léry's Memorial Institute. Can cause a state of mild confusion in the patient.\n\nDecreases Static Blast cooldown by 2 seconds.\n\nSurvivors with Madness suffer from the Affliction of Order:\n\nBroken pallets may appear to be replaced with illusionary pallets that persist until approached.A new illusionary pallet is generated at the location of a random broken pallet every 20 seconds.The Doctor sees the auras of illusionary pallets.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC4/iconAddon_orderClassI" ype": null, "parents": ["Item_Slasher_Stalker"], "description": "A tiny piece of tinted glass, probably from a broken object. It is impossible to determine its origin.\n\nIncreases the movement speed of Slaughtering Strike by 5%.Decreases the charge speed of Slaughtering Strike by 10%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_glassFragment"}, {"id": "60938119-a517-48d4-8828-32d065b9e66d", "internalId": "Addon_Stalker_HairBow", "name": "Hair Bow", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A blue tartan ribbon used to tie hair.\n\nIncreases the duration of Evil Incarnate by 20 seconds.Decreases the Stalk Meter fill rate by 20%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_hairBow"}, {"id": "14d6600a-7087-44e4-9f31-4dc361f2fe72", "internalId": "Addon_Stalker_HairBrush", "name": "Hair Brush", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A nylon bristle brush used to add body and softness to hair.\n\nWhen Evil Incarnate activates, the next pallet break is 50% faster.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_hairBrush"}, {"id": "76d64ebd-fde1-4a97-9e8f-1b2ee72bb2a4", "internalId": "Addon_Stalker_Jewelry", "name": "Jewelry", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A large necklace made of beads and inexpensive metals. One of Judith's favorites.\n\nIncreases the Stalk Meter fill rate on stationary Survivors by 10%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_jewelry"}, {"id": "938d04dc-c406-4c79-b2cd-5f78fb71a6f9", "internalId": "Addon_Stalker_JewelryBox", "name": "Jewelry Box", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A barren wooden box in which vanity items were once stored.\n\nIncreases the Stalk Meter fill rate by 30%.Decreases stalk range by 16 meters.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_jewelryBox"}, {"id": "74a90820-6ea7-4020-aa2e-30c2c35be320", "internalId": "Addon_Stalker_JMyersMemorial", "name": "J.Myers Memorial", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A glossy page ripped from the '65 Haddonfield High School yearbook, one dedicated to the memory of Judith Myers.\n\nIncreases pickup and hook speeds by 40% in Evil Incarnate Mode.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_jMyersMemorial"}, {"id": "d5fbe2b7-4b88-44df-8428-934203971344", "internalId": "Addon_Stalker_JudithsJournal", "name": "Judith's Journal", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A journal identified as owned by Judith M. Myers. Most of the pages are defaced with frightening and disturbing drawings.\n\nIncreases the Stalk Meter fill rate on the Obsession by 40%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/DLC2/iconAddon_judithsJournal"}, {"id": "09c77880-2919-4b17-be8c-841eb15ecf84", "internalId": "Addon_Stalker_JudithsTombstone", "name": "Judith's Tombstone", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_Stalker"], "description": "A large and heavy granite tombstone stolen from Mt. Sinclair cemetery, belonging to Judith Myers.\n\nHooking a Survivor during Evil Incarnate refreshes its duration.Limits the duration of Evil Incarnate to 40 seconds.", "role": "killer", "ra
