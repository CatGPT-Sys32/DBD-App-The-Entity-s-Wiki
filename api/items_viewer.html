 to smother your target with silky-smooth softness.\n\nTerror Radius is reduced by 6 meters, but Slice & Dice charge time is increased by 50%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_silkPillow"}, {"id": "4f8a304c-5b0f-49f1-a2a3-2a8a15ffe3bc", "internalId": "Addon_K34_12", "name": "Iridescent Amulet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "A pendant of great power, recreated within the Realm.\n\nIncreases duration of Hidey-Ho Mode by 50%. Basic attacks immediately end Hidey-Ho Mode.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_iridescentAmulet"}, {"id": "03869f2a-88f5-4b0d-8e9b-b5328a7a8e0e", "internalId": "Addon_K34_13", "name": "Plastic Bag", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Nothing tires out a kill like a lack of oxygen.\n\nIf a Survivor walks through an illusory Footfall, they suffer from Exhausted for 15 seconds.\n\nExhausted prevents Survivors from activating other perks that cause Exhausted.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_plasticBag"}, {"id": "b7c66ca0-18ea-4c12-9873-5ba30eb3929d", "internalId": "Addon_K34_14", "name": "Pile of Nails", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "It’s a lot easier to stay hidden when your target is worried about a pile of nails flying at their head.\n\nUpon manually exiting Hidey-Ho Mode, The Good Guy remains Undetectable for 3 seconds.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_pileOfNails"}, {"id": "b1dea90d-0b46-439a-a110-e6bbf6616eb6", "internalId": "Addon_K34_15", "name": "Yardstick", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Good for measuring distance. Even better for laying down a beating.\n\nA Scamper reveals Survivor auras within 16 meters of you for 3 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_yardstick"}, {"id": "2ec573a5-a37f-485e-bcc4-7338d33437ea", "internalId": "Addon_K34_16", "name": "Running Shoes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "The latest in high-performance killer doll athletic technology.\n\nGain 2% movement speed after a Scamper for 5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_runningShoes"}, {"id": "aa38f8f5-b692-4915-8972-06eecd4be82f", "internalId": "Addon_K34_17", "name": "Rat Poison", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "The secret ingredient in a killer chili.\n\nWhile performing a Slice & Dice, the auras of Survivors within 6 meters of you are revealed for 2.5 seconds.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_ratPoison"}, {"id": "7dbae804-0904-4479-8281-c07cacd0434d", "internalId": "Addon_K34_18", "name": "Straight Razor", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "For when a close shave needs to be really, really close.\n\nSlice & Dice attacks inflict the Hemorrhage and Mangled  status effects for 80 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_straightRazor"}, {"id": "6bd1c45b-6e7c-4680-8cb3-8b0548da9ebd", "internalId": "Addon_K34_19", "name": "Hard Hat", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "Keeps the dome intact while performing high-impact activities.\n\nPerforming a Scamper under a pallet breaks it immediately.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_hardHat"}, {"id": "f0a7d643-1804-43da-89cd-67634f4842c0", "internalId": "Addon_K34_20", "name": "Mirror Shards", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K34Power"], "description": "A bunch of shattered mirror pieces that reflect light and shadow, further disorienting the already disoriented.\n\nThe Good Guy can see the illusory Footfalls around Survivors.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Yerkes/iconAddon_mirrorShards"}, {"id": "6bfb7803-2269-4ee6-a7f2-d9289fc29cf3", "internalId": "Addon_K35_01", "name": "Rabbit's Foot", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The unlucky creature’s remains were found by a tree, its intestines wedged between its teeth.\n\nBlood pools appear bright red when charging UVX.\n\nSurvivors injured by UVX suffer from the Hemorrhage status effect for 45 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured Survivors.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_rabbitsFoot"}, {"id": "7a2074f1-d51f-464d-97c3-4a18d294ac41", "internalId": "Addon_K35_02", "name": "Footprint Cast", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The cast sits in the Museum of the Weird in Sarasota, Florida and has long since been debunked.\n\nDecreases the time until the next Hallucination spawns by 15 seconds when a Survivor becomes Weakened.\n\nWeakened Survivors lose health states when hit by UVX’s Blast Area.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_footprintCast"}, {"id": "15d1b09a-2cb0-4978-bc9e-6ff76e5b606f", "internalId": "Addon_K35_03", "name": "Blurry Photo", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The photo was found at an abandoned campsite. The campers were never seen again.\n\nAfter Teleporting, regain full movement speed 7% faster.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_blurryPhoto"}, {"id": "ea427b30-abeb-4f7a-abd5-ac6401bb4490", "internalId": "Addon_K35_04", "name": "Slashed Backpack", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "When the hiker was rescued from the mountain pass, she insisted her companion would never wander off alone.\n\nUVX triggers a Blast Area upon contact with Hallucinations.Hallucinations can be destroyed by UVX. Doing so decreases the time until the next Hallucination spawns by 65%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_slashedBackpack"}, {"id": "513c6a26-7b37-440c-a36b-fe0cf3f9a40e", "internalId": "Addon_K35_05", "name": "Punctured Eyeball", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The station was a scene of madness. The officers had seemingly turned on each other.\n\nSurvivors who are both Weakened and injured suffer from the Deep Wound status effect when they Dispel a Hallucination.\n\nDeep Wound will put a Survivor in the dying state unless it is mended before the timer runs out.\n\nWeakened Survivors lose health states when hit by UVX’s Blast Area.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_puncturedEyeball"}, {"id": "85d8120b-0ce1-4544-ab6e-643f582e1538", "internalId": "Addon_K35_06", "name": "Notebook of Theories", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "His studio apartment was empty and reeked of black mold. The book was the only thing left.\n\nSurvivors hit by UVX while it is airborne suffer from the Hindered status effect for an additional 2 seconds.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_notebookOfTheories"}, {"id": "4cf1892e-55f0-4618-b10a-fb6ac057332b", "internalId": "Addon_K35_07", "name": "Last Known Recording", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "She studied musique concrète before she disappeared, her screams the last sound on the tape.\n\nDecreases your Hallucinations’ Aura Range that is visible to Survivors by 35%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_lastKnownRecording"}, {"id": "f13f5f73-c04d-470b-9b73-ca3070ca3f86", "internalId": "Addon_K35_08", "name": "Sketch Attempt", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The victim’s child was given paper and crayons at the station, while he waited for his father to pick him up.\n\nSurvivors hit by UVX's Blast Area suffer from the Oblivious status effect for 20 seconds.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_sketchAttempt"}, {"id": "21d0ccd8-e938-49c6-be9a-e0a01f9a7b52", "internalId": "Addon_K35_09", "name": "Victim’s Map", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "He thought the key to solving the mystery lay beyond the forest, and feared he would never return.\n\nWhen a Survivor successfully Stares Down The Unknown, The Unknown gains Killer Instinct for 3 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_victimsMap"}, {"id": "3b761e5b-0f9f-4a88-ba40-ce384db9ec5c", "internalId": "Addon_K35_10", "name": "Vanishing Box", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The magician was popular at children’s parties, and quickly became the top suspect.\n\nSurvivors who complete generators become Weakened against UVX.Increases Hallucination spawn time by 120%.\n\nWeakened Survivors lose health states when hit by the UVX's Blast Area.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_vanishingBox"}, {"id": "fcfe4f85-e61a-4cb6-aeb0-ae8dc9265232", "internalId": "Addon_K35_11", "name": "Front-Page Article", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The assailant had torn gaping holes in the walls of the cabin, and drove the family into the woods.\n\nPerforming the break interaction on a pallet or breakable wall decreases the time until the next Hallucination spawns by 50%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_frontPageArticle"}, {"id": "37dfd9e9-9663-418a-8abe-64b9851ae82e", "internalId": "Addon_K35_12", "name": "Hypnotist’s Watch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "Hypnotherapy was recommended to recover repressed memories. What emerged from his mind would be his undoing.\n\nSurvivors hit by UVX while it is airborne suffer from the Exhausted status effect for 15 seconds.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_hypnotistsWatch"}, {"id": "1f5115f7-da10-44d7-8c4a-92ea0828eed2", "internalId": "Addon_K35_13", "name": "B-Movie Poster", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The movie was rumored to be state-funded propaganda, made specifically for something called Project Apple-Pie.\n\nSurvivors damaged by UVX's Blast Area suffer from the Broken status effect for 30 seconds.\n\nBroken prevents Survivors from being healed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_b-moviePoster"}, {"id": "85528ad4-c94f-46ab-b874-c7aeef0c0835", "internalId": "Addon_K35_14", "name": "Device of Undisclosed Origin", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "Was the thing made on Earth? Or somewhere else entirely?\n\nSurvivors entering the Aura Range of a Hallucination suffer from the Oblivious status effect.\n\nOblivious prevents Survivors from hearing or being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_deviceOfUndisclosedOrigin"}, {"id": "d71c2db4-743f-4706-9344-0fa3327303ee", "internalId": "Addon_K35_15", "name": "Homemade Mask", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The killer had made the mask in the shed in his backyard, where he would bring the others when the sun went down.\n\nSurvivors who Dispel Hallucinations suffer from the Blindness status effect for 60 seconds.\n\nBlindness prevents Survivors from seeing auras.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_homemadeMask"}, {"id": "6fd1f711-8c7a-42ff-bf4a-f3af3cf6280b", "internalId": "Addon_K35_16", "name": "Obscure Game Cartridge", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "Some maintained Project Apple-Pie evolved over time, turning to new forms of media for results.\n\nTriggers for 20 seconds following a Teleport.Increases the action speed for breaking downed pallets, breakable walls, damaging generators, and vaulting windows by 30%.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_obscureGameCartridge"}, {"id": "a3d1e93c-42d5-4d70-a8ac-fbccfc2ce7c7", "internalId": "Addon_K35_17", "name": "Discarded Milk Carton", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "She decided to take the long way home, and waved goodbye to her friends before parting ways.\n\nDoubles the UVX projectile's bounce strength.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_discardedMilkCarton"}, {"id": "94d5069f-d88a-4ee8-80f7-31217f3cb90b", "internalId": "Addon_K35_18", "name": "Serum Vial", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The molecular structure of the substance was synthesized in the lab, but its effects could never be replicated.\n\nSurvivors within a Hallucination’s Aura Range suffer from the Exhausted status effect for 15 seconds.\n\nExhausted prevents Survivors from activating certain perks.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_serumVial"}, {"id": "f7795c60-2681-4994-9d2b-3c1d5cd042f7", "internalId": "Addon_K35_19", "name": "Captured by the Dark", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The documentary purported that the disappearances were linked to small-town cinemas. Audiences left the theater feeling uneasy.\n\nSurvivors begin the trial Weakened.Decreases the maximum number of Hallucinations that can be spawned by 1.\n\nWeakened Survivors lose health states when hit by UVX’s Blast Area.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_capturedByTheDark"}, {"id": "dfa23631-d47b-4fcd-825d-9f89ee5650fb", "internalId": "Addon_K35_20", "name": "Iridescent OSS Report", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K35Power"], "description": "The report was redacted to the point of being meaningless. But still, theorists tried to extract meaning from it.\n\nDecreases Teleport cooldown by 5 seconds.The Decoy left behind after The Unknown teleports takes 10 seconds longer to disappear.When created, the Decoy has the same Terror Radius and Red Stain as The Unknown.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Applepie/iconAddon_iridescentOSSReport"}, {"id": "acc89060-3f14-4547-8dd5-75c75488c7b8", "internalId": "Addon_K36_01", "name": "Tattered Headband", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "An enchanted accessory once owned by a powerful summoner. It still carries a whisper of its former magic.\n\nIncreases the distance of Flight of the Damned’s spectral entities by 4 meters.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_TatteredHeadband"}, {"id": "6077ae1a-8767-44a2-8868-e95cb4c3075e", "internalId": "Addon_K36_02", "name": "Raven's Feather", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A material component most typically used for the Fly spell.\n\nIncreases duration of the Fly spell by 0.5 second.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_RavensFeather"}, {"id": "9d0cc6c0-da6a-44e3-bc40-26e3203d4013", "internalId": "Addon_K36_03", "name": "Trickster's Glove", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A glove once belonging to an arcane trickster whose mastery of Mage Hand clings to its fibers.\n\nIncreases the time Mage Hand holds a pallet up by 0.3 second.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_TrickstersGlove"}, {"id": "deb5a214-7bd8-41ec-b94c-31866f0fbed0", "internalId": "Addon_K36_04", "name": "Crystal Ball", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Used by spellcasters for centuries to scry upon friend and foe alike.\n\nWhen a Survivor is revealed by Dispelling Sphere, the Killer Instinct effect lasts for an additional 1 seconds.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_CrystalBall"}, {"id": "3450cf37-dca9-4a27-9425-e83a01047d60", "internalId": "Addon_K36_05", "name": "Lantern of Revealing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Even those who evade your attacks cannot evade your gaze.\n\nReveals the aura of Survivors narrowly missed by Flight of the Damned for 3 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_LanternOfRevealing"}, {"id": "2015c86a-05f0-4e8c-9735-4702d736a49c", "internalId": "Addon_K36_06", "name": "Potion of Speed", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A curious concoction that downgrades the rules of physics to mere suggestions.\n\nDecreases the period where you cannot attack after casting Fly by 0.1 seconds.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_PotionOfSpeed"}, {"id": "5790a1ad-1c73-4d78-ac1e-7a6209f0dc30", "internalId": "Addon_K36_07", "name": "Ring of Telekinesis", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Its arcane energy crackles to life when its user manipulates objects from afar.\n\nIncreases vault speed by 10% for 10 seconds after casting Mage Hand on an upright pallet.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_RingOfTelekinesis"}, {"id": "c2db5eac-b1d1-471a-ad5c-a71f950274ab", "internalId": "Addon_K36_08", "name": "Glass Eye", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A material component used to cast spells of detection.\n\nIncreases the size of Dispelling Sphere by 2 meters and its movement speed by 10%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_GlassEye"}, {"id": "9a1c35e4-1827-4636-a144-2c06a6f3e8e1", "internalId": "Addon_K36_09", "name": "Ring of Spell Storing", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A magical ring that rewards those who are well-prepared.\n\nDecreases the cooldown of all spells by 1 second.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_RingOfSpellStoring"}, {"id": "75a7a6bf-1abd-46fc-b70c-c5b0681859a3", "internalId": "Addon_K36_10", "name": "Ornate Horn", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Once used to rally troops to battle, its very presence brings great armies to bear.\n\nIncreases the number of entities created by Flight of the Damned by 1.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_OrnateHorn"}, {"id": "1f331732-7f8d-4ffc-84f6-7a3e3a6c762a", "internalId": "Addon_K36_11", "name": "Cloak of Elvenkind", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Its colors are constantly shifting, making you more difficult to detect from afar.\n\nReduces Terror Radius by 22 meters while the Fly spell is active.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_CloakOfElvenkind"}, {"id": "d65a3ca4-4f29-47e1-bef0-17f16f0f00d3", "internalId": "Addon_K36_12", "name": "Boots of Speed", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A simple click of their heels grants their wearer incredible pace.\n\nCasting Mage Hand grants you 3% Haste for 2 seconds.\n\nHaste increases Killer movement speed.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_BootsOfSpeed"}, {"id": "468f6342-3c37-4523-aa38-2de94bc019fd", "internalId": "Addon_K36_13", "name": "Staff of Withering", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Its necrotic power brings its targets closer to death.\n\nDispelling Sphere causes the Exhausted status effect for 30 seconds to Survivors who enter its radius.\n\nExhausted prevents Survivors from activating exhausting perks.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_StaffOfWithering"}, {"id": "5c10cf53-a5c7-43c5-9850-a8314bf14991", "internalId": "Addon_K36_14", "name": "Pearl of Power", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Its shimmering face energizes mages who hold it, allowing them to cast more spells.\n\nReduces the remaining cooldown for your spells by 2 seconds each time you land a basic attack.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_PearlOfPower"}, {"id": "1aad2957-a0d4-4ffe-b8cf-ead58507abcc", "internalId": "Addon_K36_15", "name": "Robe of Eyes", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "When worn, none can escape its bearer’s unyielding gaze.\n\nReveals the auras of Survivors within 6 meters of a Treasure Chest for 4 seconds each time you cast a spell.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_RobeOfEyes"}, {"id": "bbc41ce0-d3e3-4500-84c8-5f3db2977960", "internalId": "Addon_K36_16", "name": "Dragontooth Dagger", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "Made from the actual tooth of a dragon, its edge is jagged and cruel.\n\nApplies Hemorrhage and Mangled status effects to Survivors hit with a basic attack while holding a Magic Item for 60 seconds.\n\nHemorrhage regresses healing progress when not healing, and increases blood trails left by injured survivors. This lasts for a set duration or until fully healed.\n\nMangled increases time required to heal by 25% and lasts for a set duration or until fully healed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_DragontoothDagger"}, {"id": "6230496e-6801-4973-8b51-93bf9ab3208e", "internalId": "Addon_K36_17", "name": "Cloak of Invisibility", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A powerful magic item, envied by rogues and the conflict-averse alike.\n\nGain Undetectable for 20 seconds each time all of your spells are on cooldown at the same time.\n\nUndetectable hides the Killer's aura, Terror Radius, and Red Stain.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_CloakOfInvisibility"}, {"id": "68466e52-284b-4538-ab88-c3371c7933d3", "internalId": "Addon_K36_18", "name": "Bag of Holding", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "The realm itself bends to its astounding capacity, populating trials with even more to take.\n\nTwo Treasure Chests are guaranteed to roll 1 on the dice roll.Opening Treasure Chests grants the Oblivious status effect to Survivors for 15 seconds.\n\nOblivious prevents Survivors from hearing and being affected by the Killer's Terror Radius.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_BagOfHolding"}, {"id": "3fb31b5d-0881-420d-8475-969f05543278", "internalId": "Addon_K36_19", "name": "Vorpal Sword", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "A powerful magical artifact whose blade has severed many a head from its accompanying body.\n\nAny injured Survivor that enters a Dispelling Sphere screams and gains Broken for 30 seconds.Using the Mage Hand spell on a downed pallet breaks that pallet in 4 seconds.\n\nBroken prevents Survivors from being healed.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_SwordOfKass"}, {"id": "81bf0d1a-4139-4b03-b9b8-b1ac4c712930", "internalId": "Addon_K36_20", "name": "Iridescent Book of Vile Darkness", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K36Power"], "description": "The ultimate compilation of cruelty, wickedness and depravity.\n\nUsing the Fly spell to pass through any vault location blocks that location for Survivors for 45 seconds.Lowers the number of spectral entities created by Flight of the Damned by 3 and makes them fly lower to the ground.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Churros/iconAddon_IridescentBookOfVileDarkness"}, {"id": "d33a5707-5c3f-431e-a706-1df0a1d7eb55", "internalId": "Addon_K37_01", "name": "Sylph Feather", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "An enchanted feather that grants its holder great agility.\n\nBreaking a pallet grants The Dark Lord a token. For each token held, Hellfire's cooldown is decreased by 5%, to a maximum of 25%.", "role": "killer", "rarity": "rare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_SylphFeather"}, {"id": "10e95a7d-7b47-4897-afe1-62bdc9aad7c1", "internalId": "Addon_K37_02", "name": "Ruby Circlet", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "An enchanted headpiece that brings even the mightiest of flames to heel.\n\nDecreases the cooldown of Hellfire by 5%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_RubyCirclet"}, {"id": "a2fe0b6d-f29d-4d6c-bac0-03958f9c9380", "internalId": "Addon_K37_03", "name": "Cerberus Talon", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A sharp memento from one of Dracula’s most terrifying guards.\n\nIncreases the reveal distance of Scent Orb by 100%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_CerberusTalon"}, {"id": "e5740bd6-971a-48b3-85c4-67533d52b1fe", "internalId": "Addon_K37_04", "name": "Clock Tower Gear", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A piece of the great clock tower, a reminder of the inevitability of time itself.\n\nReduces the cooldown of Shapeshift by 5%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_ClockTowerGear"}, {"id": "be019e32-6ca2-4ffa-a11b-951d6282da40", "internalId": "Addon_K37_05", "name": "Magical Ticket", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A strange artifact once used to transport across Dracula’s castle.\n\nIncreases the maximum speed of Teleport by 10%.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_MagicalTicket"}, {"id": "bd0a5376-70a2-497a-bd86-af5176bc7cef", "internalId": "Addon_K37_06", "name": "Moonstone Necklace", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A simple necklace by day, but its power comes to life in the dark.\n\nReduces the size of the Terror Radius in Vampire and Wolf Forms by 8 meters.", "role": "killer", "rarity": "uncommon", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons : null, "parents": ["Item_Slasher_K37Power"], "description": "A snakelike memento from one of Dracula's most ancient and fearsome minions.\n\nAll Survivors within 8 meters of your teleport destination suffer from an 8% Hindered status effect for 4 seconds.\n\nHindered reduces Survivor movement speed.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_MedusasHair"}, {"id": "db4b4ac7-4018-4084-8693-357e6cb2878a", "internalId": "Addon_K37_16", "name": "Warg’s Fang", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A mighty tool of destruction taken from one of Dracula’s most dangerous allies.\n\nReveals the auras of all Survivors whose Scent Orbs you have collected whenever Pounce Attack becomes available for 5 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_WargsFang"}, {"id": "162c9b18-c028-4d67-a115-8a0496b38a07", "internalId": "Addon_K37_17", "name": "Cube of Zoe", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A strange box whose presence creates something from nothing.\n\nWhen a generator is completed, creates pillars of Hellfire around The Dark Lord for 10 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_CubeOfZoe"}, {"id": "70c96e10-0f9e-4847-b4f2-7a59483731b7", "internalId": "Addon_K37_18", "name": "Lapis Lazuli", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A stone said to bring luck to its holders, or take it from their enemies.\n\nAfter Teleporting to a window vault, the Entity blocks that window for Survivors for 8 seconds.", "role": "killer", "rarity": "veryrare", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_LapisLazuli"}, {"id": "8bdf2740-962d-4033-9409-34e0c4e27ef7", "internalId": "Addon_K37_19", "name": "Alucard’s Shield", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A family heirloom that blocks its bearer’s enemies at every turn.\n\nWhen the gates are opened, pillars of Hellfire continuously spawn within the exit gates.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_AlucardsShield"}, {"id": "92ca1033-d52e-4769-81ca-a85d80cf9b7a", "internalId": "Addon_K37_20", "name": "Iridescent Ring of Vlad", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K37Power"], "description": "A unique relic belonging to Dracula. It is said none can approach The Dark Lord without it.\n\nHellfire pillars home in on nearby Survivors.", "role": "killer", "rarity": "visceral", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Eclair/iconAddon_IridescentRingOfVlad"}, {"id": "89960465-7324-48fa-a00e-ac035ce50249", "internalId": "Addon_K38_01", "name": "Young Coconut", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "Her first meal as a castaway, she shared it with her loyal companion.\n\nIncreases the Dog's Chase speed by 5%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/ItemAddons/Gelato/T_UI_iconAddon_YoungCoconut"}, {"id": "46c2e4bd-832d-4d7c-acf7-8aadeee221c8", "internalId": "Addon_K38_02", "name": "Sticky Pitch", "type": "poweraddon", "itemType": null, "parents": ["Item_Slasher_K38Power"], "description": "A vital commodity for keeping a ship in tip-top shape.\n\nIncreases The Houndmaster's bonus movement speed gained while running on the Search Path by 2%.", "role": "killer", "rarity": "common", "bloodweb": true, "image": "https://dbd
