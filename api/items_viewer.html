<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            padding: 20px;
        }
        h1 { text-align: center; color: #ff6b35; margin-bottom: 20px; }
        h2 { color: #ff6b35; margin: 20px 0 10px; border-bottom: 2px solid #ff6b35; padding-bottom: 5px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tab {
            padding: 10px 30px;
            background: #2a2a4e;
            border: none;
            color: #eee;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }
        .tab.active { background: #ff6b35; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .card {
            background: #2a2a4e;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255,107,53,0.3); }
        .card.selected { border: 2px solid #ff6b35; }
        .card img { width: 64px; height: 64px; object-fit: contain; margin-bottom: 5px; }
        .card .name { font-size: 12px; font-weight: bold; }
        .card .rarity { font-size: 10px; color: #888; text-transform: capitalize; }
        
        .addon-section {
            background: #232340;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            display: none;
        }
        .addon-section.visible { display: block; }
        .addon-section h3 { color: #ff6b35; margin-bottom: 10px; }
        .addon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
        .addon-card { background: #2a2a4e; border-radius: 5px; padding: 8px; text-align: center; }
        .addon-card img { width: 48px; height: 48px; object-fit: contain; }
        .addon-card .name { font-size: 11px; }
        
        .rarity-common { color: #b8860b; }
        .rarity-uncommon { color: #daa520; }
        .rarity-rare { color: #2ecc71; }
        .rarity-veryrare { color: #9b59b6; }
        .rarity-ultrarare { color: #e74c3c; }
        .rarity-event { color: #ff6b35; }
        
        .stats { text-align: center; color: #888; margin-bottom: 20px; }
    </style>
</head>

a24ff8", "internalId": "Item_Camper_Map_Random", "name": "Cryptic Map", "type": "item", "itemType": "map", "description": "A Map that can reveal the aura of various objects.", "role": "survivor", "rarity": "none", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/iconItems_map"}, {"id": "28de1e12-66a0-4463-991c-92a3dbb65de1", "internalId": "Item_Camper_Map_Spring2024", "name": "Bloodsense Map", "type": "item", "itemType": "map", "description": "A bloodstained piece of parchment, hastily rolled and burning with a strange power.\n\nPress the Use Item Button to reveal auras of all pallets, vaults and injured Survivors within 48 meters for 14 seconds.Using the secondary interaction creates a beam of light at the Survivor's location. Generators within 32 meters of the beam of light are revealed with red auras.Causes Pools of Blood to spawn beneath you while being used.8 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/Spring/iconItems_bloodMap"}, {"id": "96772fe2-17ae-4351-a5b6-ecba07a7f56f", "internalId": "Item_Camper_MechanicsToolbox", "name": "Mechanic's Toolbox", "type": "item", "itemType": "toolbox", "description": "Metal box with specialized mechanics tools. Even without training, can be used to repair or break various mechanical components.\n\n16 charges.Increases repair speed by 75%.Unlocks the sabotage action.Increases sabotage speed by 25%.\n\nRepairing a generator requires 90 charges.\n\nSabotaging a hook requires 6 charges.", "role": "survivor", "rarity": "rare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_toolboxMechanics"}, {"id": "1f29004d-3719-4d52-a996-7c44417553d8", "internalId": "Item_Camper_MedKit", "name": "Camping Aid Kit", "type": "item", "itemType": "medkit", "description": "A rudimentary aid kit which can save lives in emergencies, even if it's lacking some of its supplies.\n\n24 charges.Increases the speed that you heal others by 35%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_rundownAidKit"}, {"id": "84211df4-1141-47ca-af04-ea4bc6573776", "internalId": "Item_Camper_Medkit_Anniversary2020", "name": "Anniversary Med-kit", "type": "item", "itemType": "medkit", "description": "A festive Med-kit that explodes with confetti upon fully healing a Survivor. Surprise!\n\n24 charges.Increases the speed that you heal others by 40%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.Increases confetti by 100%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/Anniversary/iconItems_medkit_anniversary2020"}, {"id": "c99f6698-f164-4b68-8cfb-1758b0655fef", "internalId": "Item_Camper_Medkit_Anniversary2022", "name": "Masquerade Med-Kit", "type": "item", "itemType": "medkit", "description": "A festive Med-Kit with a shocking surprise, giving a whole new meaning to the term \"health scare.\"\n\n24 charges.Increases the speed that you heal others by 40%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.Increases confetti by 100%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Anniversary/iconItems_medkit_anniversary2022"}, {"id": "4d1aeda4-d471-4b94-b9cb-d0bf3d6bfa78", "internalId": "Item_Camper_MedKit_Random", "name": "Camping Aid Kit", "type": "item", "itemType": "medkit", "description": "A Medkit that can heal others faster or yourself.", "role": "survivor", "rarity": "none", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/iconItems_rundownAidKit"}, {"id": "c0fa52bc-a4a4-4c61-a899-728d5b4b1f16", "internalId": "Item_Camper_MedKit02", "name": "First Aid Kit", "type": "item", "itemType": "medkit", "description": "A standard first aid kit with all the necessary equipment for treating common to more serious injuries.\n\n24 charges.Increases the speed that you heal others by 40%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_firstAidKit"}, {"id": "5d354ca4-fb2e-408b-a98a-1787c1153b93", "internalId": "Item_Camper_MedKit03", "name": "Emergency Med-kit", "type": "item", "itemType": "medkit", "description": "A sturdy and well organized medical kit equipped with top condition emergency supplies.\n\n24 charges.Increases the speed that you heal others by 45%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "rare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_medkit"}, {"id": "20165c52-533b-4135-82dd-7ba13fa32b64", "internalId": "Item_Camper_MedKit04", "name": "Ranger Med-kit", "type": "item", "itemType": "medkit", "description": "A large metal box containing medical supplies aimed for emergency rescues in hard to reach, often isolated locations.\n\n24 charges.Increases the speed that you heal others by 50%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "veryrare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_rangersAidKit"}, {"id": "a0b06ae9-0ac9-4366-a17f-6350c5e6560f", "internalId": "Item_Camper_Medkit05", "name": "All Hallows' Eve Lunchbox", "type": "item", "itemType": "medkit", "description": "A plastic lunchbox with phosphorescent Halloween stickers that has been packed with first-aid equipment.\n\n24 charges.Increases the speed that you heal others by 40%.Unlocks the self-healing action.Decreases the speed and efficiency when healing yourself by 33%.Makes you considerably more visible.\n\nA full heal requires 16 charges.", "role": "survivor", "rarity": "rare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/Halloween/iconItems_medkitHalloween"}, {"id": "0ecf6340-ae6a-43db-b4d1-a928c4773cfa", "internalId": "Item_Camper_RainbowMap", "name": "Annotated Map", "type": "item", "itemType": "map", "description": "The sketch is clear and detailed. Strange knowledge flows into you, followed by dread uncertainty.\n\nPress the Use Item Button to reveal auras of all pallets and vaults within 40 meters for 14 seconds.Using the secondary interaction creates a beam of light at the Survivor's location. Generators within 32 meters of the beam of light are revealed with red auras.6 charges.", "role": "survivor", "rarity": "rare", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_rainbowMap"}, {"id": "075c6e7d-a7f8-4904-bc10-e2b9de4d9e6f", "internalId": "Item_Camper_Toolbox", "name": "Toolbox", "type": "item", "itemType": "toolbox", "description": "Metal box containing a set of basic tools. Even without training, can be used to repair or break various mechanical components.\n\n20 charges.Increases repair speed by 50%.Unlocks the sabotage action.Increases sabotage speed by 15%.\n\nRepairing a generator requires 90 charges.\n\nSabotaging a hook requires 6 charges.", "role": "survivor", "rarity": "uncommon", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_toolbox"}, {"id": "963c00a5-c0d1-42af-9c1e-8260fc961104", "internalId": "Item_Camper_Toolbox_Anniversary2022", "name": "Masquerade Toolbox", "type": "item", "itemType": "toolbox", "description": "A Toolbox with all of the standard gadgets: wrenches, screwdrivers, fireworks, a hammer...\n\n32 charges.Increases repair speed by 50%.Unlocks the sabotage action.Increases sabotage speed by 50%.Detonates a firework once depleted. Yay!\n\nRepairing a generator requires 90 charges.\n\nSabotaging a hook requires 6 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Anniversary/iconItems_toolbox_anniversary2022"}, {"id": "ac0f2094-dd72-4cc0-bd64-42c5e3d8eddf", "internalId": "Item_Camper_Toolbox_Random", "name": "Toolbox", "type": "item", "itemType": "toolbox", "description": "A Toolbox that can repair faster or sabotage hooks.", "role": "survivor", "rarity": "none", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/iconItems_toolbox"}, {"id": "bb225bef-7738-412e-9de4-9a636fa60be8", "internalId": "Item_Camper_VoidBomb_Halloween2024", "name": "Void Crystal", "type": "item", "itemType": "firecracker", "description": "Cold to the touch, the crystal vibrates from the force contained within.1 charge.\n\nWhen shattered, the Void Crystal releases thick smoke with an expanding radius of up to 4 meters.Survivors within 6 meters of the smoke do not leave scratch marks.The smoke dissipates 8 seconds after reaching it maximum size.", "role": "survivor", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/Halloween/iconItems_voidCrystal"}, {"id": "fa4ddac9-59a5-4e96-b2e1-dabd3f64616b", "internalId": "Item_Camper_WornoutToolbox", "name": "Worn-out Tools", "type": "item", "itemType": "toolbox", "description": "Metal box containing out of condition tools that could break at any moment. Even without training, can be used to repair or break various mechanical components.\n\n16 charges.Increases repair speed by 50%.Decreases Skill Check success zone size by 10%.Unlocks the sabotage action.\n\nRepairing a generator requires 90 charges.\n\nSabotaging a hook requires 6 charges.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Items/iconItems_toolboxWornOut"}, {"id": "9320c0ce-11ff-43b2-b2cd-4eae7b71949e", "internalId": "Item_FragileObject", "name": "Pocket Mirror", "type": "item", "itemType": null, "description": "A pocket mirror pulled from the basement's White Glyph. Its surface is frosty.\n\nLimited items are consumed by The Entity at the trial's end.", "role": "survivor", "rarity": "none", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Limited/iconItems_LimitedRepairedMirror"}, {"id": "c2273144-179b-4499-a06a-e9ee3f788c4a", "internalId": "Item_LamentConfiguration", "name": "Lament Configuration", "type": "none", "itemType": null, "description": "A puzzle box that acts as a key to a dimension of agonizing pain and pleasure.\n\nLimited items are consumed by The Entity at the trial's end.", "role": null, "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Limited/iconItems_LimitedLamentConfiguration"}, {"id": "056fea02-236d-49b1-b5c7-863ed9a19e06", "internalId": "Item_Slasher_Beartrap", "name": "Bear Trap", "type": "power", "itemType": null, "description": "A large foothold trap made of steel. Traps are found lying around the area waiting to be picked up and set anywhere.\n\nBEAR TRAP\n\nBy default, you start the trial with 2 Bear Traps. Find and collect more throughout the environment.\n\nSet Bear Trap:\n\nPress and hold the Power button to set a Bear Trap on a valid location in front of you. A set Bear Trap will immobilize and incapacitate any player that steps on it. A healthy Survivor that steps in a set Bear Trap will also become injured but may attempt to escape the trap. Press the Interaction button to pick-up a nearby Survivor who is Incapacitated by a Bear Trap.\n\nReset Trap:\n\nPress and hold the Power button while standing near a Bear Trap in the environment to reset it where it lies, if it is not already set.\n\nSetting and resetting Bear Traps grants The Trapper 7.5% Haste for 5 seconds.\n\nCollect Bear Trap:\n\nPress the Interaction button while standing near a Bear Trap in the environment to collect it. By default, you may carry a maximum of 2 Bear Traps at any time.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/iconPowers_trap"}, {"id": "a98dfe8e-c361-42ac-8cf0-18373e52d94e", "internalId": "Item_Slasher_Blinker", "name": "Spencer's Last Breath", "type": "power", "itemType": null, "description": "A powerful and violent last breath snatched from Crotus Prenn Asylum warden Patrick Spencer. Channelling its energy allows The Nurse to pierce and jump through the spirit world in a Blink multiple times in a row. Doing so leaves her in a state of fatigue.\n\nGrants the Blink.Grants 1 additional Chain Blink.Attacks made after a Blink but before the ensuing fatigue are special attacks.After a Blink but before the ensuing fatigue, The Nurse can interrupt and grab Survivors.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/iconPowers_breath"}, {"id": "970aecdf-339d-473d-a962-ec1b101e1276", "internalId": "Item_Slasher_Chainsaw", "name": "Chainsaw", "type": "power", "itemType": null, "description": "The machine gave him a new life, one where the power was in his hands.\n\nPress and hold the Power button to break into a Chainsaw Sprint. Survivors hit during a Chainsaw Sprint are put into the dying state.\n\nRevving the chainsaw, and sprinting each cause the Overdrive meter to increase. The meter decreases when the chainsaw is not in use.\n\nWhen the meter is full, the chainsaw goes into Overdrive.\n\nSPECIAL STATE: OVERDRIVE\n\nWhile in Overdrive, the chainsaw is enhanced. Chainsaw Charge and Sprint speeds are increased, and Chainsaw Sprint cooldowns are reduced.\n\nOverdrive lasts for 20 seconds.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/iconPowers_chainsaw"}, {"id": "14c6fa1f-0117-4f08-a4e2-e312ed44675b", "internalId": "Item_Slasher_CloakBell", "name": "Wailing Bell", "type": "power", "itemType": null, "description": "A heavy cast iron bell imbued with ancient powers. Allows its user to enter and walk the spirit world when rung.\n\nWAILING BELL\n\nPress and hold the Power button to Cloak. Press and hold the Power button again while Cloaked to Uncloak, granting a 1 second burst of speed upon reappearing. The Wailing Bell can be heard up to a distance of 24 meters.\n\nCloak:\n\nWhile Cloaked, The Wraith is granted increased movement speed, near total invisibility, and the Undetectable status effect. The Wraith may not attack while Cloaked, but can interact with environmental objects.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/iconPowers_bell"}, {"id": "81228be9-72e3-48f5-9ef4-e49e35cf9ee0", "internalId": "Item_Slasher_DreamInducer", "name": "Dream Demon", "type": "power", "itemType": null, "description": "All Survivors have a Sleep Meter that fills over time; once filled, Survivors fall asleep and enter the Dream World, where they are afflicted with the Oblivious status effect. Hitting an awake Survivor with a basic attack will also send them to the Dream World. Survivors can wake by failing Skill Checks, having an awake Survivor perform the Wake Up action, or using alarm clocks that also provide temporary immunity to sleep.\n\nAwake Survivors hear The Nightmare's Terror Radius and see him within 16 meters, intermittently see him from 16 to 32 meters, and cannot see him beyond that.\n\nSPECIAL ABILITY: DREAM SNARES AND DREAM PALLETS\n\nWhile selected, press the Power button to charge a Dream Snare, and press the Attack button to release it. Dream Snares move quickly in a straight line, through walls but not over ledges. Survivors hit by the Dream Snare add time to their Sleep Meter if they are awake, while Sleeping Survivors will be Hindered by 12%.\n\nWhile selected, press the Power button to summon a Dream Pallet at a valid pallet location. Press the Power button while targeting a Dream Pallet to rupture it. Survivors hit by the rupture add time to their Sleep Meter if awake, while sleeping Survivors will be injured.\n\nSPECIAL ABILITY: DREAM PROJECTION\n\nHold the Ability button to teleport to a generator or Survivor performing a healing action in the Dream World. Upon teleporting, all nearby Survivors add time to their Sleep Meter and are temporarily revealed with Killer Instinct. For each Survivor in the Dream World, the cooldown is reduced by 15%.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/England/iconPowers_dreamMaster"}, {"id": "4e7e9364-ffaf-4570-b8bb-8758d42c4927", "internalId": "Item_Slasher_Frenzy", "name": "Feral Frenzy", "type": "power", "itemType": null, "description": "They were a plain group of friends until Frank formed them into a Legion. Now they draw power from the thrilling freedom of not abiding by any rule but their own.\n\nFERAL FRENZY\n\nTrigger Feral Frenzy to run at a high speed and chain attacks between multiple Survivors. When your power gauge is full, press the Power button to initiate Feral Frenzy. While Feral Frenzy is active, The Legion moves faster and gains access to additional abilities: Pallet Vault and Feral Slash.\n\nSPECIAL ABILITY: PALLET VAULT\n\nPress the Interaction button while Feral Frenzy is active, to perform a Pallet Vault at a dropped pallet.\n\nSPECIAL ATTACK: FERAL SLASH\n\nPress the Attack button while Feral Frenzy is active to perform a Feral Slash. Hitting a Survivor with Feral Slash puts the Survivor into the injured state, inflicts the Deep Wound status effect, and refills The Legion’s power gauge. Additionally, any Survivors within the Terror Radius not afflicted by the Deep Wound status effect are indicated by Killer Instinct. If a Survivor hit by Feral Slash is already afflicted by the Deep Wound status effect, Feral Frenzy ends immediately. Each successful Feral Slash that does not end Feral Frenzy increases The Legion’s movement speed by 0.2m/s for the remainder of Feral Frenzy. The fifth consecutive Feral Slash will put any Survivor into the dying state. The fifth successful Feral Slash always ends Feral Frenzy.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Kenya/iconPowers_feralFrenzy"}, {"id": "1ac9db72-0f2f-4ad9-91da-4c34a076cba9", "internalId": "Item_Slasher_GasBomb", "name": "The Afterpiece Tonic", "type": "power", "itemType": null, "description": "Throughout his years experimenting with anesthetics and muscle relaxants, The Clown developed several effective concoctions and formulas. He has used his favorite, The Afterpiece Tonic, to great effect, intoxicating and capturing many unwilling victims. The associated Afterpiece Antidote also has useful effects.\n\nTap the Active Ability button to switch between the Afterpiece Tonic and the Afterpiece Antidote. Tap or hold and release the Power button to launch a bottle.\n\nPress and hold the Active Ability button to replenish your bottles.\n\nSPECIAL ABILITY: Afterpiece Tonic\n\nOn contact, the bottle will break, releasing a purple gas cloud that intoxicates Survivors. Intoxicated Survivors will suffer from impaired vision, involuntary coughing, and 14% Hindered for 1.6 second.\n\nSPECIAL ABILITY: Afterpiece Antidote\n\nOn contact, the bottle will break, releasing a gray gas cloud which turns yellow upon activation. The Clown and any Survivors who enter an active Antidote cloud gain 12% Haste for 6 seconds. Intoxicated Survivors who enter an Antidote cloud are cured.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Guam/iconPowers_gasBomb"}, {"id": "1114f070-fcab-4c4d-b8d7-63c364cb7385", "internalId": "Item_Slasher_GhostPower", "name": "Night Shroud", "type": "power", "itemType": null, "description": "The Ghost Face used to study his victims for weeks, meticulously registering their habits. When the urge to kill swelled, he’d know exactly how and where to strike.\n\nNIGHT SHROUD\n\nPress the Power button to activate Night Shroud when the power gauge is full. The Ghost Face is granted the Undetectable status effect while Night Shroud is active. Performing a basic attack fully depletes the power gauge and deactivates Night Shroud.\n\nReveal:\n\nSurvivors within proximity to The Ghost Face may attempt to reveal him by looking in his direction for a short duration. A successful reveal fully depletes The Ghost Face's power gauge and automatically deactivates Night Shroud. Survivors who reveal The Ghost Face have their current location indicated by Killer Instinct for a very short duration.\n\nSPECIAL ABILITY: STALK\n\nHold down the Power button to Stalk Survivors while Night Shroud is active. Hold down the Power button while behind cover to lean out and Stalk at a faster rate. Completing Stalk progress on a Survivor Marks your target and applies the Exposed status effect to your Mark for a limited amount of time. Marked Survivors cannot reveal The Ghost Face.\n\nSPECIAL ABILITY: CROUCH\n\nPress the Active Ability button to Crouch. Press the Active Ability button again while Crouched to stand. The Ghost Face moves at a slower speed while Crouched.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Oman/iconPowers_ghostPower_available"}, {"id": "bb1a21d5-c970-485d-8b0a-0c4e516da341", "internalId": "Item_Slasher_HarpoonRifle", "name": "The Redeemer", "type": "power", "itemType": null, "description": "The Deathslinger’s ingenuity affords him the ability to Reel in bounties with a unique invention—a heavily modified, hybrid rifle that replaces conventional ammunition with a razor-sharp spear affixed to a chain.\n\nTHE REDEEMER\n\nPress and hold the Power button to aim down sights. Press the Attack button to shoot a spear that can lodge itself in a Survivor, allowing them to be Reeled in towards The Deathslinger against their will.\n\nReel:\n\nWhile a Survivor is speared by The Redeemer, press and hold the Power button to Reel them in towards you. Survivors may struggle against the chain or use the environment to pressure the chain to break. Doing so will result in briefly stunning The Deathslinger as well as putting The Survivor in the injured state and applying the Deep Wound status effect. Using a basic attack while a Survivor is speared will break the chain without applying a penalty to either The Deathslinger or The Survivor. Successfully hitting a Survivor with a basic attack while they are speared and healthy will also apply the Deep Wound status effect.\n\nReload:\n\nThe Redeemer must be Reloaded after every shot, before it may be fired again. Press the Active Ability button to Reload The Redeemer.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Ukraine/iconPowers_UK"}, {"id": "c55ac0c5-b0eb-4b7e-b3fd-a91a60c7da81", "internalId": "Item_Slasher_Hatchet", "name": "Hunting Hatchets", "type": "power", "itemType": null, "description": "A skill taught by her mother and mastered in the wild. The Huntress can hurl Hatchets with deadly precision.\n\nStart the trial with 7 Hatchets.Charge throw for maximum throwing speed.Refill Hatchets at Lockers.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/DLC5/iconPowers_huntingHatchets"}, {"id": "4469b672-8730-4ceb-96d7-ba1429a735e9", "internalId": "Item_Slasher_K21Power", "name": "Blighted Corruption", "type": "power", "itemType": null, "description": "Pustula serum courses through his veins, corrupting his mind and body, yet granting him unnatural physical abilities.\n\nSPECIAL ABILITY: RUSH\n\nPress the Power button to quickly Rush forward. Doing so consumes a Rush token. While performing Rush, The Blight cannot launch an attack.\n\nRush into a wall or obstacle in the environment to Slam onto it. If the Rush fails to connect with a wall or obstacle, or if The Blight is out of Rush tokens, he will enter a short fatigue state and begin recharging the tokens.\n\nSPECIAL ATTACK: LETHAL RUSH\n\nFollowing a Slam, press the Power button to launch a Lethal Rush. Doing so consumes a Rush token. A Lethal Rush behaves the same as a Rush, except that The Blight may launch an attack by pressing the Attack button.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Yemen/iconPowers_K21"}, {"id": "c0fbede2-d534-437c-9a21-3b4c16b037de", "internalId": "Item_Slasher_K22Power", "name": "Blood Bond", "type": "power", "itemType": null, "description": "Though forever bound through blood & trauma, The Twins have been granted the power to separate from their shared body. Together they hunt as brother and sister, doubling the threat to Survivors.\n\nBlood Bond\n\nPress and hold the Power button to unleash Victor. Swap control between Charlotte and Victor by tapping the Ability button.\n\nWhile left on his own, Victor will trigger Killer Instinct, revealing to Charlotte the outlines of Survivors who are walking or running near him. Survivors who can hear Victor’s shrieks are susceptible. However, Victor can be crushed by Survivors while Charlotte is being controlled.\n\nIf crushed, Victor will re-grow on Charlotte after some time has passed.\n\nSPECIAL ATTACK: Pounce\n\nWhile controlling Victor, hold the Ability button to charge a Pounce and tap the Attack button to unleash it.\n\nSuccessfully landing a Pounce deals damage to the Survivor. If the Survivor was at full health, Victor will latch on, triggering Killer Instinct and revealing the location of all nearby Survivors. While latched on, the Survivor will be afflicted with the Broken, Oblivious, and Incapacitated status effects. They will be unable to enter lockers or leave through the exit gate. The Survivor can crush Victor while he's latched onto them by completing the Remove action.\n\nIf Victor misses his Pounce, he is momentarily vulnerable and can be crushed by a Survivor. If Victor lands on an obstacle taller than himself, he will be destroyed.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Aurora/iconPowers_bloodBond_01"}, {"id": "bb9c9bc5-61f2-4b00-8809-b0d3c6fdfe37", "internalId": "Item_Slasher_K24Power", "name": "T-VIRUS", "type": "power", "itemType": null, "description": "A virus that causes extreme mutations and can be transferred to others. Heightens aggression and strength within The Nemesis.\n\nSPECIAL ATTACK: Tentacle Strike\n\nPress and hold the Power button to charge an attack. Once charged, tap the Attack button. Hitting a Survivor with Tentacle Strike afflicts them with the Contaminated status effect and increases your Mutation Rate. If a Survivor is already Contaminated, Tentacle Strike damages their health and increases Mutation Rate.\n\nVaccine found in Supply Cases cures Contamination. Their availability is limited. After using a Vaccine, the Survivor’s location is revealed by Killer Instinct.\n\nMutation Rate: Your power expands as your Mutation Rate grows. At Mutation Rate 2, Tentacle Strike can destroy pallets and breakable walls. At Mutation Rate 3, Tentacle Strike’s range and movement speed increase when it's fully charged. The T-Virus icon displays the current Mutation Rate.\n\nSPECIAL ENEMY: Zombies\n\nIf a zombie hits a Survivor, they inflict them with the Contaminated effect. If already Contaminated, their health will be damaged.\n\nZombies can be destroyed by a Tentacle Strike to increase your Mutation Rate, and Survivors can destroy them with pallets. Destroyed zombies eventually respawn.", "role": "killer", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Eclipse/iconPowers_T-virus1"}, {"id": "69f96f76-ebf9-4641-a5d5-b17757ec2da9", "internalId": "Item_Slasher_K25Power", "name": "Summons of Pain", "type": "power", "itemType": null, "description": "An extradimensional gateway that leads to pleasure and pain so great it will tear your soul apart.\n\nPress the Power button to create a gateway and release the button to open it. Once opened, tap the Ability button to summon forth a possessed chain under your control. Direct the chain into a Survivor to bind them.\n\nA Survivor bound to a chain is unable to sprint. Their movement speed will decrease further as they’re hit with a second and third chain. Survivors can perform the Break Free action to escape.\n\nLament Configuration: If left alone, the Lament Configuration initiates a Chain Hunt by summoning chains to pursue Survivors.\n\nA Survivor carrying the Lament Configuration will be afflicted with the Oblivious status effect and chains will occasionally be summoned to attack them. The Survivor must solve the Lament Configuration to end the Chain Hunt and remove the puzzle box from their possession. While doing this, The Cenobite will see their location and be able to teleport to it.\n\nWhen The Cenobite picks up the Lament Configuration, a Chain Hunt is activated. Additionally, all Survivors are instantly bound by chains, causing them to scream and reveal their locations.\n\nThe Lament Configuration will spawn in a new location after The Cenobite or a Survivor has used it.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Gemini/iconPowers_summonsOfPain"}, {"id": "a010e01c-0ac0-49b5-85cc-39ef7d8147e8", "internalId": "Item_Slasher_K26Power", "name": "Birds of Torment", "type": "power", "itemType": null, "description": "From a wellspring of eternal agony comes a swarm of darkness, a wild and ferocious murder of ink black crows.\n\nPress and hold the Power button to charge Birds of Torment. Once fully charged, tap the Attack button to summon a Dire Crow. You can repeat the action quickly by continuously holding down the Power button and tapping the Attack Button again.\n\nWhen at least one Dire Crow is summoned, it stays idle for a limited time. Spawning a new Dire Crow will extend the time the previously spawned Dire Crow stays idle.\n\nTap the Ability button to propel the Dire Crows into flight.\n\nDire Crows can inflict damage for a short distance when flying. This is indicated to the Killer by the Dire Crow's Flight Path.\n\nOnce a Dire Crow continues past the Flight Path, it will no longer inflict damage but can now pass through any obstacles and reveal nearby Survivors using Killer Instinct.\n\nIn this phase, Dire Crows will create a swarm around Survivors they hit, allowing the Killer to see the swarm's aura on the Survivor. The Survivor can repel the swarm by completing the Repel action or entering a locker. During this time, the swarm's aura is not shown to the Killer.\n\nA Survivor being swarmed will receive damage if hit by a second Dire Crow.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Ion/T_iconPowers_birdsOfTorment"}, {"id": "fea1a96e-98bb-4b0a-8879-dbee7119d4b5", "internalId": "Item_Slasher_K27Power", "name": "Deluge of Fear", "type": "power", "itemType": null, "description": "Through the medium of a mysterious videotape, Sadako spreads her curse to unwitting viewers and causes their untimely deaths.\n\nSPECIAL ABILITY: MANIFESTATION\n\nBefore Manifesting, The Onryo becomes Undetectable and invisible to Survivors, but intermittently visible when within 24 meters of them. The Onryo must Manifest to attack Survivors. Press and hold the Power button to Manifest in your current position. Briefly after Manifesting, The Onryo will continue to be intermittently visible to Survivors when within 24 meters. Afterward, she will be fully visible within 24 meters for as long as she remains Manifested. The Onryo can Demanifest by pressing and holding the Power button.\n\nSPECIAL ABILITY: PROJECTION\n\nThe Onryo can also take material form by Projecting herself through a TV. Press the Ability button while looking at a powered TV to Project into it, shutting the TV off in the process.\n\nSURVIVOR AFFLICTION: CONDEMNED\n\nSurvivors can temporarily turn off TVs with the Retrieve Tape action. At the TV furthest from their position, Survivors can spread The Onryo's message by inserting their Tape, which reduces their Condemned progress; this also turns the TV off.\n\nWhen the power meter is full and The Onryo Projects, any Survivor near a powered TV will gain Condemned progress.\n\nHooking a Survivor affected by Condemned locks in 3 of their stacks, making it impossible to remove them for the rest of the trial.\n\nA fully Condemned Survivor is revealed by Killer Instinct and can be killed once downed.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Kepler/iconPowers_delugeOfFear2"}, {"id": "550be422-5b75-4843-a4e5-28baca460fea", "internalId": "Item_Slasher_K28Power", "name": "Reign of Darkness", "type": "power", "itemType": null, "description": "Like a dark thought, The Dredge is difficult to shake. And when night falls, it is nearly impossible.\n\nSPECIAL ABILITY: THE GLOAMING\n\nPress and hold the Power button to activate. Once activated, The Dredge leaves a Remnant behind. Aim at a locker and press the Ability button to Teleport into it or press the Attack button to return to the Remnant. The Remnant is disabled when teleporting to a locker, or when a Survivor touches it. While in a locker, aim at any other locker and press the Ability button to Teleport again. Each Teleport consumes a Power Token. Exiting the locker or returning to your Remnant will activate The Gloaming's cooldown, after which all Power Tokens are recharged.\n\nSurvivors can place locks on lockers to slow The Dredge exiting them. The Dredge can break locks by exiting the locked locker or performing a base attack on the lock. Each locker can only be locked once.\n\nSPECIAL ABILITY: NIGHTFALL\n\nThe Nightfall Meter builds when a healthy Survivor is injured, a Survivor is hooked, or the Teleport power is used. The Nightfall Meter also fills faster for each Survivor in the injured state. Once the Nightfall Meter is full, Nightfall begins.\n\nDuring Nightfall, Survivors must navigate in total darkness, The Dredge’s Teleport is faster with a shorter cooldown, and gains Undetectable. Nightfall ends after 60 seconds.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Meteor/T_iconPowers_ReignofDarkness"}, {"id": "6159592e-f41c-481b-b727-58c568eb59f0", "internalId": "Item_Slasher_K29Power", "name": "Virulent Bound", "type": "power", "itemType": null, "description": "The Mastermind can barrel forward, Infecting Survivors with the Uroboros virus or leaping over obstacles.\n\nPress and hold the Power button to charge a Bound attack. While charging, The Mastermind moves slightly slower as he prepares his strike. When charged, press the Attack button to Bound. If The Mastermind hits a Survivor, that Survivor becomes Infected (or furthers their Infection). Should The Mastermind crash into something during this Bound, he will slam the Survivor, causing damage; if not, the Survivor is thrown, losing a health state if they are thrown into any solid object.\n\nIf Virulent Bound hits a dropped pallet or vault location, The Mastermind vaults over the obstacle.\n\nSPECIAL EFFECT: UROBOROS INFECTION\n\nUpon being hit by Virulent Bound, Survivors become Infected. Infected builds over time, and when fully Infected, the Survivor suffers from a 4% Hindered status effect. If a Virulent Bound grabs and slams a Survivor while they are fully Infected, The Mastermind will automatically carry them.\n\nSPECIAL INTERACTION: FIRST AID SPRAY\n\nAt the beginning of each trial, several Supply Crates spawn. Each contains a First Aid Spray. When Infected, a Survivor can use the First Aid Spray on themselves or another, removing the Infection. Each First Aid Spray has a set number of charges. After using a First Aid Spray, the Survivor's location is briefly revealed by Killer Instinct.", "role": "killer", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Orion/iconPowers_virulentBound"}, {"id": "e845e876-945c-4171-b1dc-c18b1192695b", "internalId": "Item_Slasher_K30Power", "name": "Guardia Compagnia", "type": "power", "itemType": null, "description": "The Knight alone is a terrifying monster on the battlefield, but with his loyal Guards, he is nearly unstoppable. Together, the Guardia Compagnia fights for their own freedom, killing anyone who gets in their way.\n\nSPECIAL ABILITY: GUARD SUMMON\n\nTap the Power button to activate Guard Summon mode. Once activated, move around to create a Patrol Path. While in Guard Summon mode, you can aim at a generator in progress, a downed pallet or a breakable wall and tap the Attack button. This will summon a Guard to complete a break action on the selected object. You can also tap the Power button or drain the Power Gauge completely to end the Guard Summon mode. This will summon a Guard who will follow and Patrol the created Path. The longer the Patrol Path, the longer the Guard's Hunt Timer will be. There are three Guards that can be summoned one at a time: The Carnifex, who can break or damage objects faster; The Assassin, who moves faster during the Hunt; and The Jailer, who patrols and hunts longer, and is better at detection.\n\nGUARD SPECIAL ABILITY: THE HUNT\n\nWhile a Guard is patrolling, he can spot and detect Survivors. If a Survivor is detected, the Guard will move to their location, leave a Standard on the ground, and start Hunting the Survivor for a set amount of time. The Survivor can escape a Guard by unhooking another Survivor, grabbing the Standard, or surviving until the Hunt timer ends. If the Survivor is successfully attacked by the Guard or The Knight, the Guard will disappear. When a Guard downs a Survivor, The Knight receives a Killer Instinct notification.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Quantum/T_iconPowers_Executioner"}, {"id": "5676b17a-831e-4e8c-9339-011b5daa08b3", "internalId": "Item_Slasher_K31Power", "name": "Eyes In The Sky", "type": "power", "itemType": null, "description": "Inspired by the dark mangas created by her father, The Skull Merchant relentlessly hunts her prey using the latest in surveillance technology.\n\nThe Skull Merchant begins the match with six Drones. Press the Power button to deploy a Drone. Recalling a Drone grants Undetectable for 8 seconds. Once detected by a scan line, a Survivor gains scan immunity and cannot be detected by other scan lines for a few seconds.\n\nSurvivors can attempt to hack Drones. Failure partially fills their Lock On meter; Success disables the Drone for 45 seconds.\n\nSPECIAL ABILITY: RADAR\n\nPress the Ability Button to open a Radar to see the locations of Survivors detected by Drones and those with Claw Traps. The Radar can be used to change a Drone's rotation direction or to recall a Drone.\n\nWhen a Survivor is detected by a Drone shortly after its deployment or change in rotation, The Skull Merchant gains 5% Haste for 8 seconds.\n\nSPECIAL EFFECT: LOCK ON\n\nThe Lock On meter fills when scanned by a Drone and when failing to disable a Drone. When the meter is full, the Survivor receives a Claw Trap, becomes Injured, and suffers from the Broken status effect. Additional scans briefly apply an 8% Hindered status effect.\n\nA Claw Trap broadcasts the Survivor’s location to the Killer and is only removed when its battery dies.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Saturn/iconPowers_drones"}, {"id": "98e42ee6-639b-4df3-b4a2-e3bf8e4d417e", "internalId": "Item_Slasher_K32Power", "name": "Quantum Instantiation", "type": "power", "itemType": null, "description": "A dark crystalline structure in an ancient ruin gifted—or perhaps cursed—Hux with sentience. He built a new body, and with it, a terrifying way to bend the rules of physics to his benefit.\n\nThe Singularity can shoot and spawn Biopods around the map; these Biopods can attach to any vertical surface they land on. The Singularity can control a Biopod remotely and look through it, and tag Survivors, afflicting them with a Temporal Slipstream. When Slipstreamed, The Singularity can teleport next to the Slipstreamed Survivor either by using the Biopods to tag them, or by shooting them. When a Slipstreamed Survivor is in proximity to another Survivor, the Slipstream can spread. All Slipstreamed Survivors are briefly revealed with Killer Instinct.\n\nSPECIAL STATE: OVERCLOCK MODE\n\nAfter a successful Slipstream teleport, The Singularity enters Overclock Mode. In this state, The Singularity gains 3% movement speed for 5.7 seconds, walls and pallets can be destroyed faster, vaulting speed is faster, and he cannot be stunned. Attempts to stun merely remove Overclock Mode and The Singularity is afflicted with 50% Hindered for 3 seconds.\n\nSPECIAL INTERACTION: ELECTROMAGNETIC PULSE\n\nAt the beginning of each Trial, several Supply Cases spawn, each containing an EMP. Survivors can use these EMPs to remove the Slipstream from themselves or others, or to briefly disable a Biopod. Once used, the EMP is destroy", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Umbra/iconPowers_quantumInstantiation"}, {"id": "3f06cd4f-8658-42df-89a0-a74e61ed8e3a", "internalId": "Item_Slasher_K33Power", "name": "Hidden Pursuit", "type": "power", "itemType": null, "description": "Supposedly responding to a distress signal, the Nostromo's crew landed on LV-426. What they found there became one of humanity's greatest horrors.\n\nWhen The Xenomorph is in a trial, a series of tunnels become available to it. By accessing a Control Station, it can enter these tunnels to quickly move around the map, detect the presence of nearby Survivors, and speed up the cooldown time of its Crawler Mode. Exiting a Control Station momentarily deactivates deployed Turrets and tags nearby Survivors with Killer Instinct.\n\nSPECIAL ABILITY: CRAWLER MODE\n\nThe Xenomorph enters Crawler Mode automatically when not on cooldown. In Crawler Mode, The Xenomorph walks on four legs and becomes stealthier, reducing its Terror Radius. While in Crawler Mode, The Xenomorph also has access to a brutal Tail Attack.\n\nSPECIAL MAP FEATURE: CONTROL STATIONS\n\nSeven Control Stations are scattered across the map. Survivors can interact with these stations to get a Remote Flame Turret, while The Xenomorph can enter and exit the tunnels underneath the Control Stations.\n\nSPECIAL ITEM: REMOTE FLAME TURRET\n\nTurrets can be placed in the map to counteract The Xenomorph. When The Xenomorph enters the radius and line of sight of a Turret, the Turret attacks; this attack staggers The Xenomorph and can cause Crawler Mode to end. If a Turret successfully knocks The Xenomorph out of Crawler Mode or fires for too long, it overheats, and must be repaired by a Survivor. The Xenomorph can attack Turrets to destroy them. Carrying a Turret makes you immune to detection while the killer is in the tunnel.\n\n“Its structural perfection is matched only by its hostility.” – Ash, Science Officer", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Wormhole/iconPowers_hiddenPursuit_active"}, {"id": "d099c4f0-841b-471d-850d-9572405b1127", "internalId": "Item_Slasher_K34Power", "name": "Playtime's Over", "type": "power", "itemType": null, "description": "After the rage of being trapped in the body of a doll subsided, the Lakeshore Strangler realized this new body was the perfect host to disorient and surprise his kills.\n\nSPECIAL ABILITY: HIDEY-HO MODE\n\nChucky can enter Hidey-Ho Mode at any time, provided the cooldown is over. When in Hidey-Ho Mode, Chucky becomes Undetectable and generates map-wide Footfalls, disorienting Survivors with sounds and footprints coming from many directions.\n\nSPECIAL ABILITY: SLICE & DICE\n\nWhile in Hidey-Ho Mode, Chucky gets access to the charged Slice & Dice ability, allowing him to rush unsuspecting Survivors before leaping forward and performing a Slice & Dice attack.\n\nAdditionally, Chucky can quickly chain a Scamper while using a Slice & Dice.\n\nSPECIAL ABILITY: SCAMPER\n\nWhile performing a Slice & Dice in Hidey-Ho Mode, Chucky can perform a Scamper through windows or under downed pallets, allowing him to close on his unsuspecting prey.\n\n“I'm one of the most notorious slashers in history. And I don't want to give that up. I am Chucky, the killer doll! And I dig it!” – Chucky", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Yerkes/iconPowers_K34"}, {"id": "714aa61e-31fb-42fe-85f5-e6e476fc8081", "internalId": "Item_Slasher_K35Power", "name": "UVX", "type": "power", "itemType": null, "description": "Some believed a specimen was recovered by the military for their experiments. The codename: Unknown Venom X.\n\nPress the Power button to charge UVX. Once ready, press the Attack button to launch UVX, a bouncing Projectile which creates a Blast Area upon impact. Survivors become Hindered by 6% if touched by UVX while airborne.\n\nSurvivors touching the Blast Area become Weakened. Weakened Survivors lose health states if touched by Blast Areas. Survivors lose Weakened by successfully Staring Down The Unknown.\n\nSPECIAL ABILITY: HALLUCINATIONS\n\nThe Unknown will intermittently create up to 4 Hallucinations. Hallucinations cannot be created while charging UVX, performing interactions, or in proximity to map objects like hooks.\n\nWhenever Survivors are touched by Blast Areas or otherwise become Weakened, the next Hallucination's spawn time decreases by 10 seconds.\n\nThe Unknown can Teleport to Hallucinations, leaving behind a temporary Decoy. Survivors can remove Hallucinations from the trial with the Dispel ability. Weakened Survivors take longer to Dispel. If Dispel is not completed, Survivors become Weakened and trigger Killer Instinct.\n\n“... Request for analysis [REDACTED] incident [REDACTED] awaiting approval.” - Excerpt from leaked OSS report", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Applepie/iconPowers_ChargeUVX_K35"}, {"id": "6cf45734-458c-418a-82c9-2696ef028972", "internalId": "Item_Slasher_K36Power", "name": "VILE DARKNESS", "type": "power", "itemType": null, "description": "Bound with the skin and flesh of men, the Book is packed with spells both forbidden and wicked.\n\nTo select a Spell, hold Ability button 1 to open the Spell selection. The Lich has 4 different Spells:\n\nMage Hand: Creates a magical hand that lifts downed pallets or blocks upright pallets for 4 seconds.Flight of the Damned: Conjures 5 flying entities that pass through obstacles and injure Survivors.Dispelling Sphere: Casts a moving invisible sphere that reveals Survivors & temporarily disables Magic Items.Fly: Briefly move faster, ignoring vaults and pallets.\n\nSPECIAL ITEM: MAGIC ITEMS\n\nTreasure Chests found around the map can contain Magic Items for Survivors to equip. These include Boots/Gauntlets of:\n\nThe Interloper: When Mage Hand is used, reveals aura of affected pallets and applies Haste for 4 seconds.The Nightwatch: Reveals auras of Flight of the Damned.The Archivist: Makes Dispelling Sphere visible.The Skyguard: Reveals The Lich's aura during Fly and for a few seconds after.Additionally, upon procurement, all Magic Items briefly reveal Vecna's aura.\n\nSPECIAL ITEMS: HAND & EYE OF VECNA\n\nRarely, Treasure Chests contain the Hand or Eye of Vecna. When picked up and used by a Survivor at full health, they cost them a health state, reveal their location with Killer Instinct for 4 seconds, and grant them a special ability.\n\nHand of Vecna: A Fast Locker Entry teleports the Survivor to a further locker.Eye of Vecna: A Fast Locker Exit hides the Survivor's aura and grants Haste for 12 seconds.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Churros/iconPowers_VileDarkness"}, {"id": "fcd3dfd0-368a-4f00-91e3-80f1e475e771", "internalId": "Item_Slasher_K37Power", "name": "Vampiric Shift", "type": "power", "itemType": null, "description": "His dark power allows him to exact revenge on humans, taking many forms to terrorize and slaughter them.\n\nSPECIAL ABILITY: SHAPESHIFT\n\nThe Dark Lord has access to three Forms and can freely change between them. Each Form has unique abilities and strengths.\n\nVampire Form: In his default state, The Dark Lord can use the powerful Hellfire spell, which creates 8 pillars of flame that erupt from the ground in front of him and can be cast across low obstacles.\n\nWolf Form: In Wolf Form, The Dark Lord has access to several abilities that allow for more effective tracking. Blood pools and scratch marks are more apparent, and running Survivors leave a trail of Scent Orbs behind them. The Dark Lord can collect these Scent Orbs to charge a powerful Pounce attack and gain a short non-stacking haste buff.\n\nBat Form: While in Bat Form, The Dark Lord gains the Undetectable status effect. Additionally, he moves faster, ignores vault points, and can Teleport to any vault points within 32 meters. Survivors become invisible, but scratch marks can be s", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Eclair/iconPowers_K37_Shapeshift"}, {"id": "1ad25bc7-ccb0-4f12-a58b-594601e042c4", "internalId": "Item_Slasher_K38Power", "name": "Scent of Blood", "type": "power", "itemType": null, "description": "The Houndmaster and her dog operate as one. Her commands are followed without question or delay.\n\nSPECIAL ABILITY: CHASE\n\nThe Chase Command sends the dog out at high speed. Pressing the Power button again redirects the Chase, pivoting the dog's path. When the dog catches a Survivor, the dog starts a Grab. The Survivor becomes Hindered and is pulled toward The Houndmaster. The Survivor can get free by stunning the dog or can be rescued by another Survivor. Grabs that end without injury leave the Survivor Hindered. Grab duration is shorter for Survivors with the Endurance status effect.\n\nSPECIAL ABILITY: SEARCH\n\nThe Search Command sends the dog to a target location, creating a Search Path. It has its own lullaby and, as it moves, its Houndsense radius rises over distance traveled. Survivors who enter the radius are affected by Houndsense and revealed by Killer Instinct. If The Houndmaster follows the dog’s Search Path, she gains increased movement speed over time. Leaving the Search Path ends the bonus movement speed.\n\nSPECIAL EFFECT: HOUNDSENSE\n\nHealthy Survivors affected by Houndsense receive Deep Wounds when injured. Injured Survivors affected by Houndsense suffer from louder grunts of pain and longer pools of blood when put into the dying sta", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Gelato/iconPowers_DashCommand_K38"}, {"id": "ad28e58f-3512-4c9d-bcb9-6cfb05cc9a63", "internalId": "Item_Slasher_K39Power", "name": "One-Eyed Terror", "type": "power", "itemType": null, "description": "SPECIAL ABILITY: Kagune Leap\n\nUse the Power button to charge and launch the Kagune, tentacles that attach to any vertical surface within range and quickly pull The Ghoul forward.\n\nAfter completing a leap, The Ghoul has a window to perform a second consecutive Kagune Leap or put Kagune Leap into cooldown by using the Active Ability button.\n\nKagune Leap enters cooldown once The Ghoul has consumed their leaps, if they leap over a vault or downed pallet, or if the Kagune grabs and leaps at a Survivor.\n\nIf The Ghoul's second consecutive leap targets a Survivor, they will perform a grab-attack. Grab-attacks damage Survivors if they are healthy; inflict Deep Wounds; and leave a Kagune Mark.\n\nPerforming a grab-attack also triggers Enraged Mode.\n\nSPECIAL ABILITY: Enraged Mode\n\nWhile Enraged, The Ghoul can perform up to three consecutive Kagune Leaps and can leap over vaults more quickly if they launch their Kagune at a Survivor.\n\nEnraged Mode remains active while there are Survivors afflicted with Kagune Mark. Marked Survivors will lose their mark if they are fully mended, or if they are downed.\n\nThe Ghoul cannot grab-attack marked Survivors.\n\nOnce no marked Survivors remain, a Countdown begins. When the Countdown depletes, Enraged Mode ends. A perfectly timed grab-attack - tapping the attack button when the attack icon is displayed - will add extra time to the Countdown. The Countdown is paused while carrying Survivors.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Icecream/iconPowers_AimKaguneLeap_K39"}, {"id": "98f572b4-eff9-4756-87e1-9cfdc15d906b", "internalId": "Item_Slasher_K40Power", "name": "Fazbear's Fright", "type": "power", "itemType": null, "description": "The Animatronic lived to kill, even when his mechanical costume became his tomb.\n\nSPECIAL ABILITY: FIRE AXE\n\nThe Animatronic is armed with a Fire Axe that he can throw at Survivors. If the Fire Axe hits a Survivor, the weapon becomes embedded in them, afflicting them with Broken & Oblivious until it is removed.\n\nSPECIAL MAP FEATURE: SECURITY SYSTEM\n\nAt the start of the trial, 7 Security Doors are spawned randomly throughout the map. These Doors can be accessed by both Survivors and The Animatronic.\n\nEach Security Door has a Camera attached to it. Interacting with the Door gives the Survivor access to the Camera View, allowing the Survivor to cycle through every Camera in the map, travel to the Door they are currently looking through, and potentially reveal The Animatronic's aura to the team.\n\nUsing the Cameras and Doors too often will deplete the limited battery power available, forcing Survivors to wait until the system reboots. The Animatronic may travel between Security Doors with or without battery power.\n\nIf The Animatronic enters a Security Door, they may choose to exit from any other Door in the map. Moving to a Door already in use by a Survivor will cause The Animatronic to grab that Survivor.\n\nUpon entering a Security Door, The Animatronic gains the Undetectable status effect. The effect lasts 20 seconds after exiting a Security Door, or until revealed by a Survivor on a Security Cam", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Ketchup/iconPowers_ThrowAxe_K40"}, {"id": "976b0e21-abc7-40ff-a6af-da909f95fe6d", "internalId": "Item_Slasher_K41Power", "name": "Unbodied Flesh", "type": "power", "itemType": null, "description": "SPECIAL ABILITY: CORPOREAL WEAVE\n\nThe Krasue can shift between Body and Head Forms at will.\n\nBody Form has a 32 meter Terror Radius. Head Form has a 40 meter Terror Radius. It is slightly faster but cannot break pallets and is not granted Bloodlust.\n\nSPECIAL EFFECT: LEECHED\n\nHitting a Survivor with Intestinal Whip or a Leeching Gland adds to their Leech Meter. When the meter is filled, the Survivor is afflicted with Leeched I.Leeched I: The Leech Meter fills automatically.Leeched II: The Survivor is afflicted with Broken. If healthy, they become injured.\n\nSPECIAL ABILITY: INTESTINAL WHIP\n\nIn Head Form, press the Attack button to lash out with your internal organs.\n\nSurvivors afflicted with Leeched can be damaged by Intestinal Whip.Intestinal Whip partially fills a Survivor’s Leech Meter, up to Leech I.\n\nSPECIAL ABILITY: REGURGITATE\n\nIn Body Form, press and hold the Power button to charge Regurgitate. When charged, tap the Attack button to spew a Leeching Gland.Leeching Gland completely fills a Survivor’s Leech Meter, up to Leech I.\n\nSPECIAL ITEM: GLOWING FUNGUS\n\nSurvivors can eat Glowing Fungus to decrease the Leech Meter over time. Being hit ends the effect.\n\nSPECIAL ABILITY: HEADLONG FLIGHT\n\nIn Head Form, press and hold the Power button to speed through the air.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Maple/T_UI_iconPowers_HeadForm_K41"}, {"id": "8820254d-92b2-43e4-9128-aa6190741dac", "internalId": "Item_Slasher_Kanobo", "name": "Yamaoka's Wrath", "type": "power", "itemType": null, "description": "The desire to destroy weaker bloodlines shaped into a literal force.\n\nYAMAOKA'S WRATH\n\nAbsorb Blood Orbs left by your injured foes. Press and hold the Power button to absorb Blood Orbs in the environment and fill your power gauge. When your power gauge is full, press and hold the Active Ability button to initiate Blood Fury.\n\nBlood Fury: While Blood Fury is active, The Oni becomes lethal and gains access to additional abilities: Demon Dash and Demon Strike.\n\nSPECIAL ABILITY: Demon Dash\n\nPress and hold the Power button while Blood Fury is active to perform a Demon Dash. This ability allows The Oni to cover large distances at high speed.\n\nSPECIAL ATTACK: Demon Strike\n\nPress and hold the Attack button while Blood Fury is active to perform a Demon Strike in the direction you are facing. Demon Strike has an extended lunge range and successful hits immediately put healthy Survivors into the dying state.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Sweden/iconPowers_yamaokasWrath_demon"}, {"id": "08509dbf-baad-4738-a70a-cd3ae281356c", "internalId": "Item_Slasher_Killer07Item", "name": "Carter's Spark", "type": "power", "itemType": null, "description": "CARTER'S SPARK\n\nSuccessfully striking Survivors with The Doctor's special abilities, Shock Therapy or Static Blast, increases the Survivor's Madness, eventually afflicting them with the Madness status effect and triggering increasingly potent effects.\n\nMadness I:\n\nCauses Survivors to scream once, revealing their position to The Doctor. Slightly affects Skill Check placement and direction.\n\nMadness II:\n\nCauses Survivors to scream once and experience hallucinations in the form of an illusionary Doctor. Moderately affects Skill Check placement and direction.\n\nMadness III:\n\nCauses Survivors to scream intermittently and experience hallucinations in the form of an illusionary Doctor. Tremendously affects Skill Check placement and direction. The Survivor cannot heal, repair, sabotage, unlock, cleanse, or use items until they successfully Snap Out Of It. When a Survivor completes the Snap Out Of It action, they return to Madness I.\n\nSPECIAL ABILITY: Shock Therapy\n\nPress and hold the Power button to perform Shock Therapy, unleashing a ranged shock attack on the ground in front of you. Survivors struck by Shock Therapy gain increased Madness and any interactions they are performing are immediately interrupted. Shock Therapy immediately negates the Oblivious status effect.\n\nSPECIAL ABILITY: Static Blast\n\nPress and hold the Active Ability button to perform a Static Blast, causing all Survivors within The Doctor's Terror Radius to scream and gain increased Madness. Static Blast can only be activated when not on cooldown. Static Blast immediately negates the Oblivious status effect.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/DLC4/iconPowers_cartersSpark"}, {"id": "80ca9b4b-e0bb-4280-a31c-2124f7e66916", "internalId": "Item_Slasher_LFChainsaw", "name": "Bubba's Chainsaw", "type": "power", "itemType": null, "description": "The Cannibal starts the trial with 3 charges. Press and hold the Power button to consume one charge and perform a Chainsaw Sweep attack that can hit multiple targets. Survivors hit during a Chainsaw Sweep are put into the dying state.\n\nUse a charge to extend the length of the Chainsaw Sweep. Doing this incurs a slightly longer cooldown. Chainsaw charges replenish when the chainsaw is not in use.\n\nThe Tantrum Meter slowly fills when revving the Chainsaw. Once the meter is full, or after hitting an object during a Chainsaw Sweep, The Cannibal unleashes a Tantrum. The Tantrum damages any Survivor’s around him and puts them into the dying state.\n\nThe Tantrum duration increases for each charge that had been used during the Chainsaw Sweep. Any remaining charges are lost. During a Tantrum, movement speed is decreased.The Tantrum Meter decreases when the Chainsaw is not in use and completely depletes during a Chainsaw Sweep.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Cannibal/iconPowers_bubbasChainsaw"}, {"id": "6fe15be5-dc13-4b8e-9fcb-3217f2c257bd", "internalId": "Item_Slasher_PhantomTrap", "name": "Blackened Catalyst", "type": "power", "itemType": null, "description": "The source of The Hag's power, a blackened finger used as a catalyst for her terrible power. The Hag bends and shapes mud to her will. With simple ritualistic drawings, she creates deceitful duplicates of herself made from mud and decay which she can use for various effects.\n\nGrants the ability to create and maintain 10 Phantasm Traps.Grants the ability to instantly travel to triggered Phantasm Traps when within a 48 meter range.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/DLC3/iconPowers_blackenedCatalyst"}, {"id": "fc22f818-2843-48df-af5b-697987bc3d5e", "internalId": "Item_Slasher_PhaseWalker", "name": "Yamaoka’s Haunting", "type": "power", "itemType": null, "description": "The Spirit can use her power, Yamaoka’s Haunting, to enter an ethereal plane and reappear at a new location.\n\nTap and Hold the Power button to charge. The Spirit will depart her physical body, leaving behind a stationary 'husk'.\n\nWhile Yamaoka’s Haunting is active:The Spirit may traverse freely to a new location, moving at a faster rate for a short duration. She is still confined to movement within the physical environments and surroundings.The Spirit leaves the physical plane, losing sight of all Survivors. She can, however, still sense the scratch marks they leave in the environment.The Spirit will produce an audible cue at her current location.Once the power has ended, The Spirit retains her speed boost for a brief period and her husk fades away.\n\nUsing Yamaoka’s Haunting depletes The Spirit's power bar. The power bar will automatically replenish over time. The power bar must be fully replenished before it can be triggered again.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Haiti/iconPowers_yamaokasHaunting"}, {"id": "a3a20222-7038-48b1-bb42-8a51bf397557", "internalId": "Item_Slasher_PlaguePower", "name": "Vile Purge", "type": "power", "itemType": null, "description": "Her condition deteriorated as the plague overtook her body: her toes blackened, her neck mushroomed into cysts, and her throat gagged with bloody vomit.\n\nVILE PURGE\n\nInfect environmental objects and Survivors with Vile Purge to create an unending cycle of sickness. Press and hold the Power button to charge Vile Purge, and release the button to unleash a stream of infectious bile. Hitting a Survivor will cause them to become infected. Hitting an environmental object will cause it to become infected for a short time. Survivors interacting with infected objects will also become infected.\n\nWhen a Survivor's infection indicator is completely filled, The Survivor is put into the injured state, is afflicted by the Broken status effect, and forced to vomit at random intervals.\n\nSPECIAL ABILITY: INGEST CORRUPTION\n\nInfected Survivors can heal themselves to full health and cure their infection by cleansing at a Pool of Devotion. This action corrupts the pool, allowing The Plague to consume the corruption and empower her purge. Press and hold the Interaction button while next to a corrupt Pool of Devotion to transform Vile Purge into Corrupt Purge. This action removes the corruption from the pool.\n\nSPECIAL ATTACK: CORRUPT PURGE\n\nAfter using the Ingest Corruption ability, Vile Purge is replaced by Corrupt Purge for a short duration. Corrupt Purge instantly damages any Survivor hit by its stream, however, it no longer applies infection to Survivors or environmental objects.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Mali/iconPowers_vilePurge"}, {"id": "d40c5a43-d77b-4302-a36b-2503969dd989", "internalId": "Item_Slasher_QatarKillerPower", "name": "Of the Abyss", "type": "power", "itemType": null, "description": "An unknown and otherworldly power surged through its body. Suddenly the ground ripped open, swallowing The Demogorgon whole.\n\nOF THE ABYSS\n\nPress and hold the Power button to fully charge and activate Of the Abyss. All Survivors within a close proximity to an activated Portal will be indicated by Killer Instinct.\n\nSPECIAL ATTACK: SHRED\n\nPress the Attack button while charging or holding Of the Abyss to dive forward and unleash a vicious slash.\n\nSPECIAL ABILITY: PORTALS\n\nPress the Active Ability button to open a Portal on the ground in front of you.\n\nTraverse Upside Down:\n\nWhile standing on a placed Portal with a different Portal highlighted, press the Active Ability button again to travel through the Upside Down to arrive at the targeted Portal.\n\nActivated Portals:\n\nPortals become 'activated' when they are first traversed to or from. Only activated Portals may be sealed by Survivors. Activated Portal auras are highlighted in yellow.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Qatar/iconPowers_ofTheAbyss"}, {"id": "12f73929-190e-4260-921d-c4597c052986", "internalId": "Item_Slasher_ReverseBearTrap", "name": "Jigsaw's Baptism", "type": "power", "itemType": null, "description": "Forever devoted to her master's cause, she punishes the ungrateful and the guilty with slyness and murderous puzzles. The Pig can move stealthily, dash in Ambush attacks and put deadly Reverse Bear Traps on Survivors' heads.\n\nJIGSAW'S BAPTISM\n\nStart the trial with 4 inactive Reverse Bear Traps. While standing over a Survivor in the dying state, press the Active Ability button to place an inactive Reverse Bear Trap on The Survivor. Reverse Bear Traps become active when any generator in the trial is completed. Survivors may attempt to free themselves from active or inactive Reverse Bear Traps by searching Jigsaw Boxes located in the environment to find the correct key.\n\nActive Reverse Bear Traps:\n\nWhen Reverse Bear Traps become active, they initiate a countdown timer. A Survivor with an active Reverse Bear Trap is automatically sacrificed when their timer expires or if they attempt to leave the trial with an active Reverse Bear Trap still attached.\n\nSPECIAL ABILITY: CROUCH\n\nPress the Active Ability button to Crouch. Press the Active Ability button again while Crouched to stand. The Pig moves at a slower speed while Crouched. The Pig is granted the Undetectable status effect while Crouched.\n\nSPECIAL ATTACK: AMBUSH\n\nPress and hold the Attack button while Crouched to dash and perform an Ambush attack.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Finland/iconPowers_reverseBearTrap"}, {"id": "a0e50116-6025-4091-a628-b4477e002c62", "internalId": "Item_Slasher_Stalker", "name": "Evil Within", "type": "power", "itemType": null, "description": "The Shape stalks his prey, adapting to the pursuit, waiting for the perfect moment to unleash evil.\n\nThe Shape can switch between three modes of hunting his prey. Each mode has different strengths and weaknesses.\n\nSPECIAL MODE: STALKER\n\nThe Shape moves slowly and is Undetectable.\n\nIn Stalker mode, press and hold the Power button to Stalk a nearby Survivor and fill the Stalk Meter.\n\nWhen the Stalk Meter is full, Evil Incarnate mode is unlocked.\n\nSPECIAL MODE: PURSUER\n\nThe Shape moves quickly and has a 16 meter Terror Radius. Vault, break, lunge, and stun recovery speeds are increased.\n\nSPECIAL MODE: EVIL INCARNATE\n\nThe Shape’s Terror Radius is increased to 32 meters. Vault, break, and stun recovery speeds are increased.\n\nSurvivors who have reached the second hook stage can be killed.\n\nEvil Incarnate mode ends after 60 seconds.\n\nSPECIAL ABILITY: SLAUGHTERING STRIKE\n\nIn Evil Incarnate mode, hold the Power button to charge Slaughtering Strike and press the Attack button to unleash it. The longer the Power button is held, the more distance on the attack.\n\nSurvivors hit by Slaughtering Strike are downed, even if healthy.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/DLC2/T_UI_iconPowers_stalker"}, {"id": "6a25f893-e77b-442f-a51e-6dc1eab1e342", "internalId": "Item_Slasher_ThrowingKnives", "name": "Showstopper", "type": "power", "itemType": null, "description": "A mesmerizing skill honed through a lifetime of practice, Ji-Woon Hak unleashes a flurry of knives with rapid-fire speed.\n\nSHOWSTOPPER\n\nStart the trial with 44 Blades. Press and hold the Power button to wind up and enter the throw state.\n\nWhile in the throw state, tap the Attack button to throw a single Blade, or hold down the Attack button to unleash a flurry of Blades. Restock Blades at lockers.\n\nLaceration Meter: A Survivor’s Laceration Meter increases each time they’re hit by a Blade. Once the meter is filled, they will lose a health state, either becoming injured or downed.\n\nA Survivor’s Laceration Meter will gradually decrease if they have not been hit by a Blade for a short time. Hitting a Survivor with a basic attack will immediately decrease their Laceration Meter.\n\nSPECIAL ABILITY: Main Event\n\nEach Blade hit fills the Event Meter. Once full, Main Event can be activated by pressing the Ability button. In this mode, The Trickster automatically throws unlimited Blades for the duration of The Main Event. His throw rate is significantly increased. The Main Event can be canceled by pressing the Ability button. Doing so resets the Event Meter to 0 and initiates a cooldown on Showstopper.", "role": "killer", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Comet/iconPowers_Showstopper_01"}, {"id": "e41c9caa-c65d-40ad-ad3c-268b87459390", "internalId": "Item_Slasher_TormentMode", "name": "Rites of Judgment", "type": "power", "itemType": null, "description": "Open the gates of suffering and be judged! The Great Knife splits the ground, giving rise to an infernal construct and spreading agony to all who approach.\n\nRITES OF JUDGMENT\n\nHold the Power button to activate, then move in any direction to carve a trail into the ground.\n\nSurvivors who walk or run on the trail will trigger Killer Instinct and be afflicted with Torment. Survivors affected by Torment may be sent to a Cage of Atonement while they are in the dying state.\n\nSPECIAL ATTACK: Punishment of the Damned\n\nPress the Attack button while Rites of Judgment is active to perform Punishment of the Damned. This unleashes a wave of force, damaging any Survivors in its path.\n\nSPECIAL ABILITY: Cage of Atonement\n\nPress the Active Ability button while standing over a dying Survivor suffering from Torment to send them to a Cage of Atonement. Survivors in a Cage of Atonement can be sacrificed as if they were on a hook. During the second phase of the summoning ritual they will be forced to complete Skill Checks to hold off The Entity.\n\nBeing rescued or rescuing another Survivor from a Cage of Atonement will remove Torment.\n\nSPECIAL ABILITY: Final Judgment\n\nPress the Active Ability button when standing over a dying Survivor suffering from Torment who has already reached struggle phase on a hook or in a cage to execute them.", "role": "killer", "rarity": "common", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/Powers/Wales/iconPowers_Wales_ritesOfJudgement"}, {"id": "a562db23-0fd7-436c-83e6-5ca9425e3490", "internalId": "Item_Survivor_CalamariContaminationAntidote", "name": "Antidote", "type": "item", "itemType": null, "description": "A potent formula that reverses the effects of both the T-Virus and Uroboros Infection. Limited items are consumed by The Entity at the trial's end.", "role": "survivor", "rarity": "none", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Limited/iconItems_LimitedStabilizingSpray"}, {"id": "54113ed5-7f8d-4a78-8dd0-a318e17c13b8", "internalId": "Item_Survivor_K41Mushroom", "name": "Glowing Fungus", "type": "item", "itemType": null, "description": "@#ITEM_K41Mushroom_DESC", "role": "survivor", "rarity": "visceral", "bloodweb": false, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/Limited/T_UI_iconItems_LimitedMushroom"}, {"id": "bb358a87-15ff-4036-a153-228a35e8dca3", "internalId": "Item_Survivor_MakeshiftFogVial", "name": "Apprentice's Fog Vial", "type": "item", "itemType": "fogvial", "description": "Made by the hands of a diligent but timid novice.\n\nReleases concentrated Fog.Fog Cloud lasts for 8 secondsFog Cloud expands to a maximum of 8 meters.While inside a Fog Cloud, auras are suppressed, and Survivors leave no scratch marks and make no sound.Has 2 charges.Recharges over 70 seconds.", "role": "survivor", "rarity": "common", "bloodweb": true, "event": null, "image": "https://dbd.tricky.lol/Game/UI/UMGAssets/Icons/items/T_UI_iconItems_apprenticesFogVial"}, {"id": "05287ad2-1a0b-4aeb-9337-28e4ecbf5956", "internalId": "Item_Survivor_PrototypeFogVial", "name": "Artisan's Fog Vial", "type": "item", "itemType": "fogvial", "description": "Crafted by an experienced glazier with a love for her craft.Releases concentrated Fog.Fog Cloud lasts for 10 secondsFog Cloud expands to a maximum of 8 meters.While inside a Fog Cloud, auras are suppressed, and Survivors leave no scrat
